<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#142a19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scripture Scout">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>Scripture Scout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:ital@0;1&display=swap');

  :root {
    --bg:         #ede3cf;
    --surface:    #fffdf5;
    --surface-2:  #fdf5e4;
    --border:     #d4aa50;
    --border-hi:  #c4a030;
    --text:       #2e1c00;
    --text-muted: #7a5010;
    --rope:       repeating-linear-gradient(45deg,#9b7520 0,#9b7520 4px,#d4aa50 4px,#d4aa50 8px,#b08830 8px,#b08830 12px,#d4aa50 12px,#d4aa50 16px);
    --rope-dark:  repeating-linear-gradient(45deg,#6a5808 0,#6a5808 4px,#a89028 4px,#a89028 8px,#6a5808 8px,#6a5808 12px,#a89028 12px,#a89028 16px);
    --moss:       #4A7C59;
    --fern:       #6BAF7A;
    --fern-glow:  rgba(107,175,122,0.2);
    --teal:       #3BBFA0;
    --teal-dim:   rgba(59,191,160,0.12);
    --earth:      #C8873A;
    --earth-dim:  rgba(200,135,58,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  .dark-mode {
    --bg:         #1a1208;
    --surface:    #231a0a;
    --surface-2:  #2e2210;
    --border:     #5a4020;
    --border-hi:  #7a5a2a;
    --text:       #f0deb8;
    --text-muted: #9a7a48;
    --teal:       #2d6e3e;
    --teal-dim:   rgba(45,110,62,0.15);
    --earth:      #c8641a;
    --earth-dim:  rgba(200,100,26,0.15);
    --rope:       repeating-linear-gradient(45deg,#5a4010 0,#5a4010 4px,#8a6828 4px,#8a6828 8px,#6a5018 8px,#6a5018 12px,#8a6828 12px,#8a6828 16px);
  }
  .dark-mode #leafBg { opacity: 0.5; }

  body {
    background: var(--bg);
    transition: background 0.3s ease, color 0.3s ease;
    position: relative;
    background-image:
      radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(74,124,89,0.15) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 85% 95%, rgba(59,191,160,0.08) 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 56px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  .masthead { text-align: center; margin-bottom: 24px; width: 100%; max-width: 560px; display:none; }
  .masthead h1 {
    font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 700;
    background: linear-gradient(135deg, #8FD9A8 0%, #3BBFA0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -0.03em; line-height: 1.1;
  }
  .masthead p { color: var(--text-muted); font-size: 0.78rem; margin-top: 5px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }

  /* Nav tabs */
  .nav-tabs {
    display: flex; gap: 0; width: 100%; max-width: 560px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 20px;
  }
  .nav-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 0.82rem;
    font-weight: 600; color: var(--text-muted); cursor: pointer;
    border: none; background: transparent; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; border-right: 1px solid var(--border);
  }
  .nav-tab:last-child { border-right: none; }
  .nav-tab.active { background: var(--surface-2); color: var(--teal); }
  .nav-tab:active { background: var(--surface-2); }

  /* Diff screen */
  .diff-screen { width: 100%; max-width: 560px; }
  .diff-intro { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; line-height: 1.6; }
  .diff-cards { display: flex; flex-direction: column; gap: 12px; }
  .diff-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px 22px; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; gap: 16px; text-align: left; }
  .diff-card:active { border-color: var(--fern); background: rgba(107,175,122,0.07); }
  .diff-icon { font-size: 2rem; flex-shrink: 0; }
  .diff-info { flex: 1; }
  .diff-name { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .diff-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
  .diff-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
  .badge-easy   { background: rgba(59,191,160,0.15);  color: var(--teal);  border: 1px solid var(--teal); }
  .badge-medium { background: rgba(107,175,122,0.15); color: var(--fern);  border: 1px solid var(--fern); }
  .badge-hard   { background: rgba(200,135,58,0.15);  color: var(--earth); border: 1px solid var(--earth); }

  /* HUD */
  .hud { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 18px; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; overflow: hidden; width: 100%; max-width: 560px; }
  .hud strong { color: var(--text); font-size: 1.15rem; font-weight: 700; display: block; letter-spacing: -0.01em; }
  .hud-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 9px 0; border-right: 1px solid var(--border); }
  .hud-item:last-child { border-right: none; }
  .hud-diff { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 0 0 1px rgba(74,124,89,0.06), 0 20px 40px rgba(0,0,0,0.5); width: 100%; max-width: 560px; padding: 28px 24px 22px; }
  .rope-card { border-radius:16px; background:var(--surface) padding-box, repeating-linear-gradient(45deg,#9b7520 0,#9b7520 4px,#d4aa50 4px,#d4aa50 8px,#b08830 8px,#b08830 12px,#d4aa50 12px,#d4aa50 16px) border-box; border:3px solid transparent; padding:14px 16px; margin-bottom:12px; }
  .rope-card-green { border-radius:18px; background:#1c3d12 padding-box, repeating-linear-gradient(45deg,#c4a030 0,#c4a030 4px,#f0c850 4px,#f0c850 8px,#c4a030 8px,#c4a030 12px,#f0c850 12px,#f0c850 16px) border-box; border:4px solid transparent; padding:18px; margin-bottom:12px; position:relative; overflow:hidden; }
  .rope-divider { display:flex; align-items:center; gap:10px; margin:14px 0 10px; color:#6b4a10; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.14em; }
  .rope-divider-line { flex:1; height:6px; background:repeating-linear-gradient(90deg,#9b7520 0,#9b7520 4px,#d4aa50 4px,#d4aa50 8px,#b08830 8px,#b08830 12px,#d4aa50 12px,#d4aa50 16px); border-radius:3px; opacity:0.6; }

  .verse-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .verse-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .verse-text { font-family: 'DM Mono', monospace; font-size: clamp(0.9rem, 2.4vw, 1.05rem); line-height: 1.8; color: var(--text); font-style: italic; margin-bottom: 8px; min-height: 88px; }

  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 32px 0; min-height: 88px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--fern); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.82rem; color: var(--text-muted); }
  .error-box { background: var(--earth-dim); border: 1px solid var(--earth); border-radius: 10px; padding: 16px; font-size: 0.84rem; color: var(--earth); line-height: 1.5; margin-bottom: 12px; }

  .phase-bar { display:flex; gap:5px; margin-bottom:16px; }
  .phase-dot { flex:1; height:3px; border-radius:2px; background:var(--border); transition:background 0.3s; }
  .phase-dot.active { background:var(--fern); box-shadow:0 0 6px var(--fern); }
  .phase-dot.done   { background:var(--teal); }
  .phase-label { font-size:0.76rem; color:var(--text-muted); margin-bottom:12px; font-weight:600; letter-spacing:0.02em; }
  .pts-hint { color: var(--fern); font-size: 0.72rem; margin-left: 4px; }

  .btn-group { display:flex; flex-wrap:wrap; gap:9px; margin-bottom:8px; }
  .btn { flex:1; min-width:120px; padding:13px 14px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600; color:var(--text); cursor:pointer; transition:all 0.15s; text-align:center; }
  .btn:active { border-color:var(--fern); background:rgba(107,175,122,0.1); }
  .btn.correct { border-color:var(--teal);  background:var(--teal-dim);  color:var(--teal); }
  .btn.wrong   { border-color:var(--earth); background:var(--earth-dim); color:var(--earth); }
  .btn.reveal  { border-color:var(--moss);  background:rgba(74,124,89,0.12); color:#8FD9A8; }
  .btn:disabled { cursor:default; }

  .book-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:5px; margin-bottom:8px; max-height:250px; overflow-y:auto; padding-right:3px; }
  .book-grid::-webkit-scrollbar { width:3px; }
  .book-grid::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:2px; }
  .book-btn { padding:10px 5px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:8px; font-size:0.74rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.15s; text-align:center; font-family:'DM Sans',sans-serif; }
  .book-btn:active { border-color:var(--fern); color:var(--text); background:rgba(107,175,122,0.1); }
  .book-btn.correct { border-color:var(--teal);  background:var(--teal-dim);  color:var(--teal); }
  .book-btn.wrong   { border-color:var(--earth); background:var(--earth-dim); color:var(--earth); }
  .book-btn.reveal  { border-color:var(--moss);  background:rgba(74,124,89,0.12); color:#8FD9A8; }
  .book-btn:disabled { cursor:default; }

  .chapter-grid { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; max-height:190px; overflow-y:auto; }
  .chapter-btn { width:48px; height:42px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:8px; font-size:0.8rem; font-weight:700; color:var(--text-muted); cursor:pointer; transition:all 0.15s; font-family:'DM Sans',sans-serif; }
  .chapter-btn:active { border-color:var(--fern); color:var(--text); background:rgba(107,175,122,0.1); }
  .chapter-btn.correct { border-color:var(--teal);  background:var(--teal-dim);  color:var(--teal); }
  .chapter-btn.wrong   { border-color:var(--earth); background:var(--earth-dim); color:var(--earth); }
  .chapter-btn.reveal  { border-color:var(--moss);  background:rgba(74,124,89,0.12); color:#8FD9A8; }
  .chapter-btn:disabled { cursor:default; }

  /* Difficulty feature styles */
  .hint-box { background:var(--teal-dim); border:1px solid var(--teal); border-radius:8px; padding:9px 14px; font-size:0.82rem; color:var(--teal); margin-top:10px; margin-bottom:4px; }
  .hint-box strong { font-weight:700; }
  .phase-note { font-size:0.78rem; color:var(--text-muted); font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.06em; }
  .hint-btn-wrap { display:flex; justify-content:flex-end; margin-bottom:8px; }
  .hint-btn { padding:6px 14px; background:transparent; border:1.5px solid var(--border-hi); border-radius:20px; font-family:'DM Sans',sans-serif; font-size:0.74rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
  .hint-btn:hover { border-color:var(--teal); color:var(--teal); }
  .hint-btn:disabled { opacity:0.4; cursor:default; }
  .hint-cost { font-size:0.68rem; color:var(--earth); font-weight:700; }

  .feedback { min-height:26px; font-size:0.83rem; font-weight:600; margin-top:8px; letter-spacing:0.02em; }
  .feedback.correct { color:var(--teal); }
  .feedback.wrong   { color:var(--earth); }
  .points-pop { display:inline-block; background:var(--moss); color:#DFF0E3; font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:6px; animation:pop 0.4s ease; }
  @keyframes pop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }

  .divider { border:none; border-top:1px solid var(--border); margin:18px 0 14px; }
  .btn-next { width:100%; padding:14px; background:linear-gradient(135deg, #4A7C59 0%, #3BBFA0 100%); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:700; color:white; cursor:pointer; display:block; margin-bottom:8px; }
  .btn-next:active { opacity:0.85; }
  .btn-change-diff { width:100%; padding:10px; background:transparent; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; color:var(--text-muted); cursor:pointer; display:block; }

  /* Game over */
  .game-over { text-align:center; padding:16px 0 6px; }
  .game-over h2 { font-size:1.5rem; font-weight:700; color:var(--text); margin-bottom:4px; }
  .game-over .final-score { font-size:3.2rem; font-weight:700; line-height:1; margin:12px 0 2px; background:linear-gradient(135deg,#8FD9A8 0%,#3BBFA0 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .game-over .rank { font-size:0.88rem; color:var(--text-muted); margin-bottom:20px; }

  /* Name entry */
  .name-entry { margin-bottom:16px; }
  .name-entry label { display:block; font-size:0.78rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  .name-input { width:100%; padding:12px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600; color:var(--text); outline:none; }
  .name-input:focus { border-color:var(--fern); }
  .name-input::placeholder { color:var(--text-muted); font-weight:400; }

  .ref-box { font-size:0.8rem; color:var(--text-muted); margin-bottom:12px; line-height:1.5; }
  .ref-box strong { color:#8FD9A8; }

  /* Leaderboard */
  .leaderboard-screen { width:100%; max-width:560px; }
  .lb-diff-tabs { display:flex; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:12px; }
  .lb-diff-tab { flex:1; padding:11px 8px; text-align:center; font-size:0.82rem; font-weight:600; color:var(--text-muted); cursor:pointer; border:none; background:transparent; font-family:'DM Sans',sans-serif; transition:all 0.15s; border-right:1px solid var(--border); }
  .lb-diff-tab:last-child { border-right:none; }
  .lb-diff-tab.active { background:var(--surface-2); color:var(--teal); }
  .lb-diff-desc { font-size:0.78rem; color:var(--text-muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .lb-diff-pill { font-size:0.7rem; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.06em; }

  .lb-table { width:100%; border-collapse:collapse; }
  .lb-table th { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); padding:8px 12px; text-align:left; border-bottom:1px solid var(--border); }
  .lb-table th:last-child { text-align:right; }
  .lb-row { border-bottom:1px solid var(--border); transition:background 0.15s; }
  .lb-row:last-child { border-bottom:none; }
  .lb-row td { padding:12px 12px; font-size:0.88rem; color:var(--text); }
  .lb-row td:last-child { text-align:right; font-weight:700; color:var(--teal); }
  .lb-rank { font-weight:700; color:var(--text-muted); font-size:0.82rem; }
  .lb-rank.gold   { color:#F4B942; }
  .lb-rank.silver { color:#A8B8C8; }
  .lb-rank.bronze { color:#C8873A; }
  .lb-name { font-weight:600; }
  .lb-diff { font-size:0.7rem; padding:2px 6px; border-radius:10px; margin-left:6px; }
  .lb-empty { text-align:center; color:var(--text-muted); font-size:0.88rem; padding:32px 0; }

  .submitting { text-align:center; color:var(--text-muted); font-size:0.85rem; padding:8px 0; }

  /* Auth */
  .auth-screen { width:100%; max-width:560px; padding:16px 0; }
  .auth-card { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:20px; }
  .auth-tabs { display:flex; gap:0; background:var(--surface-2); border-radius:10px; padding:3px; margin-bottom:16px; }
  .auth-tab { flex:1; padding:9px; text-align:center; font-size:0.85rem; font-weight:600; color:var(--text-muted); cursor:pointer; border:none; background:transparent; font-family:'DM Sans',sans-serif; border-radius:8px; transition:all 0.15s; }
  .auth-tab.active { background:#8b4513; color:#f4b942; }
  .auth-field { margin-bottom:12px; }
  .auth-field label { display:block; font-size:0.7rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:5px; }
  .auth-input { width:100%; padding:11px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--text); outline:none; transition:border-color 0.15s; box-sizing:border-box; }
  .auth-input:focus { border-color:#8b4513; }
  .auth-input::placeholder { color:var(--text-muted); opacity:0.7; }
  .auth-error { background:rgba(200,64,26,0.1); border:1px solid #c8401a; border-radius:8px; padding:10px 14px; font-size:0.82rem; color:#c8401a; margin-bottom:14px; display:none; }
  .auth-success { background:rgba(45,110,62,0.1); border:1px solid #2d6e3e; border-radius:8px; padding:10px 14px; font-size:0.82rem; color:#2d6e3e; margin-bottom:14px; display:none; }
  .auth-success { background:var(--teal-dim); border:1px solid var(--teal); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--teal); margin-bottom:14px; display:none; }
  .auth-footer { text-align:center; margin-top:10px; font-size:0.8rem; color:var(--text-muted); }
  .auth-link { color:#8b4513; cursor:pointer; text-decoration:underline; background:none; border:none; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:600; }

  /* User profile bar */
  .user-bar { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 16px; margin-bottom:16px; width:100%; max-width:560px; }
  .user-bar-email { font-size:0.8rem; color:var(--text-muted); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
  .user-bar-right { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .btn-signout { padding:5px 12px; background:transparent; border:1.5px solid var(--border); border-radius:20px; font-family:'DM Sans',sans-serif; font-size:0.74rem; font-weight:600; color:var(--text-muted); cursor:pointer; }
  .btn-signout:hover { border-color:var(--earth); color:var(--earth); }

  /* Stats screen */
  .stats-screen { width:100%; max-width:560px; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
  .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 12px; text-align:center; }
  .stat-val { font-size:1.6rem; font-weight:700; color:var(--teal); line-height:1; margin-bottom:4px; }
  .stat-label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
  .history-list { display:flex; flex-direction:column; gap:8px; }
  .history-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
  .history-left { display:flex; flex-direction:column; gap:2px; }
  .history-score { font-size:1.1rem; font-weight:700; color:var(--text); }
  .history-meta { font-size:0.76rem; color:var(--text-muted); }
  .history-right { text-align:right; }
  .history-date { font-size:0.74rem; color:var(--text-muted); }

  /* Endless mode */
  .endless-locked { text-align:center; padding:24px; }
  .endless-locked .lock-icon { font-size:3rem; margin-bottom:12px; }
  .endless-locked h3 { font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:8px; }
  .endless-locked p { font-size:0.85rem; color:var(--text-muted); line-height:1.6; margin-bottom:16px; }
  .endless-progress { background:var(--surface-2); border-radius:20px; height:8px; overflow:hidden; margin:12px 0 6px; }
  .endless-progress-fill { height:100%; border-radius:20px; background:linear-gradient(90deg,#4A7C59,#3BBFA0); transition:width 0.5s ease; }
  .endless-progress-label { font-size:0.74rem; color:var(--text-muted); text-align:center; }
  .endless-hud { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:18px; overflow:hidden; width:100%; max-width:560px; }
  .endless-hud-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; padding:9px 0; border-right:1px solid var(--border); font-size:0.75rem; color:var(--text-muted); letter-spacing:0.06em; text-transform:uppercase; }
  .endless-hud-item:last-child { border-right:none; }
  .endless-hud-item strong { color:var(--text); font-size:1.15rem; font-weight:700; display:block; letter-spacing:-0.01em; }
  .endless-hud-item .multiplier { color:#F4B942; font-size:1rem; font-weight:700; }
  .endless-badge { background:linear-gradient(135deg,#4A7C59,#3BBFA0); color:white; font-size:0.7rem; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.06em; }
  .endless-verse-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.12em; color:#F4B942; margin-bottom:12px; display:flex; align-items:center; gap:8px; font-weight:600; }
  .endless-verse-label::after { content:''; flex:1; height:1px; background:#F4B94230; }
  .bank-bar { display:flex; gap:8px; margin-bottom:8px; }
  .btn-bank { flex:1; padding:10px; background:rgba(244,185,66,0.1); border:1.5px solid #F4B942; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:700; color:#F4B942; cursor:pointer; }
  .btn-bank:active { background:rgba(244,185,66,0.2); }
  .game-over-endless { text-align:center; padding:16px 0 6px; }
  .endless-final { font-size:3.2rem; font-weight:700; line-height:1; margin:12px 0 2px; background:linear-gradient(135deg,#F4B942,#3BBFA0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .endless-streak-display { font-size:1.1rem; color:var(--text-muted); margin-bottom:16px; }

  /* Social login */
  .social-divider { display:flex; align-items:center; gap:10px; margin:14px 0; }
  .social-divider span { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; }
  .social-divider::before, .social-divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .btn-google { width:100%; padding:11px 14px; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.15s; margin-bottom:8px; }
  .btn-google:hover { border-color:#8b4513; }
  .btn-google:active { background:var(--surface-2); }
  .google-icon { width:18px; height:18px; flex-shrink:0; }

  /* Home screen */
  .home-screen { width:100%; max-width:560px; }
  .home-section-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted); font-weight:600; margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
  .home-section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .home-game-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
  .home-game-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:16px; cursor:pointer; transition:all 0.18s; display:flex; flex-direction:column; gap:8px; position:relative; overflow:hidden; }
  .home-game-card:active { transform:scale(0.97); }
  .home-game-card.featured { grid-column:1/-1; flex-direction:row; align-items:center; gap:14px; border-color:var(--fern); }
  .home-game-card.featured:active { border-color:var(--teal); }
  .home-game-card.locked { opacity:0.5; cursor:default; }
  .home-game-icon { font-size:1.8rem; }
  .home-game-icon.small { font-size:1.4rem; }
  .home-game-name { font-size:0.95rem; font-weight:700; color:var(--text); line-height:1.2; }
  .home-game-desc { font-size:0.74rem; color:var(--text-muted); line-height:1.4; }
  .home-game-badge { position:absolute; top:10px; right:10px; font-size:0.62rem; font-weight:700; padding:2px 7px; border-radius:10px; text-transform:uppercase; letter-spacing:0.05em; }
  .home-game-card.featured .home-game-badge { position:static; margin-left:auto; flex-shrink:0; }
  .home-play-btn { margin-top:auto; padding:8px 12px; background:linear-gradient(135deg,#4A7C59,#3BBFA0); border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:700; color:white; cursor:pointer; text-align:center; }

  /* Home stats */
  .home-stats { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 20px; margin-top:4px; }
  .home-stats-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .home-stats-row:last-child { margin-bottom:0; }
  .home-stat-item { text-align:center; flex:1; }
  .home-stat-val { font-size:1.4rem; font-weight:700; color:var(--teal); line-height:1; margin-bottom:2px; }
  .home-stat-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); font-weight:600; }
  .home-stat-divider { width:1px; height:36px; background:var(--border); }

  /* Mini leaderboard */
  .mini-lb { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-top:4px; }
  .mini-lb-header { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .mini-lb-title { font-size:0.8rem; font-weight:700; color:var(--text); }
  .mini-lb-see-all { font-size:0.74rem; color:var(--teal); cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; font-weight:600; }
  .mini-lb-row { padding:10px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
  .mini-lb-row:last-child { border-bottom:none; }
  .mini-lb-rank { font-size:1rem; width:24px; text-align:center; flex-shrink:0; }
  .mini-lb-name { flex:1; font-size:0.85rem; font-weight:600; color:var(--text); }
  .mini-lb-score { font-size:0.85rem; font-weight:700; color:var(--teal); }

  /* Story Mode */
  .story-screen { width:100%; max-width:560px; }
  .story-path-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:20px; cursor:pointer; transition:all 0.18s; margin-bottom:12px; display:flex; align-items:center; gap:16px; }
  .story-path-card:active { border-color:#A78BFA; background:rgba(167,139,250,0.07); }
  .story-path-icon { font-size:2.5rem; flex-shrink:0; }
  .story-path-info { flex:1; }
  .story-path-title { font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:4px; }
  .story-path-desc { font-size:0.8rem; color:var(--text-muted); line-height:1.5; margin-bottom:8px; }
  .story-path-progress { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .story-path-progress-fill { height:100%; background:linear-gradient(90deg,#A78BFA,#38BDF8); border-radius:2px; transition:width 0.4s ease; }
  .story-path-progress-label { font-size:0.7rem; color:var(--text-muted); margin-top:4px; }
  .story-path-badge { font-size:0.68rem; font-weight:700; padding:3px 8px; border-radius:10px; background:rgba(167,139,250,0.15); color:#A78BFA; border:1px solid #A78BFA; flex-shrink:0; }

  /* Chapter list */
  .chapter-list { display:flex; flex-direction:column; gap:8px; }
  .chapter-item { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:12px; }
  .chapter-item.unlocked:active { border-color:#A78BFA; background:rgba(167,139,250,0.07); }
  .chapter-item.locked { opacity:0.45; cursor:default; }
  .chapter-item.completed { border-color:var(--teal); }
  .chapter-num { width:32px; height:32px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:0.82rem; font-weight:700; color:var(--text-muted); flex-shrink:0; }
  .chapter-num.completed { background:var(--teal-dim); color:var(--teal); }
  .chapter-num.current { background:rgba(167,139,250,0.2); color:#A78BFA; }
  .chapter-info { flex:1; }
  .chapter-title { font-size:0.9rem; font-weight:700; color:var(--text); margin-bottom:2px; }
  .chapter-ref { font-size:0.75rem; color:var(--text-muted); }
  .chapter-lock { font-size:1rem; color:var(--text-muted); flex-shrink:0; }

  /* Chapter reading screen */
  .chapter-narrative { font-size:0.95rem; line-height:1.9; color:var(--text); margin-bottom:20px; }
  .chapter-verse-reveal { background:var(--surface-2); border:1.5px solid #A78BFA; border-radius:12px; padding:20px; margin-bottom:20px; text-align:center; }
  .chapter-verse-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.12em; color:#A78BFA; font-weight:600; margin-bottom:10px; }
  .chapter-verse-text { font-family:'DM Mono',monospace; font-size:clamp(0.88rem,2.2vw,1rem); line-height:1.8; color:var(--text); font-style:italic; margin-bottom:8px; }
  .chapter-verse-ref { font-size:0.85rem; font-weight:700; color:#A78BFA; }
  .chapter-complete-badge { text-align:center; padding:16px; background:rgba(167,139,250,0.08); border:1px solid #A78BFA; border-radius:12px; margin-bottom:16px; }

  /* Heart Timer System */
  .hearts-empty-screen { text-align:center; padding:24px; width:100%; max-width:560px; }
  .hearts-empty-icon { font-size:4rem; margin-bottom:12px; }
  .hearts-empty-title { font-size:1.4rem; font-weight:700; color:var(--text); margin-bottom:8px; }
  .hearts-empty-desc { font-size:0.88rem; color:var(--text-muted); line-height:1.6; margin-bottom:20px; }
  .hearts-timer-box { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
  .hearts-timer-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:600; margin-bottom:8px; }
  .hearts-timer-countdown { font-size:2rem; font-weight:700; color:var(--teal); font-family:'DM Sans',sans-serif; letter-spacing:-0.02em; }
  .hearts-timer-next { font-size:0.8rem; color:var(--text-muted); margin-top:4px; }
  .hearts-display { display:flex; justify-content:center; gap:8px; margin-bottom:16px; font-size:1.8rem; }
  .pro-tease-box { background:rgba(167,139,250,0.08); border:1.5px solid #A78BFA; border-radius:14px; padding:20px; margin-bottom:16px; }
  .pro-tease-title { font-size:1rem; font-weight:700; color:#A78BFA; margin-bottom:6px; }
  .pro-tease-desc { font-size:0.82rem; color:var(--text-muted); line-height:1.5; margin-bottom:12px; }
  .btn-pro { width:100%; padding:13px; background:linear-gradient(135deg,#7C5CFC,#A78BFA); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:700; color:white; cursor:pointer; margin-bottom:8px; }
  .heart-refill-bar { display:flex; gap:4px; margin:12px 0; }
  .heart-refill-slot { flex:1; height:6px; border-radius:3px; }
  .heart-refill-slot.full { background:var(--earth); }
  .heart-refill-slot.refilling { background:linear-gradient(90deg,var(--earth),#F4B942); animation:pulse 1.5s ease-in-out infinite; }
  .heart-refill-slot.empty { background:var(--border); }
  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* Challenge Banner */
  .challenge-banner-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:99999; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; animation:fadeIn 0.3s ease; }
  .challenge-banner-card { background:linear-gradient(135deg,#1a1a2e,#16213e); border:2px solid #F4B942; border-radius:24px; padding:36px 28px; max-width:420px; width:100%; text-align:center; animation:scaleIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  .challenge-banner-swords { font-size:4rem; margin-bottom:16px; animation:swords 1s ease-in-out infinite alternate; }
  .challenge-banner-title { font-size:2rem; font-weight:700; color:#F4B942; margin-bottom:8px; letter-spacing:-0.02em; line-height:1.1; }
  .challenge-banner-subtitle { font-size:1rem; color:#DFF0E3; margin-bottom:6px; }
  .challenge-banner-from { font-size:0.85rem; color:rgba(255,255,255,0.6); margin-bottom:8px; }
  .challenge-banner-score { display:inline-block; background:rgba(244,185,66,0.15); border:1.5px solid #F4B942; border-radius:12px; padding:10px 24px; margin-bottom:24px; }
  .challenge-banner-score-val { font-size:1.8rem; font-weight:700; color:#F4B942; }
  .challenge-banner-score-label { font-size:0.72rem; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.08em; }
  .challenge-banner-verse { font-size:0.82rem; color:rgba(255,255,255,0.5); margin-bottom:24px; font-style:italic; }
  .btn-accept-challenge { width:100%; padding:16px; background:linear-gradient(135deg,#B87D0A,#F4B942); border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700; color:#1a1a2e; cursor:pointer; margin-bottom:10px; }
  .btn-decline-challenge { width:100%; padding:12px; background:transparent; border:1.5px solid rgba(255,255,255,0.2); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600; color:rgba(255,255,255,0.5); cursor:pointer; }
  @keyframes swords { from{transform:rotate(-15deg) scale(0.9)} to{transform:rotate(15deg) scale(1.1)} }
  @keyframes scaleIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* Challenge System */
  .challenge-card { background:var(--surface); border:1.5px solid #F4B942; border-radius:14px; padding:16px; margin-bottom:10px; }
  .challenge-card.won { border-color:var(--teal); }
  .challenge-card.lost { border-color:var(--earth); }
  .challenge-card.pending { border-color:#F4B942; }
  .challenge-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .challenge-icon { font-size:1.6rem; }
  .challenge-title { font-size:0.92rem; font-weight:700; color:var(--text); }
  .challenge-meta { font-size:0.75rem; color:var(--text-muted); }
  .challenge-scores { display:flex; gap:8px; margin-bottom:10px; }
  .challenge-score-box { flex:1; background:var(--surface-2); border-radius:10px; padding:10px; text-align:center; }
  .challenge-score-val { font-size:1.3rem; font-weight:700; }
  .challenge-score-label { font-size:0.68rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; }
  .challenge-result { text-align:center; font-size:0.82rem; font-weight:700; padding:6px; border-radius:8px; margin-bottom:8px; }
  .challenge-result.win { background:var(--teal-dim); color:var(--teal); }
  .challenge-result.lose { background:var(--earth-dim); color:var(--earth); }
  .challenge-result.pending { background:rgba(244,185,66,0.1); color:#F4B942; }
  .challenge-result.expired { background:var(--surface-2); color:var(--text-muted); }

  /* Avatar System */
  .avatar-picker-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:flex-end; justify-content:center; }
  .avatar-picker-sheet { background:var(--surface); border-radius:20px 20px 0 0; padding:20px; width:100%; max-width:560px; max-height:80vh; overflow-y:auto; }
  .avatar-picker-title { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:16px; text-align:center; }
  .avatar-icon-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:16px; }
  .avatar-icon-btn { width:48px; height:48px; border-radius:12px; border:2px solid transparent; background:var(--surface-2); font-size:1.5rem; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.1s; }
  .avatar-icon-btn:active { transform:scale(0.9); }
  .avatar-icon-btn.selected { border-color:#A78BFA; background:rgba(167,139,250,0.15); }
  .avatar-color-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; justify-content:center; }
  .avatar-color-btn { width:40px; height:40px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:all 0.1s; }
  .avatar-color-btn.selected { border-color:white; box-shadow:0 0 0 2px #A78BFA; }

  /* Profile Page */
  .profile-header { text-align:center; padding:24px 16px 16px; }
  .profile-avatar-lg { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#7C5CFC,#38BDF8); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; color:white; margin:0 auto 12px; }
  .profile-username { font-size:1.4rem; font-weight:700; color:var(--text); margin-bottom:4px; }
  .profile-joined { font-size:0.78rem; color:var(--text-muted); }
  .profile-stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0; }
  .profile-stat { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 8px; text-align:center; }
  .profile-stat-val { font-size:1.4rem; font-weight:700; color:var(--teal); }
  .profile-stat-label { font-size:0.68rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }
  .badge-grid-profile { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:8px; }
  .badge-pill { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 6px; text-align:center; }
  .badge-pill.earned { border-color:#F4B942; background:rgba(244,185,66,0.06); }
  .badge-pill.locked { opacity:0.3; filter:grayscale(1); }
  .badge-pill-icon { font-size:1.4rem; display:block; margin-bottom:4px; }
  .badge-pill-name { font-size:0.62rem; color:var(--text-muted); font-weight:600; line-height:1.3; }
  .recent-score-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); }
  .recent-score-row:last-child { border-bottom:none; }
  .recent-score-game { font-size:1rem; width:28px; }
  .recent-score-info { flex:1; }
  .recent-score-name { font-size:0.85rem; font-weight:600; color:var(--text); }
  .recent-score-diff { font-size:0.72rem; color:var(--text-muted); }
  .recent-score-pts { font-size:0.88rem; font-weight:700; color:var(--teal); }
  .recent-score-date { font-size:0.7rem; color:var(--text-muted); }

  /* Friends & Messaging */
  .friends-screen { width:100%; max-width:560px; }
  .friend-card { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; }
  .friend-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#7C5CFC,#38BDF8); display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:700; color:white; flex-shrink:0; }
  .friend-name { font-size:0.92rem; font-weight:600; color:var(--text); }
  .friend-meta { font-size:0.75rem; color:var(--text-muted); }
  .friend-actions { margin-left:auto; display:flex; gap:6px; }
  .btn-friend-action { padding:6px 12px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--surface-2); color:var(--text); }
  .btn-friend-action.accept { border-color:var(--teal); color:var(--teal); background:var(--teal-dim); }
  .btn-friend-action.decline { border-color:var(--earth); color:var(--earth); background:var(--earth-dim); }
  .btn-friend-action.message { border-color:#A78BFA; color:#A78BFA; background:rgba(167,139,250,0.08); }
  .btn-friend-action.challenge { border-color:#F4B942; color:#F4B942; background:rgba(244,185,66,0.08); }
  .notif-badge { position:absolute; top:-4px; right:-4px; background:#E53E3E; color:white; font-size:0.65rem; font-weight:700; border-radius:10px; padding:2px 5px; min-width:18px; text-align:center; }
  .notif-item { display:flex; align-items:flex-start; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); }
  .notif-item.unread { background:rgba(167,139,250,0.05); }
  .notif-icon { font-size:1.4rem; flex-shrink:0; }
  .notif-text { flex:1; font-size:0.85rem; color:var(--text); line-height:1.5; }
  .notif-time { font-size:0.72rem; color:var(--text-muted); margin-top:2px; }
  .conv-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
  .conv-item:hover { background:var(--surface-2); }
  .conv-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#7C5CFC,#38BDF8); display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:700; color:white; flex-shrink:0; }
  .conv-avatar.group { background:linear-gradient(135deg,#F4B942,#E53E3E); border-radius:12px; }
  .conv-name { font-size:0.92rem; font-weight:600; color:var(--text); }
  .conv-preview { font-size:0.78rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
  .conv-time { font-size:0.72rem; color:var(--text-muted); margin-left:auto; flex-shrink:0; }
  .conv-unread { background:#7C5CFC; color:white; font-size:0.65rem; font-weight:700; border-radius:10px; padding:2px 6px; margin-left:auto; }
  .msg-bubble { max-width:75%; padding:10px 14px; border-radius:16px; margin-bottom:4px; font-size:0.88rem; line-height:1.5; }
  .msg-bubble.mine { background:linear-gradient(135deg,#7C5CFC,#5B4ED4); color:white; border-bottom-right-radius:4px; margin-left:auto; }
  .msg-bubble.theirs { background:var(--surface); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px; }
  .msg-bubble.score-share { border:1.5px solid #F4B942; background:rgba(244,185,66,0.08); }
  .msg-bubble.verse-share { border:1.5px solid #A78BFA; background:rgba(167,139,250,0.08); }
  .msg-reactions { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
  .reaction-chip { padding:2px 8px; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; font-size:0.8rem; cursor:pointer; }
  .reaction-chip.mine { border-color:#A78BFA; background:rgba(167,139,250,0.1); }
  .msg-input-bar { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); background:var(--surface); position:sticky; bottom:0; }
  .msg-input { flex:1; padding:10px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:20px; font-family:'DM Sans',sans-serif; font-size:0.88rem; color:var(--text); outline:none; }
  .msg-input:focus { border-color:#A78BFA; }
  .btn-send { padding:10px 16px; background:linear-gradient(135deg,#7C5CFC,#A78BFA); border:none; border-radius:20px; color:white; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.88rem; cursor:pointer; }
  .search-input { width:100%; padding:11px 16px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--text); outline:none; margin-bottom:12px; box-sizing:border-box; }
  .search-input:focus { border-color:#A78BFA; }
  .friends-tabs { display:flex; gap:6px; margin-bottom:16px; }
  .friends-tab { flex:1; padding:9px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600; color:var(--text-muted); cursor:pointer; text-align:center; }
  .friends-tab.active { border-color:#A78BFA; color:#A78BFA; background:rgba(167,139,250,0.08); }
  .empty-state { text-align:center; padding:32px 16px; color:var(--text-muted); font-size:0.88rem; line-height:1.6; }

  /* Streak System */
  .streak-bar { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:12px; }
  .streak-fire { font-size:1.8rem; }
  .streak-info { flex:1; }
  .streak-count { font-size:1.4rem; font-weight:700; color:var(--earth); line-height:1; }
  .streak-label { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
  .streak-tokens { display:flex; gap:6px; align-items:center; }
  .streak-token { font-size:1.2rem; }
  .streak-token.empty { opacity:0.25; filter:grayscale(1); }
  .streak-warning { background:rgba(244,185,66,0.1); border:1px solid #F4B942; border-radius:10px; padding:10px 14px; font-size:0.82rem; color:#F4B942; font-weight:600; text-align:center; margin-bottom:12px; }
  .streak-milestone { background:rgba(59,191,160,0.1); border:1px solid var(--teal); border-radius:10px; padding:12px 16px; font-size:0.85rem; color:var(--teal); font-weight:600; text-align:center; margin-top:12px; }

  /* Daily Challenge */
  .daily-card { background:linear-gradient(135deg,rgba(167,139,250,0.08),rgba(56,189,248,0.05)); border:1.5px solid #A78BFA; border-radius:16px; padding:20px; margin-bottom:16px; cursor:pointer; transition:all 0.15s; }
  .daily-card:hover { border-color:#7C5CFC; background:linear-gradient(135deg,rgba(167,139,250,0.14),rgba(56,189,248,0.08)); }
  .daily-card.completed { opacity:0.6; cursor:default; border-color:var(--teal); background:var(--teal-dim); }
  .daily-card-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .daily-card-icon { font-size:1.6rem; }
  .daily-card-title { font-size:1rem; font-weight:700; color:var(--text); }
  .daily-card-badge { margin-left:auto; padding:4px 10px; border-radius:20px; font-size:0.7rem; font-weight:700; letter-spacing:0.05em; }
  .daily-badge-new { background:rgba(167,139,250,0.15); color:#A78BFA; border:1px solid #A78BFA; }
  .daily-badge-done { background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal); }
  .daily-card-desc { font-size:0.82rem; color:var(--text-muted); line-height:1.5; }
  .daily-lb-row { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--border); }
  .daily-lb-row:last-child { border-bottom:none; }
  .daily-lb-row.highlight { background:rgba(167,139,250,0.08); }
  .daily-countdown { font-size:0.78rem; color:var(--text-muted); text-align:center; margin-top:8px; }

  /* Monthly Champion Modal */
  .champion-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
  .champion-card { background:var(--surface); border:1.5px solid #F4B942; border-radius:20px; padding:28px 24px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; }
  .champion-header { text-align:center; margin-bottom:20px; }
  .champion-icon { font-size:3rem; margin-bottom:8px; }
  .champion-title { font-size:1.3rem; font-weight:700; color:#F4B942; margin-bottom:4px; }
  .champion-subtitle { font-size:0.82rem; color:var(--text-muted); }
  .champion-section { margin-bottom:16px; }
  .champion-section-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .champion-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .champion-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
  .champion-row:last-child { border-bottom:none; }
  .champion-rank { font-size:1.2rem; width:28px; text-align:center; flex-shrink:0; }
  .champion-name { flex:1; font-size:0.88rem; font-weight:600; color:var(--text); }
  .champion-score { font-size:0.88rem; font-weight:700; color:#F4B942; }
  .btn-champion-close { width:100%; padding:14px; background:linear-gradient(135deg,#4A7C59,#3BBFA0); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:700; color:white; cursor:pointer; margin-top:16px; }

  /* Game leaderboards */
  .game-lb { width:100%; max-width:560px; }
  .game-lb-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .game-lb-tab { padding:7px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600; color:var(--text-muted); cursor:pointer; }
  .game-lb-tab.active { border-color:var(--teal); color:var(--teal); background:var(--teal-dim); }
  .game-lb-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); }
  .game-lb-row:last-child { border-bottom:none; }
  .game-lb-rank { font-size:1.1rem; width:28px; text-align:center; flex-shrink:0; }
  .game-lb-name { flex:1; font-size:0.88rem; font-weight:600; color:var(--text); }
  .game-lb-score { font-size:0.88rem; font-weight:700; color:var(--teal); }
  .game-lb-diff { font-size:0.68rem; color:var(--text-muted); margin-top:1px; }
  .mini-results-lb { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-top:16px; }
  .mini-results-lb-title { padding:10px 14px; font-size:0.78rem; font-weight:700; color:var(--text); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .mini-results-lb-title button { font-size:0.72rem; color:var(--teal); background:none; border:none; font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer; }

  /* Duolingo word chips */
  .word-bank { display:flex; flex-wrap:wrap; gap:8px; padding:12px; background:var(--surface); border:1px solid var(--border); border-radius:12px; min-height:60px; margin-bottom:12px; }
  .word-chip { padding:8px 14px; background:var(--surface-2); border:1.5px solid var(--border-hi); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600; color:var(--text); cursor:pointer; transition:all 0.12s; user-select:none; }
  .word-chip:active { transform:scale(0.95); background:rgba(167,139,250,0.15); border-color:#A78BFA; }
  .word-chip.used { opacity:0.25; cursor:default; pointer-events:none; }
  .word-chip.correct { background:var(--teal-dim); border-color:var(--teal); color:var(--teal); }
  .word-chip.wrong { background:var(--earth-dim); border-color:var(--earth); color:var(--earth); animation:shake 0.3s ease; }
  .answer-row { display:flex; flex-wrap:wrap; gap:6px; min-height:44px; padding:10px 12px; background:var(--surface-2); border:1.5px dashed var(--border-hi); border-radius:10px; margin-bottom:10px; align-items:center; }
  .answer-chip { padding:6px 12px; background:linear-gradient(135deg,rgba(167,139,250,0.15),rgba(56,189,248,0.1)); border:1.5px solid #A78BFA; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600; color:var(--text); cursor:pointer; transition:all 0.12s; }
  .answer-chip:active { transform:scale(0.95); opacity:0.7; }
  .answer-placeholder { font-size:0.78rem; color:var(--text-muted); font-style:italic; }

  /* Interactive Story */
  .story-hearts { display:flex; gap:4px; justify-content:center; margin-bottom:8px; font-size:1.4rem; }
  .story-round-bar { display:flex; gap:6px; margin-bottom:16px; }
  .story-round-dot { flex:1; height:6px; border-radius:3px; background:var(--border); transition:background 0.3s; }
  .story-round-dot.active { background:#A78BFA; box-shadow:0 0 6px #A78BFA; }
  .story-round-dot.done { background:linear-gradient(90deg,#A78BFA,#38BDF8); }
  .story-choice { width:100%; padding:14px 18px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:600; color:var(--text); cursor:pointer; transition:all 0.15s; text-align:left; margin-bottom:8px; display:block; }
  .story-choice:active { border-color:#A78BFA; background:rgba(167,139,250,0.1); }
  .story-choice.correct { border-color:var(--teal); background:var(--teal-dim); color:var(--teal); }
  .story-choice.wrong { border-color:var(--earth); background:var(--earth-dim); color:var(--earth); animation:shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .story-type-input { width:100%; padding:12px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--text); outline:none; margin-bottom:8px; }
  .story-type-input:focus { border-color:#A78BFA; }
  .story-type-input.correct { border-color:var(--teal); background:var(--teal-dim); }
  .story-type-input.wrong { border-color:var(--earth); background:var(--earth-dim); }
  .story-stars { font-size:1.6rem; text-align:center; margin:8px 0; letter-spacing:4px; }
  .story-round-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:#A78BFA; font-weight:600; margin-bottom:12px; text-align:center; }
  .story-feedback { min-height:24px; font-size:0.85rem; font-weight:600; text-align:center; margin-top:4px; }
  .story-feedback.correct { color:var(--teal); }
  .story-feedback.wrong { color:var(--earth); }

  /* Translation switcher */
  .translation-switcher { display:flex; gap:0; background:var(--surface-2); border-radius:10px; overflow:hidden; margin-bottom:16px; border:1px solid var(--border); }
  .trans-btn { flex:1; padding:9px 12px; text-align:center; font-size:0.82rem; font-weight:600; color:var(--text-muted); cursor:pointer; border:none; background:transparent; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .trans-btn.active { background:var(--surface); color:var(--teal); }
  .trans-btn:active { background:var(--surface); }
  .trans-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:600; margin-bottom:6px; }

  /* Username prompt */
  .username-prompt { background:var(--surface); border:1.5px solid var(--fern); border-radius:14px; padding:20px; margin-bottom:16px; width:100%; max-width:560px; }
  .username-prompt-title { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:4px; }
  .username-prompt-desc { font-size:0.8rem; color:var(--text-muted); margin-bottom:14px; line-height:1.5; }
  .username-prompt-row { display:flex; gap:8px; }
  .username-prompt-input { flex:1; padding:10px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--text); outline:none; }
  .username-prompt-input:focus { border-color:var(--fern); }
  .username-prompt-input::placeholder { color:var(--text-muted); }
  .btn-set-username { padding:10px 16px; background:linear-gradient(135deg,#4A7C59,#3BBFA0); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:700; color:white; cursor:pointer; white-space:nowrap; }
  .username-prompt-error { font-size:0.75rem; color:var(--earth); margin-top:6px; display:none; }
  .username-prompt-success { font-size:0.75rem; color:var(--teal); margin-top:6px; display:none; }

  /* Flashcard */
  .train-screen { width:100%; max-width:560px; }
  .train-modes { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .train-mode-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:18px 20px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:all 0.15s; }
  .train-mode-card:active { border-color:var(--fern); background:rgba(107,175,122,0.07); }
  .train-mode-icon { font-size:1.8rem; flex-shrink:0; }
  .train-mode-info { flex:1; }
  .train-mode-name { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:2px; }
  .train-mode-desc { font-size:0.8rem; color:var(--text-muted); line-height:1.4; }
  .train-mode-badge { font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:0.05em; flex-shrink:0; }
  .badge-soon { background:rgba(107,175,122,0.1); color:var(--fern); border:1px solid var(--fern); }

  /* Flashcard setup */
  .flashcard-setup { width:100%; max-width:560px; }
  .setup-section { margin-bottom:20px; }
  .setup-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .setup-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .setup-options { display:flex; flex-wrap:wrap; gap:7px; }
  .setup-btn { padding:8px 14px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.15s; }
  .setup-btn.selected { border-color:var(--teal); color:var(--teal); background:var(--teal-dim); }
  .setup-btn:active { border-color:var(--fern); }

  /* Flashcard */
  .flashcard-hud { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:18px; overflow:hidden; width:100%; max-width:560px; font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; }
  .flashcard-hud-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; padding:9px 0; border-right:1px solid var(--border); }
  .flashcard-hud-item:last-child { border-right:none; }
  .flashcard-hud-item strong { color:var(--text); font-size:1.1rem; font-weight:700; display:block; }

  .flashcard-wrap { width:100%; max-width:560px; perspective:1000px; }
  .flashcard { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px 24px; min-height:220px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; cursor:pointer; transition:all 0.15s; position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
  .flashcard:active { transform:scale(0.98); }
  .flashcard-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted); font-weight:600; margin-bottom:16px; }
  .flashcard-reference { font-size:1.8rem; font-weight:700; color:var(--text); margin-bottom:8px; background:linear-gradient(135deg,#8FD9A8,#3BBFA0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .flashcard-book { font-size:0.85rem; color:var(--text-muted); margin-bottom:20px; }
  .flashcard-tap-hint { font-size:0.75rem; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
  .flashcard-verse { font-family:'DM Mono',monospace; font-size:clamp(0.88rem,2.2vw,1rem); line-height:1.8; color:var(--text); font-style:italic; margin-bottom:16px; }
  .flashcard-ref-revealed { font-size:1rem; font-weight:700; color:var(--teal); margin-bottom:20px; }

  .rating-btns { display:flex; gap:10px; width:100%; max-width:560px; margin-top:14px; }
  .rating-btn { flex:1; padding:14px 8px; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition:all 0.15s; }
  .rating-btn:active { transform:scale(0.97); }
  .rating-knew { background:var(--teal-dim); color:var(--teal); border:1.5px solid var(--teal); }
  .rating-almost { background:rgba(107,175,122,0.12); color:var(--fern); border:1.5px solid var(--fern); }
  .rating-didnt { background:var(--earth-dim); color:var(--earth); border:1.5px solid var(--earth); }
  .rating-icon { font-size:1.4rem; }

  .flashcard-progress-bar { width:100%; max-width:560px; height:4px; background:var(--border); border-radius:2px; margin-bottom:16px; overflow:hidden; }
  .flashcard-progress-fill { height:100%; background:linear-gradient(90deg,#4A7C59,#3BBFA0); border-radius:2px; transition:width 0.4s ease; }


  /* Flashcard hints */
  .hint-strip { width:100%; max-width:560px; display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .hint-item { background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; display:flex; align-items:flex-start; gap:10px; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .hint-icon { font-size:1rem; flex-shrink:0; margin-top:1px; }
  .hint-content { flex:1; }

  } catch(e) {}

function calculateStreak(scores) {
  if(!scores.length) return 0;
  const today = new Date().toDateString();
  const dates = [...new Set(scores.map(s => new Date(s.created_at).toDateString()))];
  let streak = 0;
  let check = new Date();
  for(let i = 0; i < 30; i++) {
    if(dates.includes(check.toDateString())) {
      streak++;
      check.setDate(check.getDate() - 1);
    } else break;
  }
  return streak;
}

// ═══════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════
async function sbFetch(path, options={}) {
  const token = authToken || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
async function authFetch(endpoint, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Auth error');
  return data;
}

async function signUp(email, password) {
  const data = await authFetch('signup', { email, password });
  return data;
}

async function signIn(email, password) {
  const data = await authFetch('token?grant_type=password', { email, password });
  currentUser = data.user;
  authToken = data.access_token;
  localStorage.setItem('ss_token', authToken);
  localStorage.setItem('ss_user', JSON.stringify(currentUser));
  // Fetch username from profiles
  try {
    const profiles = await sbFetch(`profiles?id=eq.${currentUser.id}&select=username,avatar_icon,avatar_color`);
    if(profiles.length) {
      currentUsername = profiles[0].username;
      playerName = currentUsername;
      localStorage.setItem('ss_username', currentUsername);
    } else {
      playerName = email.split('@')[0];
    }
  } catch(e) {
    playerName = email.split('@')[0];
  }
  return data;
}

async function signOut() {
  await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}` }
  });
  currentUser = null;
  authToken = null;
  currentUsername = '';
  localStorage.removeItem('ss_token');
  localStorage.removeItem('ss_user');
  localStorage.removeItem('ss_username');
  renderAuthScreen();
  document.getElementById('navTabs').style.display = 'none';
  document.getElementById('userBar').style.display = 'none';
}

async function restoreSession() {
  const token = localStorage.getItem('ss_token');
  const user  = localStorage.getItem('ss_user');
  if (token && user) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        authToken = token;
        currentUser = JSON.parse(user);
        // Restore username from local storage or fetch from profiles
        const savedUsername = localStorage.getItem('ss_username');
        if(savedUsername) {
          currentUsername = savedUsername;
          playerName = currentUsername;
        } else {
          try {
            const profiles = await sbFetch(`profiles?id=eq.${currentUser.id}&select=username,avatar_icon,avatar_color`);
            if(profiles.length) {
              currentUsername = profiles[0].username;
              playerName = currentUsername;
              localStorage.setItem('ss_username', currentUsername);
            } else {
              playerName = currentUser.email.split('@')[0];
            }
          } catch(e) {
            playerName = currentUser.email.split('@')[0];
          }
        }
        return true;
      }
    } catch(e) {}
    localStorage.removeItem('ss_token');
    localStorage.removeItem('ss_user');
    localStorage.removeItem('ss_username');
  }
  return false;
}

async function createProfile(userId, username) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ id: userId, username })
  });
  if(!res.ok) {
    const err = await res.json();
    if(err.code === '23505') throw new Error('That username is already taken — try another!');
    throw new Error('Could not save username');
  }
}

function getAuthHeaders() {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${authToken || SUPABASE_KEY}`,
    'Content-Type': 'application/json'
  };
}

async function handleAuth(mode) {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  const sucEl = document.getElementById('authSuccess');
  const btn = document.getElementById('authSubmitBtn');

  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = mode==='login' ? 'Signing in…' : 'Creating account…';
  btn.disabled = true;

  try {
    if (mode === 'signup') {
      const usernameEl = document.getElementById('authUsername');
      const username = usernameEl ? usernameEl.value.trim() : '';
      if(!username) {
        errEl.textContent = 'Please choose a username.';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }
      if(username.length < 3) {
        errEl.textContent = 'Username must be at least 3 characters.';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }
      // Check username availability first
      const existing = await sbFetch(`profiles?username=eq.${encodeURIComponent(username)}&select=id`);
      if(existing.length) {
        errEl.textContent = '⚠️ That username is already taken — try another!';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }
      // Store username temporarily to use after email confirmation
      localStorage.setItem('ss_pending_username', username);
      const data = await signUp(email, password);
      // If auto-confirmed, create profile immediately
      if(data.user && data.access_token) {
        authToken = data.access_token;
        currentUser = data.user;
        await createProfile(data.user.id, username);
        currentUsername = username;
        playerName = username;
        localStorage.setItem('ss_username', username);
        localStorage.removeItem('ss_pending_username');
      }
      sucEl.textContent = '✓ Account created! Check your email to confirm, then sign in.';
      sucEl.style.display = 'block';
      btn.textContent = 'Create Account →';
      btn.disabled = false;
      setTimeout(()=>renderAuthScreen('login'), 3000);
    } else {
      await signIn(email, password);
      // If no profile yet but pending username exists, create it now
      const pendingUsername = localStorage.getItem('ss_pending_username');
      if(pendingUsername && currentUser && !currentUsername) {
        try {
          await createProfile(currentUser.id, pendingUsername);
          currentUsername = pendingUsername;
          playerName = pendingUsername;
          localStorage.setItem('ss_username', pendingUsername);
          localStorage.removeItem('ss_pending_username');
        } catch(e) { /* profile may already exist */ }
      }
      showApp();
    }
  } catch(e) {
    errEl.textContent = `⚠️ ${e.message}`;
    errEl.style.display = 'block';
    btn.textContent = mode==='login'?'Sign In →':'Create Account →';
    btn.disabled = false;
  }
}

async function saveUsername() {
  const input = document.getElementById('usernamePromptInput');
  const errEl = document.getElementById('usernamePromptError');
  const btn   = document.getElementById('usernamePromptBtn');
  if(!input) return;

  const username = input.value.trim();
  if(errEl) errEl.style.display = 'none';

  if(!username) { if(errEl) { errEl.textContent = 'Please enter a username.'; errEl.style.display = 'block'; } return; }
  if(username.length < 3) { if(errEl) { errEl.textContent = 'Must be at least 3 characters.'; errEl.style.display = 'block'; } return; }
  if(username.length > 20) { if(errEl) { errEl.textContent = 'Must be 20 characters or less.'; errEl.style.display = 'block'; } return; }

  if(btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

  try {
    // Check availability
    const existing = await sbFetch(`profiles?username=eq.${encodeURIComponent(username)}&select=id`);
    if(existing.length && existing[0].id !== currentUser?.id) {
      if(errEl) { errEl.textContent = '⚠️ That username is taken — try another!'; errEl.style.display = 'block'; }
      if(btn) { btn.textContent = "Let's Go! →"; btn.disabled = false; }
      return;
    }

    await createProfile(currentUser.id, username);
    currentUsername = username;
    playerName = username;
    localStorage.setItem('ss_username', username);

    // Update user bar display name
    const userBarEmail = document.querySelector('.user-bar-email');
    if(userBarEmail) userBarEmail.textContent = `👤 ${username}`;

    // Remove whichever prompt is showing
    document.getElementById('usernamePromptOverlay')?.remove();
    document.getElementById('usernamePrompt')?.remove();

    showStreakToast(`✅ Welcome, ${username}!`);
    showHome();

  } catch(e) {
    if(errEl) { errEl.textContent = `⚠️ ${e.message || 'Could not save username. Try again.'}`;  errEl.style.display = 'block'; }
    if(btn) { btn.textContent = "Let's Go! →"; btn.disabled = false; }
  }
}

async function fetchEndlessVerse() {
  // Pick from all difficulties mixed
  const diffs = ['easy','medium','hard'];
  const diff = diffs[Math.floor(Math.random()*diffs.length)];
  const total = DIFF_COUNTS[TRANSLATION][diff];
  const offset = Math.floor(Math.random()*total);
  const rows = await sbFetch(`verses?translation=eq.${TRANSLATION}&difficulty=eq.${diff}&select=*&limit=1&offset=${offset}`);
  if(!rows.length) throw new Error('Could not fetch verse');
  const row = rows[0];
  return {t:row.testament, book:row.book, ch:row.chapter, v:row.verse, text:row.text};
}

async function fetchVerse() {
  const total = DIFF_COUNTS[TRANSLATION][difficulty];
  let attempts = 0;
  while (attempts < 10) {
    attempts++;
    const offset = Math.floor(Math.random() * total);
    const rows = await sbFetch(
      `verses?translation=eq.${TRANSLATION}&difficulty=eq.${difficulty}&select=*&limit=1&offset=${offset}`
    );
    if (!rows.length) continue;
    const row = rows[0];
    // Avoid repeating the exact same verse ID recently
    if (usedIds.has(row.id) && usedIds.size < Math.min(50, total * 0.5)) continue;
    usedIds.add(row.id);
    // Keep pool at max 50 to allow cycling
    if (usedIds.size > 50) {
      const first = usedIds.values().next().value;
      usedIds.delete(first);
    }
    return {t:row.testament, book:row.book, ch:row.chapter, v:row.verse, text:row.text, id:row.id};
  }
  throw new Error('Could not fetch a verse — please try again.');
}

async function submitScore(name, scoreVal, diff) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${authToken || SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };

  // Submit to leaderboard
  const lbBody = { name, score: scoreVal, difficulty: diff };
  if (currentUser) lbBody.user_id = currentUser.id;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
    method: 'POST', headers, body: JSON.stringify(lbBody)
  });
  if (!res.ok) throw new Error(`Submit failed: ${res.status}`);

  // Save to personal history if logged in
  if (currentUser) {
    const total = TOTAL_ROUNDS * maxPhases();
    await fetch(`${SUPABASE_URL}/rest/v1/user_scores`, {
      method: 'POST', headers,
      body: JSON.stringify({
        user_id: currentUser.id,
        score: scoreVal,
        difficulty: diff,
        correct: correctCount,
        total: total
      })
    });
  }
}

async function fetchLeaderboard(diff, weeksBack=null) {
  let url = `leaderboard?select=*&difficulty=eq.${diff}&order=score.desc&limit=20`;
  if(weeksBack) {
    const since = new Date(Date.now() - weeksBack * 7 * 24 * 60 * 60 * 1000).toISOString();
    url += `&created_at=gte.${since}`;
  }
  return sbFetch(url);
}
