function renderEndlessPhase() {
  const area = document.getElementById('choicesArea');
  if(!area) return;

  if(phase === 0) {
    area.innerHTML = `<div class="btn-group"><button class="btn" id="otBtn">📜 Old Testament</button><button class="btn" id="ntBtn">✝️ New Testament</button></div>`;
    document.getElementById('otBtn').onclick = () => endlessGuess('testament', 'OT');
    document.getElementById('ntBtn').onclick = () => endlessGuess('testament', 'NT');
  } else if(phase === 1) {
    const books = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).map(b=>b[0]);
    area.innerHTML = `<div class="book-grid">${books.map(b=>`<button class="book-btn" data-book="${b}">${b}</button>`).join('')}</div>`;
    area.querySelectorAll('.book-btn').forEach(btn=>btn.addEventListener('click',()=>endlessGuess('book', btn.dataset.book)));
  } else if(phase === 2) {
    const entry = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).find(b=>b[0]===currentVerse.book);
    const n = entry?entry[1]:30;
    area.innerHTML = `<div class="chapter-grid">${Array.from({length:n},(_,i)=>i+1).map(c=>`<button class="chapter-btn" data-ch="${c}">${c}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>endlessGuess('chapter', parseInt(btn.dataset.ch))));
  } else if(phase === 3) {
    const correct = currentVerse.v;
    const lo = Math.max(1, correct-5);
    const hi = lo+9;
    const verses = Array.from({length:hi-lo+1},(_,i)=>lo+i);
    area.innerHTML = `<div class="phase-note">Guess the verse number:</div><div class="chapter-grid">${verses.map(v=>`<button class="chapter-btn" data-v="${v}">${v}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>endlessGuess('verse', parseInt(btn.dataset.v))));
  }
}

function endlessGuess(type, choice) {
  const pts = Math.round(ENDLESS_BASE_POINTS * endlessMultiplier);
  let correct = false;
  let reveal = null;

  if(type==='testament') {
    correct = choice === currentVerse.t;
    reveal = correct ? null : (currentVerse.t==='OT'?'Old Testament':'New Testament');
    document.querySelectorAll('.btn').forEach(btn=>{
      btn.disabled=true;
      const val=btn.textContent.includes('Old')?'OT':'NT';
      if(val===currentVerse.t) btn.classList.add(correct&&val===choice?'correct':'reveal');
      if(val===choice&&!correct) btn.classList.add('wrong');
    });
  } else if(type==='book') {
    correct = choice === currentVerse.book;
    reveal = correct ? null : currentVerse.book;
    document.querySelectorAll('.book-btn').forEach(btn=>{
      btn.disabled=true;
      const name=btn.textContent.trim();
      if(name===currentVerse.book) btn.classList.add(correct&&name===choice?'correct':'reveal');
      if(name===choice&&!correct) btn.classList.add('wrong');
    });
  } else if(type==='chapter') {
    correct = choice === currentVerse.ch;
    reveal = correct ? null : `Chapter ${currentVerse.ch}`;
    document.querySelectorAll('.chapter-btn').forEach(btn=>{
      btn.disabled=true;
      const n=parseInt(btn.textContent);
      if(n===currentVerse.ch) btn.classList.add(correct&&n===choice?'correct':'reveal');
      if(n===choice&&!correct) btn.classList.add('wrong');
    });
  } else if(type==='verse') {
    correct = choice === currentVerse.v;
    reveal = correct ? null : `Verse ${currentVerse.v}`;
    document.querySelectorAll('.chapter-btn').forEach(btn=>{
      btn.disabled=true;
      const n=parseInt(btn.textContent);
      if(n===currentVerse.v) btn.classList.add(correct&&n===choice?'correct':'reveal');
      if(n===choice&&!correct) btn.classList.add('wrong');
    });
  }

  const fb = document.getElementById('feedback');
  if(correct) {
    endlessScore += pts;
    updateEndlessHUD();
    if(fb){ fb.className='feedback correct'; fb.innerHTML=`✓ Correct! <span class="points-pop">+${pts}</span>`; }
    phase++;
    setTimeout(()=>{
      if(phase < 4) {
        const label = document.getElementById('phaseLabel');
        if(label){ const p=Math.round(ENDLESS_BASE_POINTS*endlessMultiplier); label.innerHTML=`${getStepLabel(phase)} <span class="pts-hint">(+${p} pts)</span>`; }
        document.querySelectorAll('.phase-dot').forEach((d,i)=>{d.className=`phase-dot${i<phase?' done':i===phase?' active':''}`;});
        renderEndlessPhase();
      } else {
        // Completed all 4 phases — next verse!
        endlessStreak++;
        endlessMultiplier = parseFloat((1 + endlessStreak * 0.2).toFixed(1));
        updateEndlessHUD();
        phase = 0;
        const area = document.getElementById('choicesArea');
        if(area) area.innerHTML = `
          <div class="ref-box">📖 <strong>${currentVerse.book} ${currentVerse.ch}:${currentVerse.v}</strong></div>
          <div class="bank-bar">
            <button class="btn-next" id="continueBtn">Keep Going →</button>
            <button class="btn-bank" id="bankBtn">🏦 Bank Score</button>
          </div>`;
        document.getElementById('continueBtn')?.addEventListener('click', async()=>{
          const card=document.getElementById('card');
          showSpinner(card);
          try{ currentVerse=await fetchEndlessVerse(); renderEndlessCard(); }
          catch(e){ showError(card,e.message); }
        });
        document.getElementById('bankBtn')?.addEventListener('click', ()=>endlessGameOver(false));
      }
    }, 1100);
  } else {
    // WRONG — game over, lose everything
    if(fb){ fb.className='feedback wrong'; fb.innerHTML=`✗ Wrong${reveal?` — it was <strong>${reveal}</strong>`:''}. Run ended! 💀`; }
    setTimeout(()=>endlessGameOver(true), 1800);
  }
}

function endlessGameOver(lost) {

  const card = document.getElementById('card');
  if(!card) return;
  card.innerHTML = `
    <div class="game-over-endless">
      <div class="verse-label">${lost?'💀 Run Ended':'🏦 Score Banked'}</div>
      <h2>${lost?'So close...':'Well played, Scout!'}</h2>
      <div class="endless-final">${endlessScore.toLocaleString()}</div>

        <input class="name-input" id="nameInput" type="text" maxlength="24"

      </div>
      <button class="btn-next" id="submitEndlessBtn">Submit Score 🏆</button>

    </div>`;

  document.getElementById('submitEndlessBtn').onclick = async() => {

    if(!name){ document.getElementById('nameInput').focus(); return; }
    playerName = name;
    localStorage.setItem('ss_player_name', name);
    document.getElementById('submitEndlessBtn').textContent = 'Submitting…';
    document.getElementById('submitEndlessBtn').disabled = true;
    try {
      await submitScore(name, endlessScore, 'endless');
      document.getElementById('submitEndlessBtn').textContent = '✓ Submitted!';
      setTimeout(()=>{ lbFilter='endless'; switchTab('leaderboard'); }, 1200);
    } catch(e) {
      const btn = document.getElementById('submitEndlessBtn');
      const isAuthError = e.message.includes('401') || e.message.includes('403') || e.message.includes('JWT');

  document.getElementById('chooseDiffEndlessBtn').onclick = ()=>{ endlessMode=false; renderDiffScreen(); };

function diffLabel()      { return difficulty==='easy'?'🌱 Easy':difficulty==='medium'?'🌿 Medium':'🪨 Hard'; }
function diffBadgeClass() { return `badge-${difficulty}`; }
function rankLabel(s) {
  if(difficulty==='hard'){if(s>=14000)return'Theologian of the Ages 📜';if(s>=10000)return'Deep Waters Scholar 🌊';if(s>=6000)return'Diligent Student 📚';return'Keep digging! ⛏️';}
  if(s>=12000)return'Scribe of the Ages 📜';if(s>=9000)return'Prophet-in-Training 🔥';if(s>=6000)return'Faithful Disciple ✝️';if(s>=3000)return'Earnest Seeker 🙏';return'Keep studying! 📖';
}

function showSpinner(card) {
  card.innerHTML=`<div class="verse-label">Loading…</div><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Fetching from Scripture…</div></div>`;
}
function showError(card,msg) {
  card.innerHTML=`<div class="error-box">⚠️ ${msg}</div><button class="btn-next" id="retryBtn">Retry</button><button class="btn-change-diff" id="backBtn">← Back</button>`;
  document.getElementById('retryBtn').onclick=async()=>{
    // Retry fetching the current verse — keep score and progress intact
    showSpinner(card);
    try {
      currentVerse = await fetchVerse();
      renderCard(card);
    } catch(e) { showError(card, e.message); }
  };
  document.getElementById('backBtn').onclick=renderDiffScreen;
}

async function startGame(diff) {
  difficulty=diff; score=0; streak=0; round=1; phase=0; hintUsed=false; correctCount=0; usedIds.clear();
  document.getElementById('root').innerHTML=`
    <div class="hud">
      <div class="hud-item"><strong id="scoreDisplay">0</strong> pts</div>
      <div class="hud-item"><strong id="streakDisplay">0</strong> streak</div>
      <div class="hud-item"><strong id="roundDisplay">1</strong> / ${TOTAL_ROUNDS}</div>
      <div class="hud-item"><span class="hud-diff ${diffBadgeClass()}">${diffLabel()}</span></div>
      <div class="hud-item" style="font-size:0.7rem;"><strong style="font-size:0.85rem;">${TRANSLATION}</strong> trans</div>
    </div>
    <div class="card" id="card"></div>`;
  const card=document.getElementById('card');
  showSpinner(card);
  try{currentVerse=await fetchVerse();renderCard();}
  catch(e){showError(card,e.message);}
}

function updateHUD() {
  const s=document.getElementById('scoreDisplay');
  const st=document.getElementById('streakDisplay');
  const r=document.getElementById('roundDisplay');
  if(s)s.textContent=score.toLocaleString();
  if(st)st.textContent=streak;
  if(r)r.textContent=round;
}

function hintCost(pts) {
  if(difficulty==='easy')   return Math.floor(pts * 0.5);
  if(difficulty==='medium') return Math.floor(pts * 0.667);
  return pts; // hard — full cost
}

function hintLabel() {
  const pts = POINTS[getPhaseKey(Math.min(phase, maxPhases()-1))];
  const cost = hintCost(pts);
  return `💡 Hint <span class="hint-cost">-${cost}pts</span>`;
}

function applyHint() {
  if(hintUsed) return;
  hintUsed = true;
  const pts = POINTS[getPhaseKey(Math.min(phase, maxPhases()-1))];
  const cost = hintCost(pts);
  score = Math.max(0, score - cost);
  updateHUD();

  // Disable hint button
  const btn = document.getElementById('hintBtn');
  if(btn) { btn.disabled=true; btn.innerHTML='💡 Hint used'; }

  // Show relevant hint
  showHintBox();
}

function showHintBox() {
  // Remove existing hint
  const existing = document.getElementById('easyHint');
  if(existing) existing.remove();

  let hintText = '';

  if(phase === 0) {
    // Testament hint — reveal first letter of the book
    hintText = `The book starts with the letter <strong>${currentVerse.book[0]}</strong>`;
  } else if(phase === 1) {
    // Book hint — eliminate half the wrong books
    const books = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).map(b=>b[0]);
    const wrong = books.filter(b=>b!==currentVerse.book);
    // Shuffle and keep half as "eliminated"
    const shuffled = wrong.sort(()=>Math.random()-0.5);
    const eliminate = shuffled.slice(0, Math.floor(wrong.length/2));
    // Grey out eliminated books in the grid
    document.querySelectorAll('.book-btn').forEach(btn=>{
      if(eliminate.includes(btn.textContent.trim())) {
        btn.style.opacity='0.25';
        btn.disabled=true;
      }
    });
    hintText = `Eliminated <strong>${eliminate.length}</strong> wrong books`;
  } else if(phase === 2) {
    // Chapter hint — show range of 3 centered on correct
    const correct = currentVerse.ch;
    const entry = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).find(b=>b[0]===currentVerse.book);
    const total = entry?entry[1]:30;
    const lo = Math.max(1, correct-1);
    const hi = Math.min(total, correct+1);
    hintText = `The chapter is between <strong>${lo}</strong> and <strong>${hi}</strong>`;
  } else if(phase === 3) {
    // Verse hint — narrow to 3 verse numbers
    const correct = currentVerse.v;
    const lo = Math.max(1, correct-1);
    const hi = correct+1;
    hintText = `The verse number is between <strong>${lo}</strong> and <strong>${hi}</strong>`;
  }

  if(!hintText) return;
  const hintEl = document.createElement('div');
  hintEl.id = 'easyHint';
  hintEl.className = 'hint-box';
  hintEl.innerHTML = `💡 ${hintText}`;
  const choicesArea = document.getElementById('choicesArea');
  if(choicesArea) choicesArea.insertAdjacentElement('beforebegin', hintEl);
}

function getStepLabel(p) {
  const labels = ['Step 1 — Old or New Testament?','Step 2 — Which book?','Step 3 — Which chapter?','Step 4 — Which verse number?'];
  return labels[p] || '';
}
function getPhaseKey(p) {
  return ['testament','book','chapter','verse'][p] || 'testament';
}

function renderCard() {
  const card=document.getElementById('card');
  if(!card)return;
  if(round>TOTAL_ROUNDS){renderGameOver(card);return;}
  hintUsed=false;
  const mp=maxPhases();
  const dots=Array.from({length:mp},(_,i)=>`<div class="phase-dot ${i<phase?'done':i===phase?'active':''}"></div>`).join('');
  const pts=POINTS[getPhaseKey(Math.min(phase,mp-1))];
  const stepLabel=getStepLabel(phase);

  card.innerHTML=`
    <div class="verse-label">Verse ${round} of ${TOTAL_ROUNDS}</div>
    <div class="verse-text">"${currentVerse.text}"</div>
    <hr class="divider"/>
    <div class="phase-bar">${dots}</div>
    <div class="phase-label" id="phaseLabel">${stepLabel} <span class="pts-hint">(+${pts} pts)</span></div>
    <div id="choicesArea"></div>
    <div class="feedback" id="feedback"></div>`;
  renderPhase();
}

function renderPhase() {
  const area=document.getElementById('choicesArea');
  if(!area)return;
  const mp=maxPhases();

  // Remove any existing hint button and hint box before adding new ones
  const oldHintWrap = document.querySelector('.hint-btn-wrap');
  if(oldHintWrap) oldHintWrap.remove();
  const oldHintBox = document.getElementById('easyHint');
  if(oldHintBox) oldHintBox.remove();

  // Add fresh hint button before choices
  const hintWrap = document.createElement('div');
  hintWrap.className = 'hint-btn-wrap';
  hintWrap.innerHTML = `<button class="hint-btn" id="hintBtn" ${hintUsed?'disabled':''} onclick="applyHint()">${hintUsed?'💡 Hint used':hintLabel()}</button>`;
  area.parentElement.insertBefore(hintWrap, area);

  if(phase===0){
    // Testament guess — same for all difficulties
    area.innerHTML=`<div class="btn-group"><button class="btn" id="otBtn">📜 Old Testament</button><button class="btn" id="ntBtn">✝️ New Testament</button></div>`;
    document.getElementById('otBtn').onclick=()=>guessTestament('OT');
    document.getElementById('ntBtn').onclick=()=>guessTestament('NT');

  } else if(phase===1){
    // Book guess — same for all difficulties (easy already has hint above)
    const books=(currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).map(b=>b[0]);
    area.innerHTML=`<div class="book-grid">${books.map(b=>`<button class="book-btn" data-book="${b}">${b}</button>`).join('')}</div>`;
    area.querySelectorAll('.book-btn').forEach(btn=>btn.addEventListener('click',()=>guessBook(btn.dataset.book)));

  } else if(phase===2){
    // Chapter guess
    const entry=(currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).find(b=>b[0]===currentVerse.book);
    const totalChapters=entry?entry[1]:30;

    let chapters;
    if(difficulty==='easy') {
      // Easy: show only 6 nearby chapters centered around correct answer
      const correct=currentVerse.ch;
      const half=3;
      let start=Math.max(1,correct-half);
      let end=Math.min(totalChapters,start+5);
      start=Math.max(1,end-5);
      chapters=Array.from({length:end-start+1},(_,i)=>start+i);
    } else {
      // Medium/Hard: show all chapters
      chapters=Array.from({length:totalChapters},(_,i)=>i+1);
    }

    area.innerHTML=`<div class="chapter-grid">${chapters.map(c=>`<button class="chapter-btn" data-ch="${c}">${c}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>guessChapter(parseInt(btn.dataset.ch))));

  } else if(phase===3 && difficulty==='hard'){
    // Verse number guess — Hard mode only
    // Show a range of 10 verse numbers centered around the correct one
    const correct=currentVerse.v;
    const half=5;
    let start=Math.max(1,correct-half);
    let end=start+9;
    const verses=Array.from({length:end-start+1},(_,i)=>start+i);
    area.innerHTML=`
      <div class="phase-note">Guess the verse number:</div>
      <div class="chapter-grid">${verses.map(v=>`<button class="chapter-btn" data-v="${v}">${v}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>guessVerse(parseInt(btn.dataset.v))));

  } else {
    renderNextButton();
  }
}

function guessTestament(choice){
  const correct=choice===currentVerse.t;
  document.querySelectorAll('.btn').forEach(btn=>{
    btn.disabled=true;
    const val=btn.textContent.includes('Old')?'OT':'NT';
    if(val===currentVerse.t)btn.classList.add(correct&&val===choice?'correct':'reveal');
    if(val===choice&&!correct)btn.classList.add('wrong');
  });
  awardAndAdvance(correct,POINTS.testament,correct?null:(currentVerse.t==='OT'?'Old Testament':'New Testament'),1);
}

function guessBook(choice){
  const correct=choice===currentVerse.book;
  document.querySelectorAll('.book-btn').forEach(btn=>{
    btn.disabled=true;
    const name=btn.textContent.trim();
    if(name===currentVerse.book)btn.classList.add(correct&&name===choice?'correct':'reveal');
    if(name===choice&&!correct)btn.classList.add('wrong');
  });
  awardAndAdvance(correct,POINTS.book,correct?null:currentVerse.book,2);
}

function guessChapter(choice){
  const correct=choice===currentVerse.ch;
  document.querySelectorAll('.chapter-btn').forEach(btn=>{
    btn.disabled=true;
    const n=parseInt(btn.textContent);
    if(n===currentVerse.ch)btn.classList.add(correct&&n===choice?'correct':'reveal');
    if(n===choice&&!correct)btn.classList.add('wrong');
  });
  const nextPhase = difficulty==='hard' ? 3 : maxPhases();
  awardAndAdvance(correct,POINTS.chapter,correct?null:`Chapter ${currentVerse.ch}`,nextPhase);
}

function guessVerse(choice){
  const correct=choice===currentVerse.v;
  document.querySelectorAll('.chapter-btn').forEach(btn=>{
    btn.disabled=true;
    const n=parseInt(btn.textContent);
    if(n===currentVerse.v)btn.classList.add(correct&&n===choice?'correct':'reveal');
    if(n===choice&&!correct)btn.classList.add('wrong');
  });
  awardAndAdvance(correct,POINTS.verse,correct?null:`Verse ${currentVerse.v}`,maxPhases());
}

function awardAndAdvance(correct,pts,reveal,nextPhase){
  if(correct){score+=pts*(1+Math.floor(streak*0.1));streak++;correctCount++;}else{streak=0;}
  updateHUD();
  const fb=document.getElementById('feedback');
  if(fb){
    if(correct){
      fb.className='feedback correct';
      fb.innerHTML=`✓ Correct! <span class="points-pop">+${pts}</span>${streak>1?` 🔥 ×${streak} streak`:''}`;
      showRandyReaction(streak >= 3 ? 'happy' : 'happy');
      if(streak >= 3) playStreak(); else playCorrect();
    } else {
      fb.className='feedback wrong';
      fb.innerHTML=`✗ Not quite${reveal?` — it's <strong>${reveal}</strong>`:''}`;
      showRandyReaction('sad');
      playWrong();
    }
  }
  phase=nextPhase;
  hintUsed=false;
  const mp=maxPhases();
  setTimeout(()=>{
    const label=document.getElementById('phaseLabel');
    if(label){
      const sl = phase < mp ? getStepLabel(phase) : '✓ Complete';
      const p  = phase < mp ? POINTS[getPhaseKey(phase)] : 0;
      label.innerHTML=`${sl}${phase<mp?` <span class="pts-hint">(+${p} pts)</span>`:''}`;
    }
    document.querySelectorAll('.phase-dot').forEach((d,i)=>{d.className=`phase-dot${i<phase?' done':i===phase?' active':''}`;});

    if(phase<mp)renderPhase();else renderNextButton();
  },1100);
}

function renderNextButton(){
  const area=document.getElementById('choicesArea');
  if(!area)return;
  area.innerHTML=`
    <div class="ref-box">📖 <strong>${currentVerse.book} ${currentVerse.ch}:${currentVerse.v}</strong> — ${currentVerse.t==='OT'?'Old':'New'} Testament</div>
    <button class="btn-next" id="nextBtn">${round<TOTAL_ROUNDS?'Next Verse →':'See Final Score'}</button>
    <button class="btn-change-diff" id="changeDiffBtn">← Change difficulty</button>`;
  document.getElementById('nextBtn').onclick=nextRound;
  document.getElementById('changeDiffBtn').onclick=renderDiffScreen;
}

async function nextRound(){
  round++;
  if(round>TOTAL_ROUNDS){updateHUD();renderGameOver(document.getElementById('card'));return;}
  phase=0;updateHUD();
  const card=document.getElementById('card');
  showSpinner(card);
  try{currentVerse=await fetchVerse();renderCard();}
  catch(e){showError(card,e.message);}
}

function renderGameOver(card){
  card.innerHTML=`
    <div class="game-over">
      <div class="verse-label">Game Complete — ${diffLabel()}</div>
      <h2>Well done, Scout!</h2>
      <div class="final-score">${score.toLocaleString()}</div>
      <div class="rank">${rankLabel(score)}</div>
      ${currentUser ? `
        <div class="name-entry">
          <label>Submitting as</label>
          <input class="name-input" id="nameInput" type="text" maxlength="24"
            value="${currentUsername || currentUser.email.split('@')[0]}"
            readonly style="opacity:0.7;cursor:default;"/>
        </div>
        <button class="btn-next" id="submitBtn">Submit Score 🏆</button>
      ` : `
        <div class="guest-submit-box">
          <div class="guest-submit-icon">🏆</div>
          <p class="guest-submit-title">Want to save your score?</p>
          <p class="guest-submit-desc">Create a free account to get on the leaderboard, track your progress, and compete with others.</p>
          <button class="btn-next" id="signUpToSubmitBtn">Create Free Account →</button>
          <div class="guest-submit-or">or</div>
          <div class="name-entry" style="margin-bottom:8px;">
            <label>Submit as guest</label>
            <input class="name-input" id="nameInput" type="text" maxlength="24" placeholder="Enter a name…" value="${playerName}"/>
          </div>
          <button class="btn-next" id="submitBtn" style="background:var(--surface-2);color:var(--text);border:1.5px solid var(--border);">Submit as Guest</button>
        </div>
      `}
      <button class="btn-next" id="playAgainBtn" style="background:var(--surface-2);color:var(--text);border:1.5px solid var(--border);">Play Again</button>
      <button class="btn-share" id="shareBtn" style="margin-top:8px;" onclick="shareScore(${score})">📨 Challenge a Friend</button>
      <button class="btn-change-diff" id="chooseDiffBtn">← Choose difficulty</button>
    </div>`;

  document.getElementById('submitBtn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { document.getElementById('nameInput').focus(); return; }
    playerName = name;
    localStorage.setItem('ss_player_name', name);
    document.getElementById('submitBtn').textContent = 'Submitting…';
    document.getElementById('submitBtn').disabled = true;
    try {
      await submitScore(name, score, difficulty);
      document.getElementById('submitBtn').textContent = '✓ Score Submitted!';
      updateStreak();
  setTimeout(()=>switchTab(currentUser ? 'stats' : 'leaderboard'), 1200);
    } catch(e) {
      document.getElementById('submitBtn').textContent = '⚠️ Failed — try again';
      document.getElementById('submitBtn').disabled = false;
    }
  };
  document.getElementById('playAgainBtn').onclick = ()=>startGame(difficulty);
  document.getElementById('chooseDiffBtn').onclick = renderDiffScreen;
}

function shareScore(finalScore) {
  const message = `🏆 I just scored ${finalScore.toLocaleString()} pts on Scripture Scout — the Bible verse guessing game that will either prove you know your Bible... or expose you completely.

Think you can beat me? The gauntlet has been thrown. 👇 https://scripturescout.pages.dev`;

  if (navigator.share) {
    navigator.share({ title: 'Scripture Scout', text: message }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(message)
      .then(()=>showToast('✓ Message copied — go paste it!'))
      .catch(()=>showToast('Share: https://scripturescout.pages.dev'));
  }
}

async function startFlashcards(size) {
  const root = document.getElementById('root');
  root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading flashcards…</div></div>`;

  try {
    const diff = flashcardSession.filter.difficulty;
    const book = flashcardSession.filter.book;
    const total = DIFF_COUNTS[TRANSLATION][diff];
    const verses = [];
    const usedVerseIdsMT = new Set();
    let safetyMT = 0;

    // Fetch verses
    while(verses.length < size && safetyMT < size * 10) {
      safetyMT++;
      const offset = Math.floor(Math.random() * total);
      let url = `verses?translation=eq.${TRANSLATION}&difficulty=eq.${diff}&select=*&limit=1&offset=${offset}`;
      if(book) url += `&book=eq.${encodeURIComponent(book)}`;
      const rows = await sbFetch(url);
      if(rows.length && !usedVerseIdsMT.has(rows[0].id)) {
        usedVerseIdsMT.add(rows[0].id);
        verses.push(rows[0]);
      }
    }

    flashcardSession = {
      verses,
      current: 0,
      flipped: false,
      knew: 0,
      almost: 0,
      didnt: 0,
      filter: flashcardSession.filter
    };

    renderFlashcard();
  } catch(e) {
    root.innerHTML = `<div class="error-box">⚠️ Couldn't load flashcards — ${e.message}</div>
    <button class="btn-next" onclick="renderFlashcardSetup()">Try Again</button>`;
  }
}

// AI hint state
let currentHints = null;
let hintsLoading = false;
let hintsRevealed = 0;

const HINT_DEFINITIONS = [
  { icon: '💬', label: 'First Words',  key: 'firstWords' },
  { icon: '🏷️', label: 'Theme',        key: 'theme' },
  { icon: '🗣️', label: 'Who Said It',  key: 'speaker' },
  { icon: '👥', label: 'Audience',     key: 'audience' },
  { icon: '📖', label: 'Context',      key: 'context' }
];

async function fetchHintsForVerse(verse) {
  currentHints = null;
  hintsLoading = true;
  hintsRevealed = 0;

  // First words hint is always instant
  const words = verse.text.split(' ').slice(0, 5).join(' ');
  const firstWords = words + (verse.text.split(' ').length > 5 ? '…' : '');

  try {
    // Load hints from Supabase database
    const rows = await sbFetch(
      `verses?translation=eq.${TRANSLATION}&book=eq.${encodeURIComponent(verse.book)}&chapter=eq.${verse.chapter}&verse=eq.${verse.verse}&select=hints&limit=1`
    );

    if(rows.length && rows[0].hints) {
      const h = rows[0].hints;
      currentHints = {
        firstWords,
        theme:    h.theme    || 'Not available',
        speaker:  h.speaker  || 'Not available',
        audience: h.audience || 'Not available',
        context:  h.context  || null
      };
    } else {
      // No hints in database yet — show first words only
      currentHints = {
        firstWords,
        theme:    null,
        speaker:  null,
        audience: null,
        context:  null
      };
    }
  } catch(e) {
    currentHints = { firstWords, theme: null, speaker: null, audience: null, context: null };
  }

  hintsLoading = false;
  updateHintButton();
}

function updateHintButton() {
  const btn = document.getElementById('hintRevealBtn');
  if(!btn) return;
  if(hintsLoading) {
    btn.textContent = '⏳ Loading hints…';
    btn.disabled = true;
  } else if(hintsRevealed >= HINT_DEFINITIONS.length) {
    btn.textContent = '✓ All hints revealed';
    btn.disabled = true;
  } else {
    const available = currentHints ? HINT_DEFINITIONS.filter(d => currentHints[d.key]).length : HINT_DEFINITIONS.length;
    btn.textContent = `💡 Reveal Hint ${hintsRevealed + 1} of ${available}`;
    btn.disabled = false;
  }
}

function revealNextHint() {
  if(!currentHints || hintsLoading) return;
  if(hintsRevealed >= HINT_DEFINITIONS.length) return;

  const strip = document.getElementById('hintStrip');
  if(!strip) return;

  // Skip hints that have no data
  while(hintsRevealed < HINT_DEFINITIONS.length) {
    const def = HINT_DEFINITIONS[hintsRevealed];
    const value = currentHints[def.key];
    hintsRevealed++;
    if(value) {
      const item = document.createElement('div');
      item.className = 'hint-item';
      item.innerHTML = `
        <span class="hint-icon">${def.icon}</span>
        <div class="hint-content">
          <div class="hint-label">${def.label}</div>
          <div class="hint-text">${value}</div>
        </div>`;
      strip.appendChild(item);
      break;
    }
  }
  updateHintButton();
}

function toggleBookContext() {
  const text = document.getElementById('contextText');
  const arrow = document.getElementById('contextArrow');
  if(!text) return;
  const isOpen = text.style.display !== 'none';
  text.style.display = isOpen ? 'none' : 'block';
  if(arrow) arrow.textContent = isOpen ? '▼' : '▲';
}

function studyNext() {
  flashcardSession.current++;
  flashcardSession.flipped = false;
  renderFlashcard();
}

function studyPrev() {
  if(flashcardSession.current > 0) {
    flashcardSession.current--;
    flashcardSession.flipped = false;
    renderFlashcard();
  }
}

function flipFlashcard() {
  playFlip();
  if(flashcardSession.mode === 'study') {
    flashcardSession.flipped = !flashcardSession.flipped;
  } else {
    flashcardSession.flipped = true;
  }
  renderFlashcard();
}

async function rateFlashcard(rating) {
  if(rating === 'knew_it') playCorrect();
  else if(rating === 'almost') playFlip();
  else playWrong();
  const s = flashcardSession;
  const v = s.verses[s.current];

  if(rating === 'knew_it') s.knew++;
  else if(rating === 'almost') s.almost++;
  else s.didnt++;

  // Save progress if logged in
  if(currentUser) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/flashcard_progress`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${authToken}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          user_id: currentUser.id,
          book: v.book,
          chapter: v.chapter,
          verse: v.verse,
          translation: TRANSLATION,
          rating
        })
      });
    } catch(e) { /* silent fail */ }
  }

  s.current++;
  s.flipped = false;
  currentHints = null;
  hintsRevealed = 0;
  renderFlashcard();
}

async function renderFlashcardComplete() {
  const s = flashcardSession;
  if(s._scoreSubmitted) return;
  s._scoreSubmitted = true;

function getBlankWords(text, difficulty) {
  const words = text.split(' ');
  const candidates = words
    .map((w, i) => ({ word: w.replace(/[^a-zA-Z]/g, ''), index: i, original: w }))
    .filter(w => w.word.length > 3);

  const count = difficulty === 'easy' ? 3 : difficulty === 'medium' ? 5 : 7;
  // Pick random candidates then sort by position so blanks are filled left to right
  const shuffled = [...candidates].sort(() => Math.random() - 0.5).slice(0, Math.min(count, candidates.length));
  return shuffled.sort((a, b) => a.index - b.index);
}

function buildBlankVerse(text, blanks, activeIndex, filledMap) {
  filledMap = filledMap || {};
  let words = text.split(' ');
  const blankIndices = new Set(blanks.map(b => b.index));
  return words.map((w, i) => {
    if(blankIndices.has(i)) {
      const blank = blanks.find(b => b.index === i);
      const blankPos = blanks.indexOf(blank);
      const filledWord = filledMap[i];
      const isActive = blankPos === activeIndex && !filledWord;
      const style = isActive
        ? 'border-color:var(--teal);color:var(--teal);background:var(--teal-dim);box-shadow:0 0 6px var(--teal);'
        : !filledWord ? 'opacity:0.5;' : '';
      return `<span class="blank-word ${filledWord?'revealed':''}" data-index="${i}" data-word="${blank.word}" style="${style}">${filledWord || '?????'}</span>`;
    }
    return w;
  }).join(' ');
}

function shuffle(arr) {
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateOptions(correctWord, allWords) {
  // Generate 3 wrong options from verse words
  const wrong = shuffle(
    allWords
      .filter(w => w.replace(/[^a-zA-Z]/g, '').toLowerCase() !== correctWord.toLowerCase() && w.replace(/[^a-zA-Z]/g, '').length > 3)
      .map(w => w.replace(/[^a-zA-Z]/g, ''))
      .filter((w, i, arr) => arr.indexOf(w) === i)
  ).slice(0, 3);

  return shuffle([correctWord, ...wrong]);
}

async function startFillBlank(diff, size) {
  fitbSession.difficulty = diff;
  fitbSession.current = 0;
  fitbSession.score = 0;
  fitbSession.correct = 0;
  fitbSession.verses = [];
  fitbSession._scoreSubmitted = false;


  const root = document.getElementById('root');
  root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading verses…</div></div>`;

  try {
    // Easy and Medium use easy verse pool; Hard uses medium pool for harder content
    const versePool = diff === 'hard' ? 'medium' : 'easy';
    const total = DIFF_COUNTS[TRANSLATION][versePool];
    const usedVerseIds = new Set();
    let safetyCount = 0;
    while(fitbSession.verses.length < size && safetyCount < size * 10) {
      safetyCount++;
      const offset = Math.floor(Math.random() * total);
      const rows = await sbFetch(`verses?translation=eq.${TRANSLATION}&difficulty=eq.${versePool}&select=*&limit=1&offset=${offset}`);
      if(rows.length && !usedVerseIds.has(rows[0].id)) {
        usedVerseIds.add(rows[0].id);
        fitbSession.verses.push(rows[0]);
      }
    }
    renderFillBlankCard();
  } catch(e) {
    root.innerHTML = `<div class="error-box">⚠️ ${e.message}</div><button class="btn-next" onclick="renderFillBlankSetup()">Try Again</button>`;
  }
}

function renderFillBlankCard() {
  const root = document.getElementById('root');
  const s = fitbSession;
  if(s.current >= s.verses.length) { renderFillBlankComplete(); return; }

  const v = s.verses[s.current];
  const blanks = getBlankWords(v.text, s.difficulty);
  fitbSession.blanks = blanks;
  fitbSession.currentBlankIndex = 0;
  fitbSession.options = blanks.map(b => generateOptions(b.word, v.text.split(' ')));
  fitbWordBank = [];
  fitbAnswerRow = [];

  const progress = (s.current / s.verses.length) * 100;
  const blankHtml = buildBlankVerse(v.text, blanks, 0);

  root.innerHTML = `

function renderBlankInput() {
  // Duolingo style — renders the word bank ONCE, never re-renders it
  const s = fitbSession;
  const area = document.getElementById('blankInputArea');
  if(!area) return;

  // Only build the word bank once per verse
  if(!document.getElementById('fitbWordBank')) {
    // One chip per blank (duplicates allowed) + unique distractors
    const wordList = [];
    const blankWords = s.blanks.map(b => b.word);
    // Add exactly one chip for each blank
    blankWords.forEach(w => wordList.push(w));
    // Add distractors that aren't blank words at all
    const distractors = new Set();
    s.options.forEach(opts => opts.forEach(o => {
      if(!blankWords.includes(o) && !distractors.has(o)) {
        distractors.add(o);
        wordList.push(o);
      }
    }));
    // Shuffle
    fitbWordBank = shuffle(wordList)
      .map((w, i) => ({ word: w, used: false, chipIndex: i }));

    area.innerHTML = `
      <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--teal);font-weight:600;margin-bottom:6px;">Your answer:</div>
      <div id="fitbAnswerRow" class="answer-row">
        <span class="answer-placeholder" id="fitbAnswerPlaceholder">Tap words below…</span>
      </div>
      <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:600;margin:10px 0 6px;">Word bank:</div>
      <div id="fitbWordBank" class="word-bank">
        ${fitbWordBank.map(w => `<button class="word-chip" data-index="${w.chipIndex}" data-word="${w.word}">${w.word}</button>`).join('')}
      </div>
      <div id="fitbCheckArea"></div>`;

    document.querySelectorAll('#fitbWordBank .word-chip').forEach(btn => {
      btn.addEventListener('click', () => fitbTapWord(btn));
    });
  }

  // Update verse display
  refreshFitbVerseDisplay();
  updateFitbCheckButton();
}

function refreshFitbVerseDisplay() {
  const s = fitbSession;
  const verseEl = document.getElementById('blankVerse');
  if(!verseEl) return;
  const filled = {};
  fitbAnswerRow.forEach(a => filled[a.blankIndex] = a.word);
  verseEl.innerHTML = buildBlankVerse(s.verses[s.current].text, s.blanks, fitbAnswerRow.length, filled);
}

function updateFitbCheckButton() {
  const s = fitbSession;
  const area = document.getElementById('fitbCheckArea');
  if(!area) return;
  const allFilled = fitbAnswerRow.length >= s.blanks.length;
  area.innerHTML = allFilled
    ? `<button class="btn-next" id="fitbCheckBtn" style="background:linear-gradient(135deg,#4A7C59,#3BBFA0);margin-top:8px;">Check Answers ✓</button>`
    : `<button class="btn-next" style="background:var(--surface-2);color:var(--text-muted);border:1.5px solid var(--border);margin-top:8px;cursor:default;" disabled>Check Answers (${fitbAnswerRow.length}/${s.blanks.length})</button>`;

}

  // Legacy stub — flow now handled by fitbTapWord + checkAllFitbAnswers

function fitbTapWord(btn) {
  const s = fitbSession;
  if(btn.classList.contains('used')) return;
  if(fitbAnswerRow.length >= s.blanks.length) return;

  const word = btn.dataset.word;
  const chipIndex = parseInt(btn.dataset.index);
  const blankIndex = s.blanks[fitbAnswerRow.length]?.index;

  fitbAnswerRow.push({ word, blankIndex, chipIndex });
  btn.classList.add('used');

  refreshFitbAnswerRow();
  refreshFitbVerseDisplay();
  updateFitbCheckButton();
}

function fitbRemoveAnswer(pos) {
  const removed = fitbAnswerRow[pos];
  if(!removed) return;
  fitbAnswerRow.splice(pos, 1);

  // Re-enable chip
  const chip = document.querySelector(`#fitbWordBank .word-chip[data-index="${removed.chipIndex}"]`);
  if(chip) chip.classList.remove('used');

  refreshFitbAnswerRow();
  refreshFitbVerseDisplay();
  updateFitbCheckButton();
}

function refreshFitbAnswerRow() {
  const row = document.getElementById('fitbAnswerRow');
  if(!row) return;

  if(fitbAnswerRow.length === 0) {
    row.innerHTML = '<span class="answer-placeholder" id="fitbAnswerPlaceholder">Tap words below…</span>';
    return;
  }

  // Clear and rebuild chips with event listeners (not inline onclick)
  row.innerHTML = '';
  fitbAnswerRow.forEach((a, pos) => {
    const chip = document.createElement('button');
    chip.className = 'answer-chip';
    chip.textContent = a.word;
    chip.addEventListener('click', () => fitbRemoveAnswer(pos));
    row.appendChild(chip);
  });
}

function checkAllFitbAnswers() {
  const s = fitbSession;
  const fb = document.getElementById('fitbFeedback');
  let allCorrect = true;
  let wrongCount = 0;

  s.blanks.forEach((blank, i) => {
    const answer = fitbAnswerRow[i];
    const isCorrect = answer && answer.word.toLowerCase() === blank.word.toLowerCase();
    if(!isCorrect) { allCorrect = false; wrongCount++; }

    // Color answer chips
    const chips = document.querySelectorAll('#fitbAnswerRow .answer-chip');
    if(chips[i]) {
      chips[i].style.cssText += isCorrect
        ? ';border-color:var(--teal);background:var(--teal-dim);color:var(--teal);cursor:default;'
        : ';border-color:var(--earth);background:var(--earth-dim);color:var(--earth);cursor:default;';
      chips[i].disabled = true;
    }

    // Color verse blank
    const blankSpan = document.querySelector(`.blank-word[data-index="${blank.index}"]`);
    if(blankSpan) {
      blankSpan.textContent = answer ? answer.word : '?';
      blankSpan.classList.add(isCorrect ? 'revealed' : 'wrong');
    }
  });

  document.querySelectorAll('#fitbWordBank .word-chip').forEach(b => b.disabled = true);

  // Award points per correct word
  const pointsPerWord = 200;
  const correctCount = s.blanks.length - wrongCount;
  const pointsEarned = correctCount * pointsPerWord;
  fitbSession.score += pointsEarned;
  fitbSession.correct += correctCount;

  if(allCorrect) {
    if(fb) { fb.className='feedback correct'; fb.innerHTML=`✓ All correct! <span class="points-pop">+${pointsEarned}</span>`; }
  } else {
    // Show correct answers in answer row
    const row = document.getElementById('fitbAnswerRow');
    if(row) {
      row.innerHTML = s.blanks.map((blank, i) => {
        const given = fitbAnswerRow[i];
        const isCorrect = given && given.word.toLowerCase() === blank.word.toLowerCase();
        return `<span class="answer-chip" style="border-color:${isCorrect?'var(--teal)':'var(--earth)'};background:${isCorrect?'var(--teal-dim)':'var(--earth-dim)'};color:${isCorrect?'var(--teal)':'var(--earth)'};">${isCorrect ? given.word : blank.word}</span>`;
      }).join('');
    }
    if(fb) { fb.className='feedback wrong'; fb.innerHTML=`${wrongCount} wrong — ${correctCount > 0 ? `<span class="points-pop">+${pointsEarned}</span> for ${correctCount} correct` : 'no points this round'}`; }
  }

  // Always show Next Verse button
  const checkArea = document.getElementById('fitbCheckArea');
  if(checkArea) checkArea.innerHTML = `
    <button class="btn-next" id="fitbNextBtn" style="margin-top:8px;">
      ${s.current + 1 < s.verses.length ? 'Next Verse →' : 'See Results →'}
    </button>`;
  const nextBtn = document.getElementById('fitbNextBtn');
  if(nextBtn) nextBtn.onclick = () => {
    fitbSession.current++;
    fitbWordBank = [];
    fitbAnswerRow = [];
    renderFillBlankCard();
  };
}

async function startRefChallenge(diff, size) {
  rcSession.difficulty = diff;
  rcSession.current = 0;
  rcSession.score = 0;
  rcSession.correct = 0;
  rcSession.verses = [];

  const root = document.getElementById('root');
  root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading verses…</div></div>`;

  try {
    const total = DIFF_COUNTS[TRANSLATION][diff];
    const usedVerseIdsRC = new Set();
    let safetyRC = 0;
    while(rcSession.verses.length < size && safetyRC < size * 10) {
      safetyRC++;
      const offset = Math.floor(Math.random() * total);
      const rows = await sbFetch(`verses?translation=eq.${TRANSLATION}&difficulty=eq.${diff}&select=*&limit=1&offset=${offset}`);
      if(rows.length && !usedVerseIdsRC.has(rows[0].id)) {
        usedVerseIdsRC.add(rows[0].id);
        rcSession.verses.push(rows[0]);
      }
    }
    renderRefChallengeCard();
  } catch(e) {
    root.innerHTML = `<div class="error-box">⚠️ ${e.message}</div><button class="btn-next" onclick="renderRefChallengeSetup()">Try Again</button>`;
  }
}

async function generateRefOptions(correct, difficulty) {
  const correctRef = `${correct.book} ${correct.chapter}`;
  const books = correct.testament === 'OT' ? OT_BOOKS : NT_BOOKS;
  const wrongOptions = new Set();

  if(difficulty === 'hard') {
    // Hard — same book, adjacent chapters (very tricky)
    const bookEntry = books.find(b => b[0] === correct.book);
    const maxChapters = bookEntry ? bookEntry[1] : 30;
    let attempts = 0;
    while(wrongOptions.size < 3 && attempts < 50) {
      attempts++;
      // Pick a chapter close to the correct one
      const offset = Math.floor(Math.random() * 5) + 1;
      const sign = Math.random() > 0.5 ? 1 : -1;
      const wrongChapter = Math.max(1, Math.min(maxChapters, correct.chapter + (offset * sign)));
      const ref = `${correct.book} ${wrongChapter}`;
      if(ref !== correctRef) wrongOptions.add(ref);
    }
    // Fill remaining with other books if needed
    while(wrongOptions.size < 3) {
      const randomBook = books[Math.floor(Math.random() * books.length)];
      const randomChapter = Math.floor(Math.random() * randomBook[1]) + 1;
      const ref = `${randomBook[0]} ${randomChapter}`;
      if(ref !== correctRef) wrongOptions.add(ref);
    }
  } else {
    // Easy/Medium — same testament, different books
    while(wrongOptions.size < 3) {
      const randomBook = books[Math.floor(Math.random() * books.length)];
      const randomChapter = Math.floor(Math.random() * randomBook[1]) + 1;
      const ref = `${randomBook[0]} ${randomChapter}`;
      if(ref !== correctRef) wrongOptions.add(ref);
    }
  }

  return shuffle([correctRef, ...wrongOptions]);
}

  const root = document.getElementById('root');

function checkRefAnswer(btn, chosen, correct) {
  document.querySelectorAll('.ref-option').forEach(b => {
    b.disabled = true;
    if(b.dataset.ref === correct) b.classList.add(chosen === correct ? 'correct' : 'reveal');
    if(b === btn && chosen !== correct) b.classList.add('wrong');
  });

  const isCorrect = chosen === correct;
  const fb = document.getElementById('rcFeedback');

  if(isCorrect) {
    rcSession.score += 500;
    rcSession.correct++;
    if(fb) { fb.className = 'feedback correct'; fb.innerHTML = `✓ Correct! <span class="points-pop">+500</span>`; }
  } else {
    if(fb) { fb.className = 'feedback wrong'; fb.innerHTML = `✗ It was <strong>${correct}</strong>`; }
  }

  setTimeout(() => {
    rcSession.current++;
    renderRefChallengeCard();
  }, 1400);
}

async function renderStoryRound() {
  const s = storyInteractive;
  // Check hearts before starting
  const heartsNow = getCurrentHearts();
  if(heartsNow <= 0) {
    showHeartsEmptyScreen(()=>renderStoryPath(s.pathId));
    return;
  }
  const root = document.getElementById('root');
  const { chapter, pathId, round, stars, verseText } = s;
  const hearts = heartsNow;
  const correctRef = `${chapter.book} ${chapter.chapter}:${chapter.verse}`;
  const roundLabels = ['',
    'Round 1 — Pick the reference + fill 2 blanks',
    'Round 2 — Pick the reference + tap key words in order',
    'Round 3 — Type the reference + type the verse from memory'
  ];
  const currentHearts = getCurrentHearts();
  const heartDisplay = '❤️'.repeat(currentHearts) + '🖤'.repeat(3-currentHearts);
  const roundDots = [1,2,3].map(r =>
    `<div class="story-round-dot ${r < round ? 'done' : r === round ? 'active' : ''}"></div>`
  ).join('');

  // Generate wrong reference options
  const books = chapter.testament === 'OT' ? OT_BOOKS : NT_BOOKS;
  const wrongRefs = new Set();
  while(wrongRefs.size < 3) {
    const rb = books[Math.floor(Math.random()*books.length)];
    const rc = Math.floor(Math.random()*rb[1])+1;
    const rv = Math.floor(Math.random()*20)+1;
    const ref = `${rb[0]} ${rc}:${rv}`;
    if(ref !== correctRef) wrongRefs.add(ref);
  }

  // Set up blanks based on round
  // Round 1: 2 random blanks, tap in any order
  // Round 2: all key words blanked, must tap IN ORDER
  // Round 3: ALL words blanked, must tap every word IN ORDER
  let allBlanks = [];
  let orderedMode = false; // whether blanks must be filled in order

  if(round === 1) {
    allBlanks = getBlankWords(verseText, 'easy').slice(0, 2);
    orderedMode = false;
  } else if(round === 2) {
    allBlanks = getBlankWords(verseText, 'medium'); // all key words
    // Sort by position in verse so they must be filled left to right
    allBlanks = allBlanks.sort((a,b) => a.index - b.index);
    orderedMode = true;
  } else {
    // Round 3 — type the verse, no blanks needed
    allBlanks = [];
    orderedMode = false;
  }

  // Pre-generate options for each blank
  const blankOptions = allBlanks.map(b => generateOptions(b.word, verseText.split(' ')));

  storyRoundState = {
    refAnswered: false,
    blanksAnswered: 0,
    blanks: allBlanks,
    blankOptions,
    currentBlankIndex: 0,
    orderedMode,
    filledWords: {}
  };

  // Build verse with blanks
  const blankHtml = buildBlankVerse(verseText, allBlanks, 0);

  // Reference choices
  let refChoicesHtml = '';
  if(round === 1) {
    const choices = [correctRef, ...[...wrongRefs]].sort(()=>Math.random()-0.5);
    refChoicesHtml = choices.map(c =>
      `<button class="story-choice" data-ref="${c}">${c}</button>`
    ).join('');
  } else if(round === 2) {
    const choices = [correctRef, [...wrongRefs][0]].sort(()=>Math.random()-0.5);
    refChoicesHtml = choices.map(c =>
      `<button class="story-choice" data-ref="${c}">${c}</button>`
    ).join('');
  } else {
    refChoicesHtml = `
      <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;font-weight:600;">Type the reference (e.g. John 3:16):</div>
      <input class="story-type-input" id="storyTypeInput" type="text" placeholder="Book Chapter:Verse" autocomplete="off"/>
      <button class="btn-next" id="storyTypeSubmit" style="background:linear-gradient(135deg,#7C5CFC,#38BDF8);margin-bottom:0;">Check →</button>`;
  }

  root.innerHTML = `
    <div class="story-screen">
      <div class="verse-label">Chapter ${chapter.chapter_num} — ${chapter.title}</div>
      <div class="card" style="max-width:560px;width:100%;margin-bottom:12px;">
        <div class="story-round-bar">${roundDots}</div>
        <div class="story-round-label">${roundLabels[round]}</div>
        <div class="story-hearts">${heartDisplay}</div>

        <div class="chapter-narrative" style="font-size:0.85rem;margin-bottom:14px;line-height:1.7;">${chapter.narrative}</div>

        <!-- Full verse shown upfront on Round 1 only -->
        ${round === 1 ? `
        <div class="chapter-verse-reveal" style="margin-bottom:16px;">
          <div class="chapter-verse-label">✨ Key Verse — Read it first</div>
          <div class="chapter-verse-text">"${verseText}"</div>
          <div class="chapter-verse-ref" style="font-size:0.78rem;color:#A78BFA;font-weight:700;">📖 ${chapter.book} ${chapter.chapter}:${chapter.verse}</div>
        </div>` : ''}

        <hr class="divider"/>

        <!-- Step 1: Reference -->
        <div id="storyRefSection">
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:#A78BFA;font-weight:600;margin-bottom:10px;">
            Step 1 — Now, where is this verse from?
          </div>
          ${refChoicesHtml}
        </div>

        <div class="story-feedback" id="storyRefFeedback"></div>

        <!-- Step 2: Fill blanks (hidden until ref answered) -->
        <div id="storyBlanksSection" style="display:none;margin-top:16px;">
          <hr class="divider" style="margin-bottom:14px;"/>
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:#A78BFA;font-weight:600;margin-bottom:10px;">
            Step 2 — ${round === 1 ? 'Fill in the missing words' : round === 2 ? 'Tap the key words in order' : 'Type the verse from memory'}
          </div>
          ${round === 1 ? `<div class="blank-verse" id="storyBlankVerse" style="margin-bottom:14px;">${blankHtml}</div>` : ''}
          ${round === 2 ? `<div class="blank-verse" id="storyBlankVerse" style="margin-bottom:14px;">${blankHtml}</div>` : ''}
          ${round === 3 ? `
          <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:8px;line-height:1.5;">Type the verse from memory:</div>
          <textarea id="storyVerseTextarea"
            style="width:100%;min-height:100px;padding:12px 14px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--text);outline:none;resize:none;line-height:1.6;box-sizing:border-box;"
            placeholder="Type the full verse here…"></textarea>
          <div style="font-size:0.72rem;color:var(--text-muted);margin:4px 0 10px;text-align:right;" id="storyVerseWordCount">0 words</div>
          <button class="btn-next" id="storyVerseSubmitBtn" style="background:linear-gradient(135deg,#7C5CFC,#A78BFA);" disabled>Check Verse ✓</button>
          ` : `<div id="storyBlankInput"></div>`}
          <div class="story-feedback" id="storyBlankFeedback"></div>
        </div>

      </div>
      ${stars > 0 ? `<div style="text-align:center;font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;">Current mastery: ${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>` : ''}
      <button class="btn-change-diff" onclick="renderStoryPath(${pathId})">← Back to Chapters</button>
    </div>`;

  // Wire up reference answer
  wireStoryRefInputs(correctRef, round);
}

function checkStoryTypedVerse() {
  const s = storyInteractive;
  const textarea = document.getElementById('storyVerseTextarea');
  const fb = document.getElementById('storyBlankFeedback');
  const submitBtn = document.getElementById('storyVerseSubmitBtn');
  if(!textarea) return;

  const normalize = str => str.toLowerCase().replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim();
  const typed = normalize(textarea.value);
  const correct = normalize(s.verseText);

  const typedWords = typed.split(' ');
  const correctWords = correct.split(' ');
  const matchCount = correctWords.filter((w,i) => typedWords[i] === w).length;
  const pct = Math.round((matchCount / correctWords.length) * 100);
  const isClose = pct >= 80;

  textarea.disabled = true;
  if(submitBtn) submitBtn.style.display = 'none';
  textarea.style.borderColor = isClose ? 'var(--teal)' : 'var(--earth)';
  textarea.style.background = isClose ? 'var(--teal-dim)' : 'var(--earth-dim)';

  if(isClose) {
    if(fb) { fb.className='story-feedback correct'; fb.textContent = pct===100 ? '✓ Perfect!' : `✓ ${pct}% correct — close enough!`; }
    setTimeout(() => completeStoryRound(), 1500);
  } else {
    const remaining = loseHeart();
    const heartEl = document.querySelector('.story-hearts');
    if(heartEl) heartEl.textContent = '❤️'.repeat(remaining) + '🖤'.repeat(3-remaining);
    if(fb) {
      fb.className = 'story-feedback wrong';
      fb.innerHTML = remaining > 0
        ? `✗ ${pct}% correct. ${remaining} heart${remaining===1?'':'s'} left — try again!<br><small style="color:var(--text-muted);font-weight:400;font-style:italic;">"${s.verseText}"</small>`
        : `💔 Out of hearts!`;
    }
    if(remaining <= 0) {
      setTimeout(() => showHeartsEmptyScreen(()=>renderStoryPath(s.pathId)), 2000);
    } else {
      setTimeout(() => {
        textarea.value = '';
        textarea.disabled = false;
        textarea.style.borderColor = 'var(--border)';
        textarea.style.background = 'var(--surface-2)';
        if(submitBtn) { submitBtn.style.display = 'block'; submitBtn.disabled = true; }
        const wc = document.getElementById('storyVerseWordCount');
        if(wc) wc.textContent = '0 words';
        if(fb) fb.textContent = '';
        textarea.focus();
      }, 3000);
    }
  }
}

function wireStoryRefInputs(correctRef, round) {
  if(round === 1 || round === 2) {
    document.querySelectorAll('.story-choice').forEach(btn => {
      btn.addEventListener('click', () => checkStoryRef(btn.dataset.ref, correctRef, btn));
    });
  } else {
    const input = document.getElementById('storyTypeInput');
    const submit = document.getElementById('storyTypeSubmit');
    if(input) input.focus();
    if(submit) submit.onclick = () => checkStoryRef(input.value.trim(), correctRef, null);
    if(input) input.addEventListener('keydown', e => { if(e.key==='Enter') checkStoryRef(input.value.trim(), correctRef, null); });
  }
}

function checkStoryRef(answer, correct, btn) {
  const s = storyInteractive;
  const rs = storyRoundState;
  const fb = document.getElementById('storyRefFeedback');
  const normalize = str => str.toLowerCase().replace(/\s+/g,' ').trim();
  const isCorrect = normalize(answer) === normalize(correct);

  if(isCorrect) {
    if(btn) { btn.classList.add('correct'); document.querySelectorAll('.story-choice').forEach(b=>{b.disabled=true;}); }
    else { const inp=document.getElementById('storyTypeInput'); if(inp){inp.classList.add('correct');inp.disabled=true;} document.getElementById('storyTypeSubmit').disabled=true; }
    if(fb) { fb.className='story-feedback correct'; fb.textContent='✓ Correct reference!'; }
    rs.refAnswered = true;
    setTimeout(() => {
      const blanksSection = document.getElementById('storyBlanksSection');
      if(blanksSection) {
        blanksSection.style.display = 'block';
        blanksSection.scrollIntoView({behavior:'smooth', block:'start'});
        if(storyInteractive.round === 3) {
          // Wire up textarea for round 3
          const textarea = document.getElementById('storyVerseTextarea');
          const submitBtn = document.getElementById('storyVerseSubmitBtn');
          const wordCount = document.getElementById('storyVerseWordCount');
          if(textarea) {
            textarea.focus();
            textarea.addEventListener('input', () => {
              const words = textarea.value.trim().split(/\s+/).filter(w=>w.length>0).length;
              if(wordCount) wordCount.textContent = words + ' word' + (words===1?'':'s');
              if(submitBtn) { submitBtn.disabled = words < 3; if(words >= 3) submitBtn.onclick = checkStoryTypedVerse; }
            });
            textarea.addEventListener('focus', () => textarea.style.borderColor = '#A78BFA');
            textarea.addEventListener('blur', () => textarea.style.borderColor = 'var(--border)');
          }
        } else {
          renderStoryBlankInput();
        }
      }
    }, 800);
  } else {
    const remaining = loseHeart();
    if(btn) btn.classList.add('wrong');
    else { const inp=document.getElementById('storyTypeInput'); if(inp) inp.classList.add('wrong'); }
    if(fb) {
      fb.className='story-feedback wrong';
      fb.textContent = remaining > 0
        ? `✗ Not quite. ${remaining} heart${remaining===1?'':'s'} left!`
        : `💔 Out of hearts!`;
    }
    const heartEl = document.querySelector('.story-hearts');
    if(heartEl) heartEl.textContent = '❤️'.repeat(remaining) + '🖤'.repeat(3-remaining);
    if(remaining <= 0) {
      setTimeout(() => showHeartsEmptyScreen(()=>renderStoryPath(s.pathId)), 1500);
    } else {
      setTimeout(() => {
        if(btn){btn.classList.remove('wrong');btn.disabled=false;}
        else { const inp=document.getElementById('storyTypeInput'); if(inp){inp.classList.remove('wrong');inp.disabled=false;inp.value='';inp.focus();} document.getElementById('storyTypeSubmit').disabled=false; }
        if(fb) fb.textContent='';
      }, 1500);
    }
  }
}

// Story mode word bank state
let storyWordBankData = [];
let storyAnsweredWords = [];

function renderStoryBlankInput() {
  const s = storyInteractive;
  const rs = storyRoundState;
  const area = document.getElementById('storyBlankInput');
  if(!area) return;

  storyAnsweredWords = [];
  storyWordBankData = [];

  // Build word pool — one chip per blank + distractors
  const wordList = [];
  const blankWords = rs.blanks.map(b => b.word);
  blankWords.forEach(w => wordList.push(w));
  const distractors = new Set();
  rs.blankOptions.forEach(opts => opts.forEach(o => {
    if(!blankWords.includes(o) && !distractors.has(o)) {
      distractors.add(o);
      wordList.push(o);
    }
  }));
  storyWordBankData = shuffle(wordList).map((w, i) => ({ word: w, chipIndex: i, used: false }));

  area.innerHTML = `
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:#A78BFA;font-weight:600;margin-bottom:6px;">Your answer:</div>
    <div id="storyAnswerRow" class="answer-row">
      <span class="answer-placeholder" id="storyAnswerPlaceholder">Tap words below…</span>
    </div>
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:600;margin:10px 0 6px;">Word bank:</div>
    <div id="storyWordPool" class="word-bank">
      ${storyWordBankData.map(w => `<button class="word-chip" data-index="${w.chipIndex}" data-word="${w.word}">${w.word}</button>`).join('')}
    </div>
    <div id="storyCheckBlanksArea">
      <button class="btn-next" id="storyCheckBlanksBtn" style="background:linear-gradient(135deg,#7C5CFC,#A78BFA);margin-top:8px;" disabled>
        Check Answers (0/${rs.blanks.length})
      </button>
    </div>`;

  // Refresh verse with empty filled map
  refreshStoryBlankVerse();

  // Wire word chips ONCE
  document.querySelectorAll('#storyWordPool .word-chip').forEach(btn => {
    btn.addEventListener('click', () => tapStoryWordChip(btn));
  });
}

function tapStoryWordChip(btn) {
  const rs = storyRoundState;
  if(btn.classList.contains('used')) return;
  if(storyAnsweredWords.length >= rs.blanks.length) return;
  storyAnsweredWords.push({ word: btn.dataset.word, chipIndex: parseInt(btn.dataset.index) });
  btn.classList.add('used');
  refreshStoryAnswerRow();
  refreshStoryBlankVerse();
  updateStoryCheckButton();
}

function removeStoryAnswerWord(pos) {
  const removed = storyAnsweredWords[pos];
  if(!removed) return;
  storyAnsweredWords.splice(pos, 1);
  const chip = document.querySelector(`#storyWordPool .word-chip[data-index="${removed.chipIndex}"]`);
  if(chip) chip.classList.remove('used');
  refreshStoryAnswerRow();
  refreshStoryBlankVerse();
  updateStoryCheckButton();
}

function refreshStoryAnswerRow() {
  const row = document.getElementById('storyAnswerRow');
  if(!row) return;
  if(storyAnsweredWords.length === 0) {
    row.innerHTML = '<span class="answer-placeholder" id="storyAnswerPlaceholder">Tap words below…</span>';
    return;
  }
  row.innerHTML = '';
  storyAnsweredWords.forEach((w, i) => {
    const chip = document.createElement('button');
    chip.className = 'answer-chip';
    chip.textContent = w.word;
    chip.addEventListener('click', () => removeStoryAnswerWord(i));
    row.appendChild(chip);
  });
}

function refreshStoryBlankVerse() {
  const s = storyInteractive;
  const rs = storyRoundState;
  const verseEl = document.getElementById('storyBlankVerse');
  if(!verseEl) return;
  const filled = {};
  storyAnsweredWords.forEach((w, i) => {
    if(rs.blanks[i]) filled[rs.blanks[i].index] = w.word;
  });
  verseEl.innerHTML = buildBlankVerse(s.verseText, rs.blanks, storyAnsweredWords.length, filled);
}

function updateStoryCheckButton() {
  const rs = storyRoundState;
  const btn = document.getElementById('storyCheckBlanksBtn');
  if(!btn) return;
  const answered = storyAnsweredWords.length;
  const needed = rs.blanks.length;
  btn.disabled = answered < needed;
  btn.textContent = answered >= needed ? 'Check Answers ✓' : `Check Answers (${answered}/${needed})`;
  if(answered >= needed) btn.onclick = checkAllStoryBlanks;
}

function checkStoryBlank(answer, correct, blankIndex, btn) {
  // Legacy stub
}

function checkAllStoryBlanks() {
  const s = storyInteractive;
  const rs = storyRoundState;
  const fb = document.getElementById('storyBlankFeedback');

  const answeredSequence = (storyAnsweredWords||[]).map(w => w.word.toLowerCase());
  const correctSequence = rs.blanks.map(b => b.word.toLowerCase());

  let correct = 0;
  correctSequence.forEach((word, i) => {
    if(answeredSequence[i] === word) correct++;
  });

  // Show correct/wrong in answer row
  const row = document.getElementById('storyAnswerRow');
  if(row) {
    row.innerHTML = '';
    rs.blanks.forEach((blank, i) => {
      const given = storyAnsweredWords[i];
      const isCorrect = given && given.word.toLowerCase() === blank.word.toLowerCase();
      const chip = document.createElement('span');
      chip.className = 'answer-chip';
      chip.style.borderColor = isCorrect ? 'var(--teal)' : 'var(--earth)';
      chip.style.background = isCorrect ? 'var(--teal-dim)' : 'var(--earth-dim)';
      chip.style.color = isCorrect ? 'var(--teal)' : 'var(--earth)';
      chip.textContent = isCorrect ? given.word : blank.word;
      row.appendChild(chip);
    });
  }

  // Disable word bank
  document.querySelectorAll('#storyWordPool .word-chip').forEach(b => b.disabled = true);

  const checkBtn = document.getElementById('storyCheckBlanksBtn');
  if(checkBtn) checkBtn.style.display = 'none';

  const allCorrect = correct === rs.blanks.length;

  if(allCorrect) {
    if(fb) { fb.className = 'story-feedback correct'; fb.textContent = '✓ Perfect!'; }
    setTimeout(() => completeStoryRound(), 1000);
  } else {
    // Lost a heart
    const remaining = loseHeart();
    if(fb) {
      fb.className = 'story-feedback wrong';
      fb.textContent = remaining > 0
        ? `${correct}/${rs.blanks.length} correct. ${remaining} heart${remaining===1?'':'s'} left — try again!`
        : `💔 Out of hearts!`;
    }
    const heartEl = document.querySelector('.story-hearts');
    if(heartEl) heartEl.textContent = '❤️'.repeat(remaining) + '🖤'.repeat(3-remaining);

    if(remaining <= 0) {
      setTimeout(() => showHeartsEmptyScreen(() => renderStoryPath(s.pathId)), 1500);
    } else {
      setTimeout(() => {
        storyAnsweredWords = [];
        document.querySelectorAll('#storyWordPool .word-chip').forEach(b => {
          b.disabled = false;
          b.classList.remove('used');
        });
        if(checkBtn) { checkBtn.style.display = 'block'; checkBtn.disabled = true; checkBtn.textContent = `Check Answers (0/${rs.blanks.length})`; }
        refreshStoryAnswerRow();
        refreshStoryBlankVerse();
        if(fb) fb.textContent = '';
      }, 2000);
    }
  }
}

const _submittedScores = new Set();

async function submitGameScore(table, data) {
  // Guard against double submissions
  const key = `${table}_${data.score}_${data.difficulty}_${Date.now().toString().slice(0,-3)}`;
  if(_submittedScores.has(key)) {
    console.log('Duplicate score submission blocked:', key);
    return;
  }
  _submittedScores.add(key);
  // Clear old keys after 10 seconds
  setTimeout(() => _submittedScores.delete(key), 10000);

  try {
    const headers = {
      'apikey': SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    };
    if(authToken) headers['Authorization'] = `Bearer ${authToken}`;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers, body: JSON.stringify(data)
    });
    if(res.ok) showScoreToast(data.score, table, data.difficulty);
  } catch(e) { console.error('Score submit failed:', e); }
}

  const toast = document.createElement('div');

  toast.textContent = `🏆 Score of ${score.toLocaleString()} submitted! Tap to view leaderboard`;
  if(table && difficulty) {
    toast.onclick = () => {
      toast.remove();
      const lbNames = {

async function completeStoryChapter(pathId, chapterNum, stars) {
  storyProgress[pathId] = Math.max(storyProgress[pathId] || 0, chapterNum);
  if(!currentUser || !authToken) return;

  try {
    const pathChapters = await sbFetch(`story_chapters?path_id=eq.${pathId}&select=chapter_num&order=chapter_num.desc&limit=1`);
    const totalChapters = pathChapters.length ? pathChapters[0].chapter_num : 10;
    const isCompleted = chapterNum >= totalChapters;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/story_progress`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        user_id: currentUser.id,
        path_id: pathId,
        chapter_num: chapterNum,
        stars,
        completed: isCompleted
      })
    });
    
  } catch(e) { console.error('Story save error:', e); }
}

// HEART TIMER SYSTEM
// ═══════════════════════════════════════
const MAX_HEARTS = 3;
const HEART_REFILL_MS = 30 * 60 * 1000; // 30 minutes
let heartTimerInterval = null;

function getHeartData() {
  const data = localStorage.getItem('ss_hearts');
  if(!data) return { hearts: MAX_HEARTS, lastLostTime: null };
  try { return JSON.parse(data); } catch(e) { return { hearts: MAX_HEARTS, lastLostTime: null }; }
}

function saveHeartData(hearts, lastLostTime) {
  localStorage.setItem('ss_hearts', JSON.stringify({ hearts, lastLostTime }));
}

function getCurrentHearts() {
  const data = getHeartData();
  if(data.hearts >= MAX_HEARTS) return MAX_HEARTS;
  if(!data.lastLostTime) return data.hearts;

  // Calculate how many hearts have refilled
  const elapsed = Date.now() - data.lastLostTime;
  const refilled = Math.floor(elapsed / HEART_REFILL_MS);
  const current = Math.min(MAX_HEARTS, data.hearts + refilled);

  // Update stored value if hearts refilled
  if(current > data.hearts) {
    const newLastLost = current >= MAX_HEARTS ? null : data.lastLostTime + (refilled * HEART_REFILL_MS);
    saveHeartData(current, newLastLost);
  }
  return current;
}

function loseHeart() {
  const current = getCurrentHearts();
  const newHearts = Math.max(0, current - 1);
  saveHeartData(newHearts, newHearts < MAX_HEARTS ? Date.now() : null);
  return newHearts;
}

function getNextRefillTime() {
  const data = getHeartData();
  if(!data.lastLostTime || data.hearts >= MAX_HEARTS) return null;
  const elapsed = Date.now() - data.lastLostTime;
  const nextRefill = HEART_REFILL_MS - (elapsed % HEART_REFILL_MS);
  return nextRefill;
}

function formatCountdown(ms) {
  const totalSeconds = Math.ceil(ms / 1000);
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  return `${mins}:${secs.toString().padStart(2,'0')}`;
}

function showHeartsEmptyScreen(onBack) {
  const hearts = getCurrentHearts();
  if(hearts > 0) { onBack(); return; } // Hearts refilled while waiting

  const root = document.getElementById('root');
  showBackBtn(false);

  const nextRefill = getNextRefillTime();
  const heartData = getHeartData();

  root.innerHTML = `
    <div class="hearts-empty-screen">
      <div class="hearts-empty-icon">💔</div>
      <div class="hearts-empty-title">Out of Hearts!</div>
      <div class="hearts-empty-desc">Take a breather — your hearts will refill automatically. Come back soon and keep going!</div>

      <div class="hearts-timer-box">
        <div class="hearts-timer-label">Next heart in</div>
        <div class="hearts-timer-countdown" id="heartCountdown">${nextRefill ? formatCountdown(nextRefill) : '--:--'}</div>
        <div class="heart-refill-bar">
          ${[0,1,2].map(i => {
            const isFull = i < heartData.hearts;
            const isRefilling = i === heartData.hearts;
            return `<div class="heart-refill-slot ${isFull?'full':isRefilling?'refilling':'empty'}"></div>`;
          }).join('')}
        </div>
        <div class="hearts-timer-next" id="heartTimerNext">Full hearts in ${nextRefill ? formatCountdown(nextRefill + (MAX_HEARTS - heartData.hearts - 1) * HEART_REFILL_MS) : '--:--'}</div>
      </div>

      <div class="pro-tease-box">
        <div class="pro-tease-title">♾️ Never Run Out of Hearts</div>
        <div class="pro-tease-desc">Scripture Scout Pro gives you unlimited hearts so you can study without interruption. Plus unlock all story paths, game modes, and more.</div>
        <button class="btn-pro" onclick="showProComingSoon()">Get Scripture Scout Pro →</button>
        <div style="font-size:0.72rem;color:var(--text-muted);text-align:center;">Coming soon — $2.99 one-time unlock</div>
      </div>

      <button class="btn-change-diff" onclick="${onBack.name ? onBack.name + '()' : 'showHome()'}">← Go Back</button>
    </div>`;

  // Start countdown timer
  if(heartTimerInterval) clearInterval(heartTimerInterval);
  heartTimerInterval = setInterval(() => {
    const current = getCurrentHearts();
    const countdown = document.getElementById('heartCountdown');
    const timerNext = document.getElementById('heartTimerNext');
    const next = getNextRefillTime();

    if(current > 0) {
      // Hearts refilled — go back automatically
      clearInterval(heartTimerInterval);
      showHome();
      return;
    }

    if(countdown && next) countdown.textContent = formatCountdown(next);
    if(timerNext && next) {
      const hd = getHeartData();
      timerNext.textContent = `Full hearts in ${formatCountdown(next + (MAX_HEARTS - hd.hearts - 1) * HEART_REFILL_MS)}`;
    }
  }, 1000);
}

function showProComingSoon() {
  const fb = document.querySelector('.pro-tease-box');
  if(fb) {
    fb.innerHTML = `
      <div class="pro-tease-title">🙏 Thanks for your interest!</div>
      <div class="pro-tease-desc">Scripture Scout Pro is coming soon. Keep playing and we'll let you know when it launches!</div>`;
  }
}

  const hearts = getCurrentHearts();
  if(hearts > 0) {
    onProceed(hearts);
  } else {
    showHeartsEmptyScreen(onBack);
  }
}

function renderStoryModeV2() {
  showBackBtn(true);
  const root = document.getElementById('root');

  root.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;">
      ${getRandyImg('default', 80)}
      <div style="font-family:Georgia,serif;font-size:1.3rem;font-weight:700;color:var(--text);margin-top:8px;">Story Mode</div>
      <div style="color:var(--text-muted);font-size:0.82rem;">Journey through the greatest stories ever told</div>
    </div>

    ${STORY_PATHS_V2.map(path => {
      const progress = getStoryV2Progress(path.id);
      const completed = progress.filter(p => p.stars > 0).length;
      const pct = Math.round((completed / path.chapters.length) * 100);
      return `
      <div onclick="renderStoryPathV2(${path.id})" style="background:var(--surface);border:1.5px solid ${path.accent};border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;overflow:hidden;position:relative;">
        <div style="position:absolute;top:0;right:0;bottom:0;width:40%;background:linear-gradient(to left,${path.color}33,transparent);border-radius:0 18px 18px 0;"></div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:2.5rem;">${path.icon}</div>
          <div style="flex:1;">
            <div style="font-family:Georgia,serif;font-size:1rem;font-weight:700;color:var(--text);">${path.title}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">${path.subtitle}</div>
            <div style="margin-top:8px;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;">
              <div style="height:100%;background:${path.accent};border-radius:2px;width:${pct}%;transition:width 0.5s;"></div>
            </div>
            <div style="font-size:0.7rem;color:var(--text-muted);margin-top:3px;">${completed}/${path.chapters.length} chapters · ${pct}% complete</div>
          </div>
        </div>

function getStoryV2Progress(pathId) {
  try {
    return JSON.parse(localStorage.getItem(`sv2_${pathId}`) || '[]');
  } catch(e) { return []; }
}

function saveStoryV2Progress(pathId, chapterNum, stars) {
  const progress = getStoryV2Progress(pathId);
  const idx = progress.findIndex(p => p.chapter === chapterNum);
  if(idx >= 0) {
    progress[idx].stars = Math.max(progress[idx].stars, stars);
  } else {
    progress.push({ chapter: chapterNum, stars });
  }
  localStorage.setItem(`sv2_${pathId}`, JSON.stringify(progress));

  // Also save to Supabase if logged in
  if(currentUser && authToken) {
    fetch(`${SUPABASE_URL}/rest/v1/story_progress`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ user_id: currentUser.id, path_id: pathId, chapter_num: chapterNum, stars, completed: false })
    }).catch(()=>{});
  }
}

function renderStoryPathV2(pathId) {
  stopSpeech();
  showBackBtn(true);
  const path = STORY_PATHS_V2.find(p => p.id === pathId);
  if(!path) return;
  const progress = getStoryV2Progress(pathId);
  const root = document.getElementById('root');

  root.innerHTML = `
    <div style="background:linear-gradient(135deg,${path.color},${path.color}cc);border-radius:18px;padding:20px;margin-bottom:14px;text-align:center;">
      <div style="font-size:3rem;margin-bottom:8px;">${path.icon}</div>
      <div style="font-family:Georgia,serif;font-size:1.3rem;font-weight:700;color:white;">${path.title}</div>
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.7);margin-top:4px;">${path.description}</div>
    </div>

    ${path.chapters.map((ch, idx) => {
      const chProgress = progress.find(p => p.chapter === ch.num);
      const stars = chProgress ? chProgress.stars : 0;
      const isLocked = idx > 0 && !progress.find(p => p.chapter === idx);
      const starDisplay = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

      return `
      <div onclick="${isLocked ? '' : `startStoryChapterV2(${pathId}, ${ch.num})`}"
        style="background:var(--surface);border:1.5px solid ${stars > 0 ? path.accent : 'var(--border)'};border-radius:14px;padding:14px;margin-bottom:8px;cursor:${isLocked ? 'default' : 'pointer'};opacity:${isLocked ? '0.4' : '1'};display:flex;align-items:center;gap:12px;">
        <div style="width:36px;height:36px;border-radius:50%;background:${stars > 0 ? path.accent : 'var(--surface-2)'};display:flex;align-items:center;justify-content:center;font-weight:700;color:${stars > 0 ? 'white' : 'var(--text-muted)'};flex-shrink:0;">${ch.num}</div>
        <div style="flex:1;">
          <div style="font-size:0.9rem;font-weight:600;color:var(--text);">${ch.title}</div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">${isLocked ? '🔒 Complete previous chapter' : stars > 0 ? starDisplay : '3 questions · tap to begin'}</div>

        ${stars > 0 ? `<div style="font-size:1.1rem;">${starDisplay}</div>` : ''}
      </div>`
    }).join('')}`;
}

function startStoryChapterV2(pathId, chapterNum) {
  const path = STORY_PATHS_V2.find(p => p.id === pathId);
  const chapter = path.chapters.find(c => c.num === chapterNum);
  if(!path || !chapter) return;

  storyV2Session = { pathId, chapterNum, questionIndex: 0, answers: [], stars: 0, phase: 'narrative', path, chapter };
  renderStoryNarrative();
}

function renderStoryNarrative() {
  const { path, chapter } = storyV2Session;
  showBackBtn(true);
  const root = document.getElementById('root');

  root.innerHTML = `
    <!-- Scene illustration -->
    <div style="border-radius:16px;overflow:hidden;margin-bottom:14px;border:1.5px solid ${path.accent};">

    </div>
