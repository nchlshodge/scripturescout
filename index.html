async function sendChallenge(friendId, friendUsername, game, difficulty, score, verse) {
  if(!currentUser) { showStreakToast('Sign in to challenge friends!'); return; }
  try {
    const body = {
      challenger_id: currentUser.id,
      opponent_id: friendId,
      game,
      difficulty,
      challenger_score: score,
      challenger_name: currentUsername || playerName,
      verse_id: verse?.id || null,
      verse_book: verse?.book || null,
      verse_chapter: verse?.chapter || null,
      verse_verse: verse?.verse || null
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/challenges`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    // Send notification
    const gameNames = { scout:'Scripture Scout', memory:'Memory Trail', mia:'Missing in Action', track:'Track It Down' };
    await createNotification(friendId, 'challenge',
      `⚔️ ${currentUsername} challenged you to beat ${score.toLocaleString()} pts on ${gameNames[game]} ${difficulty}! You have 24 hours.`,
      { challenge_id: data[0]?.id, from_id: currentUser.id, from_username: currentUsername, game, difficulty, score }
    );
    showStreakToast(`Challenge sent to ${friendUsername}! ⚔️`);
  } catch(e) { console.error('Challenge send failed:', e); showStreakToast('Could not send challenge.'); }
}

async function respondToChallenge(challengeId, score, verse) {
  try {
    // Calculate time bonus based on how fast they completed it
    const ch = window._activeChallenge;
    let timeBonus = 0;
    if(ch?.startedAt) {
      const elapsed = (new Date() - ch.startedAt) / 1000; // seconds
      // Max 500 pts, decays over 300 seconds (5 minutes)
      // Full bonus if under 30 seconds, zero bonus after 5 minutes
      const maxBonus = 500;
      const maxSeconds = 300;
      timeBonus = Math.max(0, Math.floor(maxBonus * (1 - elapsed / maxSeconds)));
    }
    const totalScore = score + timeBonus;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/challenges?id=eq.${challengeId}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=representation' },
      body: JSON.stringify({ opponent_score: totalScore, opponent_name: currentUsername || playerName, status: 'completed', time_bonus: timeBonus })
    });
    const data = await res.json();
    const challenge = data[0];
    if(challenge) {
      const won = score > challenge.challenger_score;
      const tied = score === challenge.challenger_score;
      const msg = won
        ? `🏆 ${currentUsername} beat your challenge on ${challenge.game}! They scored ${score.toLocaleString()} vs your ${challenge.challenger_score.toLocaleString()}.`
        : tied
        ? `🤝 ${currentUsername} tied your challenge on ${challenge.game}! You both scored ${score.toLocaleString()}.`
        : `😅 ${currentUsername} accepted your challenge on ${challenge.game} but couldn't beat your score of ${challenge.challenger_score.toLocaleString()}.`;
      await createNotification(challenge.challenger_id, 'challenge_result', msg, { challenge_id: challengeId, score, challenger_score: challenge.challenger_score });
    }
    return data[0];
  } catch(e) { console.error('Challenge respond failed:', e); }
}

async function renderChallenges() {
  showBackBtn(true);
  const root = document.getElementById('root');
  root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading challenges…</div></div>`;

  const now = new Date().toISOString();
  const [sent, received] = await Promise.all([
    sbFetch(`challenges?challenger_id=eq.${currentUser.id}&order=created_at.desc&limit=20&select=*`),
    sbFetch(`challenges?opponent_id=eq.${currentUser.id}&order=created_at.desc&limit=20&select=*`)
  ]);

  const gameIcons = { scout:'📖', memory:'🃏', mia:'✏️', track:'🎯' };
  const gameNames = { scout:'Scripture Scout', memory:'Memory Trail', mia:'Missing in Action', track:'Track It Down' };

  function renderChallenge(c, isMine) {
    const expired = new Date(c.expires_at) < new Date() && c.status === 'pending';
    const status = expired ? 'expired' : c.status;
    const myScore = isMine ? c.challenger_score : c.opponent_score;
    const theirScore = isMine ? c.opponent_score : c.challenger_score;
    const theirName = isMine ? (c.opponent_name || 'Waiting...') : c.challenger_name;
    const won = myScore !== null && theirScore !== null && myScore > theirScore;
    const tied = myScore !== null && theirScore !== null && myScore === theirScore;

    let resultText = '';
    let resultClass = '';
    if(status === 'expired') { resultText = '⏰ Expired — no response'; resultClass = 'expired'; }
    else if(status === 'pending' && isMine) { resultText = '⏳ Waiting for response...'; resultClass = 'pending'; }
    else if(status === 'pending' && !isMine) { resultText = '⚔️ Challenge waiting for you!'; resultClass = 'pending'; }
    else if(won) { resultText = '🏆 You won!'; resultClass = 'win'; }
    else if(tied) { resultText = '🤝 Tied!'; resultClass = 'win'; }
    else { resultText = '😅 You lost'; resultClass = 'lose'; }

    return `
      <div class="challenge-card ${won?'won':status==='pending'?'pending':'lost'}">
        <div class="challenge-header">
          <div class="challenge-icon">${gameIcons[c.game]||'🎮'}</div>
          <div>
            <div class="challenge-title">${gameNames[c.game]||c.game} — ${c.difficulty}</div>
            <div class="challenge-meta">${isMine ? 'You challenged' : 'Challenge from'} ${theirName} · ${timeAgo(c.created_at)}</div>
            ${c.verse_book ? `<div class="challenge-meta">📖 ${c.verse_book} ${c.verse_chapter}:${c.verse_verse}</div>` : ''}
          </div>
        </div>
        <div class="challenge-scores">
          <div class="challenge-score-box">
            <div class="challenge-score-val" style="color:var(--teal);">${(isMine ? c.challenger_score : (c.opponent_score ?? '—')).toLocaleString?.() || '—'}</div>
            <div class="challenge-score-label">Your Score</div>
          </div>
          <div style="display:flex;align-items:center;font-size:1.2rem;color:var(--text-muted);">⚔️</div>
          <div class="challenge-score-box">
            <div class="challenge-score-val" style="color:#F4B942;">${(isMine ? (c.opponent_score ?? '—') : c.challenger_score).toLocaleString?.() || '—'}</div>
            <div class="challenge-score-label">${theirName.split(' ')[0]}'s Score</div>
          </div>
        </div>
        <div class="challenge-result ${resultClass}">${resultText}</div>
        ${status === 'pending' && !isMine ? `<button class="btn-next" onclick="acceptChallenge('${c.id}','${c.game}','${c.difficulty}',${c.challenger_score},'${c.verse_book||''}',${c.verse_chapter||0},${c.verse_verse||0})" style="margin-top:0;">Accept Challenge →</button>` : ''}
      </div>`;
  }

  const allChallenges = [
    ...received.map(c => ({ ...c, _received: true })),
    ...sent.map(c => ({ ...c, _received: false }))
  ].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  root.innerHTML = `
    <div class="friends-screen">
      <div class="verse-label">⚔️ Challenges</div>
      ${allChallenges.length ? allChallenges.map(c => renderChallenge(c, !c._received)).join('') :
        `<div class="empty-state">No challenges yet!<br>Challenge a friend after finishing a game.</div>`}
      <button class="btn-change-diff" style="margin-top:12px;" onclick="showHome()">← Home</button>
    </div>`;
}

async function acceptChallenge(challengeId, game, difficulty, challengerScore, book, chapter, verse) {
  showBackBtn(true);
  const root = document.getElementById('root');

  // Record when opponent started
  const startedAt = new Date().toISOString();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/challenges?id=eq.${challengeId}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
      body: JSON.stringify({ opponent_started_at: startedAt })
    });
  } catch(e) {}

  // Fetch the specific verse if provided
  let challengeVerse = null;
  if(book && chapter && verse) {
    const rows = await sbFetch(`verses?translation=eq.${TRANSLATION}&book=eq.${encodeURIComponent(book)}&chapter=eq.${chapter}&verse=eq.${verse}&select=*&limit=1`);
    if(rows.length) challengeVerse = rows[0];
  }

  // Store challenge context with start time
  window._activeChallenge = { id: challengeId, game, difficulty, challengerScore, verse: challengeVerse, startedAt: new Date() };

  // Launch the appropriate game
  root.innerHTML = `
    <div style="text-align:center;padding:20px;">
      <div style="font-size:0.78rem;font-weight:700;color:#F4B942;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">⚔️ Challenge Mode</div>
      <div style="font-size:0.88rem;color:var(--text-muted);margin-bottom:20px;">Beat ${challengerScore.toLocaleString()} pts to win!</div>
    </div>`;

  if(game === 'scout') startChallengeScout(challengeVerse, difficulty);
  else if(game === 'mia') startChallengeMIA(challengeVerse, difficulty);
  else if(game === 'track') startChallengeTrack(challengeVerse, difficulty);
  else if(game === 'memory') startChallengeMemory(challengeVerse);
}

async function completeChallengeGame(score, verse) {
  const pc = window._pendingChallenge;
  if(pc && pc.friendId) {
    // Challenger just played — send challenge to friend
    window._pendingChallenge = null;
    await sendChallenge(pc.friendId, pc.friendUsername, pc.game, pc.difficulty, score, verse || pc.verse);
    showStreakToast(`Challenge sent to ${pc.friendUsername}! ⚔️`);
    renderChallenges();
  } else if(window._activeChallenge) {
    // Opponent responding to challenge
    await finishChallenge(score, verse);
  }
}

function renderChallengeScout(verse) {
  const root = document.getElementById('root');
  const correctTestament = verse.testament;
  const correctBook = verse.book;
  const correctChapter = parseInt(verse.chapter);
  let score = 0;
  let phase = 1;

  function renderPhase() {
    root.innerHTML = challengeHUD() + `
      <div class="card" style="max-width:560px;width:100%;margin-top:8px;">
        <div class="verse-text" style="margin-bottom:16px;">"${verse.text}"</div>
        <hr class="divider"/>
        <div id="challengePhaseArea"></div>
        <div class="feedback" id="challengeFeedback"></div>
      </div>`;

    const area = document.getElementById('challengePhaseArea');
    const fb = document.getElementById('challengeFeedback');

    if(phase === 1) {
      area.innerHTML = `
        <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;">Which Testament?</div>
        <div style="display:flex;gap:10px;">
          <button class="ref-option" style="flex:1;" data-ans="OT">📜 Old Testament</button>
          <button class="ref-option" style="flex:1;" data-ans="NT">✝️ New Testament</button>
        </div>`;
      area.querySelectorAll('.ref-option').forEach(btn => {
        btn.onclick = () => {
          area.querySelectorAll('.ref-option').forEach(b=>b.disabled=true);
          const isCorrect = btn.dataset.ans === correctTestament;
          btn.classList.add(isCorrect?'correct':'wrong');
          if(!isCorrect) area.querySelector(`[data-ans="${correctTestament}"]`).classList.add('correct');
          if(isCorrect) { score+=300; fb.className='feedback correct'; fb.textContent='✓ Correct! +300'; }
          else { fb.className='feedback wrong'; fb.textContent=`✗ It was ${correctTestament==='OT'?'Old':'New'} Testament`; }
          setTimeout(()=>{ phase=2; renderPhase(); }, 1200);
        };
      });
    } else if(phase === 2) {
      const books = correctTestament === 'OT' ? OT_BOOKS : NT_BOOKS;
      const wrongBooks = books.filter(b=>b[0]!==correctBook).sort(()=>Math.random()-0.5).slice(0,3).map(b=>b[0]);
      const choices = shuffle([correctBook,...wrongBooks]);
      area.innerHTML = `
        <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;">Which Book?</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${choices.map(c=>`<button class="ref-option" data-ans="${c}">${c}</button>`).join('')}
        </div>`;
      area.querySelectorAll('.ref-option').forEach(btn => {
        btn.onclick = () => {
          area.querySelectorAll('.ref-option').forEach(b=>b.disabled=true);
          const isCorrect = btn.dataset.ans === correctBook;
          btn.classList.add(isCorrect?'correct':'wrong');
          if(!isCorrect) area.querySelector(`[data-ans="${correctBook}"]`).classList.add('correct');
          if(isCorrect) { score+=500; fb.className='feedback correct'; fb.textContent='✓ Correct! +500'; }
          else { fb.className='feedback wrong'; fb.textContent=`✗ It was ${correctBook}`; }
          setTimeout(()=>{ phase=3; renderPhase(); }, 1200);
        };
      });
    } else {
      const wrongChapters = [];
      for(let i=0;i<3;i++) {
        let c;
        do { c=Math.max(1,correctChapter+Math.floor(Math.random()*6)-3); } while(c===correctChapter||wrongChapters.includes(c));
        wrongChapters.push(c);
      }
      const choices = shuffle([correctChapter,...wrongChapters]);
      area.innerHTML = `
        <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;">Which Chapter?</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${choices.map(c=>`<button class="ref-option" data-ans="${c}">Chapter ${c}</button>`).join('')}
        </div>`;
      area.querySelectorAll('.ref-option').forEach(btn => {
        btn.onclick = async () => {
          area.querySelectorAll('.ref-option').forEach(b=>b.disabled=true);
          const isCorrect = parseInt(btn.dataset.ans) === correctChapter;
          btn.classList.add(isCorrect?'correct':'wrong');
          if(!isCorrect) area.querySelector(`[data-ans="${correctChapter}"]`).classList.add('correct');
          if(isCorrect) { score+=700; fb.className='feedback correct'; fb.textContent='✓ Correct! +700'; }
          else { fb.className='feedback wrong'; fb.textContent=`✗ Chapter ${correctChapter}`; }
          setTimeout(()=>completeChallengeGame(score, verse), 1200);
        };
      });
    }
  }
  renderPhase();
}

function renderChallengeMIA(verse) {
  const root = document.getElementById('root');
  const blanks = getBlankWords(verse.text, 'hard');
  const options = blanks.map(b => generateOptions(b.word, verse.text.split(' ')));
  const blankHtml = buildBlankVerse(verse.text, blanks, 0, {});

  let challengeWordBank = [];
  let challengeAnswerRow = [];
  let challengeScore = 0;

  root.innerHTML = challengeHUD() + `
    <div class="card" style="max-width:560px;width:100%;margin-top:8px;">
      <div class="verse-label">✏️ Fill in the blanks</div>
      <div style="font-size:0.78rem;font-weight:700;color:#A78BFA;margin-bottom:10px;">📖 ${verse.book} ${verse.chapter}:${verse.verse}</div>
      <div class="blank-verse" id="challengeMIAVerse">${blankHtml}</div>
      <div id="challengeMIAInput"></div>
      <div class="feedback" id="challengeMIAFeedback"></div>
    </div>`;

  const wordList = [];
  blanks.forEach(b => wordList.push(b.word));
  const distractors = new Set();
  options.forEach(opts => opts.forEach(o => { if(!blanks.map(b=>b.word).includes(o) && !distractors.has(o)) { distractors.add(o); wordList.push(o); } }));
  challengeWordBank = shuffle(wordList).map((w,i) => ({ word:w, chipIndex:i }));

  const area = document.getElementById('challengeMIAInput');
  area.innerHTML = `
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--teal);font-weight:600;margin-bottom:6px;">Your answer:</div>
    <div id="challengeAnswerRow" class="answer-row"><span class="answer-placeholder">Tap words below…</span></div>
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:600;margin:10px 0 6px;">Word bank:</div>
    <div id="challengeWordBank" class="word-bank">
      ${challengeWordBank.map(w=>`<button class="word-chip" data-index="${w.chipIndex}" data-word="${w.word}">${w.word}</button>`).join('')}
    </div>
    <div id="challengeCheckArea">
      <button class="btn-next" id="challengeCheckBtn" style="background:linear-gradient(135deg,#4A7C59,#3BBFA0);margin-top:8px;" disabled>Check Answers (0/${blanks.length})</button>
    </div>`;

  function refreshChallengeVerse() {
    const verseEl = document.getElementById('challengeMIAVerse');
    if(!verseEl) return;
    const filled = {};
    challengeAnswerRow.forEach((a,i) => { if(blanks[i]) filled[blanks[i].index] = a.word; });
    verseEl.innerHTML = buildBlankVerse(verse.text, blanks, challengeAnswerRow.length, filled);
  }

  function refreshChallengeAnswerRow() {
    const row = document.getElementById('challengeAnswerRow');
    if(!row) return;
    if(challengeAnswerRow.length === 0) { row.innerHTML = '<span class="answer-placeholder">Tap words below…</span>'; return; }
    row.innerHTML = '';
    challengeAnswerRow.forEach((w,i) => {
      const chip = document.createElement('button');
      chip.className = 'answer-chip';
      chip.textContent = w.word;
      chip.addEventListener('click', () => {
        challengeAnswerRow.splice(i,1);
        document.querySelector(`#challengeWordBank .word-chip[data-index="${w.chipIndex}"]`)?.classList.remove('used');
        refreshChallengeAnswerRow();
        refreshChallengeVerse();
        updateChallengeCheckBtn();
      });
      row.appendChild(chip);
    });
  }

  function updateChallengeCheckBtn() {
    const btn = document.getElementById('challengeCheckBtn');
    if(!btn) return;
    const filled = challengeAnswerRow.length;
    btn.disabled = filled < blanks.length;
    btn.textContent = filled >= blanks.length ? 'Check Answers ✓' : `Check Answers (${filled}/${blanks.length})`;
    if(filled >= blanks.length) btn.onclick = checkChallengeMIA;
  }

  function checkChallengeMIA() {
    let correct = 0;
    blanks.forEach((blank,i) => {
      const given = challengeAnswerRow[i];
      if(given && given.word.toLowerCase() === blank.word.toLowerCase()) correct++;
    });
    challengeScore = correct * 200;
    document.querySelectorAll('#challengeWordBank .word-chip').forEach(b=>b.disabled=true);
    const row = document.getElementById('challengeAnswerRow');
    if(row) {
      row.innerHTML = blanks.map((blank,i) => {
        const given = challengeAnswerRow[i];
        const isCorrect = given && given.word.toLowerCase() === blank.word.toLowerCase();
        return `<span class="answer-chip" style="border-color:${isCorrect?'var(--teal)':'var(--earth)'};background:${isCorrect?'var(--teal-dim)':'var(--earth-dim)'};color:${isCorrect?'var(--teal)':'var(--earth)'};">${isCorrect?given.word:blank.word}</span>`;
      }).join('');
    }
    const checkArea = document.getElementById('challengeCheckArea');
    if(checkArea) checkArea.innerHTML = `<button class="btn-next" style="margin-top:8px;" onclick="completeChallengeGame(${challengeScore}, ${JSON.stringify(verse).replace(/"/g,'&quot;')})">See Results →</button>`;
  }

  document.querySelectorAll('#challengeWordBank .word-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.classList.contains('used')) return;
      if(challengeAnswerRow.length >= blanks.length) return;
      challengeAnswerRow.push({ word: btn.dataset.word, chipIndex: parseInt(btn.dataset.index) });
      btn.classList.add('used');
      refreshChallengeAnswerRow();
      refreshChallengeVerse();
      updateChallengeCheckBtn();
    });
  });
}

async function finishChallenge(score, verse) {
  const ch = window._activeChallenge;
  if(!ch) return;
  const result = await respondToChallenge(ch.id, score, verse);
  window._activeChallenge = null;

  // Get the time bonus that was applied
  const timeBonus = result?.time_bonus || 0;
  const totalScore = score + timeBonus;
  const won = result && totalScore > ch.challengerScore;
  const tied = result && totalScore === ch.challengerScore;

  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="card" style="max-width:560px;width:100%;text-align:center;padding:32px 24px;">
      <div style="font-size:3rem;margin-bottom:12px;">${won?'🏆':tied?'🤝':'😅'}</div>

        </div>
        <div style="display:flex;align-items:center;font-size:1.2rem;">⚔️</div>

// Cache notifications to speed up display
let _notifCache = { rows:[], friendReqs:[], challenges:[], unread:0, lastFetched:0 };

async function loadNotifications(force=false) {
  if(!currentUser) return [];
  // Use cache if fresh (under 10 seconds old) and not forced
  const age = Date.now() - _notifCache.lastFetched;
  if(!force && age < 10000 && _notifCache.lastFetched > 0) {
    updateNotifBadge(_notifCache.unread);
    return _notifCache.rows;
  }
  try {
    const now = new Date().toISOString();
    const [rows, friendReqs, challenges] = await Promise.all([
      sbFetch(`notifications?user_id=eq.${currentUser.id}&order=created_at.desc&limit=20&select=*`),
      sbFetch(`friends?friend_id=eq.${currentUser.id}&status=eq.pending&select=id,user_id`).catch(()=>[]),
      sbFetch(`challenges?opponent_id=eq.${currentUser.id}&status=eq.pending&expires_at=gt.${now}&select=id`).catch(()=>[])
    ]);
    const unread = rows.filter(r => !r.read).length + friendReqs.length + challenges.length;
    _notifCache = { rows, friendReqs, challenges, unread, lastFetched: Date.now() };
    updateNotifBadge(unread);
    return rows;
  } catch(e) { console.log('Notif load error:', e); return []; }
}

function updateNotifBadge(unread) {
  const badge = document.getElementById('notifBadge');
  const bell = document.getElementById('notifBellWrap');
  if(bell) bell.style.display = 'flex';
  if(badge) { badge.textContent = unread; badge.style.display = unread > 0 ? 'block' : 'none'; }
  const homeCount = document.getElementById('homeNotifCount');
  if(homeCount) { homeCount.textContent = unread; homeCount.style.display = unread > 0 ? 'inline' : 'none'; }
  // Add pulse animation when there are notifications
  const alertBtn = document.getElementById('homeNotifBtn');
  if(alertBtn) alertBtn.style.borderColor = unread > 0 ? '#E53E3E' : 'var(--border)';
}

async function createNotification(userId, type, message, data={}) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/notifications`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ user_id: userId, type, message, data })
    });
  } catch(e) {}
}

async function markNotifRead(id) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/notifications?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
      body: JSON.stringify({ read: true })
    });
  } catch(e) {}
}

async function renderNotifications() {
  return renderNotificationHub();
}

async function renderNotificationHub() {
  showBackBtn(true);
  const root = document.getElementById('root');

  // Show cached data immediately if available
  if(_notifCache.lastFetched > 0) {
    renderNotifHubContent(root, _notifCache.rows, _notifCache.friendReqs, _notifCache.challenges);
  } else {
    root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading…</div></div>`;
  }

  // Force fresh fetch in background
  await loadNotifications(true);
  const now = new Date().toISOString();
  const [notifs, friendRequests, pendingChallenges] = await Promise.all([
    Promise.resolve(_notifCache.rows),
    sbFetch(`friends?friend_id=eq.${currentUser.id}&status=eq.pending&select=*&order=created_at.desc`).catch(()=>[]),
    sbFetch(`challenges?opponent_id=eq.${currentUser.id}&status=eq.pending&expires_at=gt.${now}&select=*&order=created_at.desc`).catch(()=>[])
  ]);

  renderNotifHubContent(root, notifs, friendRequests, pendingChallenges);
}

  // Get usernames for friend requests
  const reqUserIds = friendRequests.map(r => r.user_id);

  if(reqUserIds.length) reqProfiles = await sbFetch(`profiles?id=in.(${reqUserIds.join(',')})&select=id,username`).catch(()=>[]);
  const getReqName = id => reqProfiles.find(p=>p.id===id)?.username || 'Someone';

  // Mark notifications as read
  notifs.filter(n => !n.read).forEach(n => markNotifRead(n.id));

  const gameNames = { scout:'Scripture Scout', memory:'Memory Trail', mia:'Missing in Action', track:'Track It Down' };

  root.innerHTML = `
    <div class="friends-screen">
      <div class="verse-label">🔔 Notifications</div>

      ${friendRequests.length ? `
      <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:#A78BFA;font-weight:600;margin-bottom:8px;">👋 Friend Requests (${friendRequests.length})</div>
      ${friendRequests.map(r => `

          </div>
        </div>`).join('')}
      <hr class="divider" style="margin:12px 0;"/>` : ''}

      ${pendingChallenges.length ? `
      <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:#F4B942;font-weight:600;margin-bottom:8px;">⚔️ Pending Challenges (${pendingChallenges.length})</div>
      ${pendingChallenges.map(c => {
        const hoursLeft = Math.max(0, Math.floor((new Date(c.expires_at) - new Date()) / 3600000));
        return `
        <div class="challenge-card pending" style="margin-bottom:8px;cursor:pointer;" onclick="showChallengeBanner(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <div class="challenge-header">
            <div class="challenge-icon">⚔️</div>
            <div>
              <div class="challenge-title">${c.challenger_name} challenged you!</div>
              <div class="challenge-meta">${gameNames[c.game]||c.game} · Beat ${c.challenger_score.toLocaleString()} pts · ⏰ ${hoursLeft}h left</div>
            </div>
          </div>
          <button class="btn-next" style="margin-top:4px;" onclick="event.stopPropagation();showChallengeBanner(${JSON.stringify(c).replace(/"/g,'&quot;')})">⚔️ Accept Challenge!</button>
        </div>`;
      }).join('')}
      <hr class="divider" style="margin:12px 0;"/>` : ''}

      <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:600;margin-bottom:8px;">📬 Recent Notifications</div>
      <div class="card" style="max-width:560px;width:100%;padding:0;overflow:hidden;">
        ${notifs.length ? notifs.map(n => `
          <div class="notif-item">
            <div class="notif-icon">${n.type==='friend_request'?'👋':n.type==='friend_accept'?'🤝':n.type==='challenge'?'⚔️':n.type==='challenge_result'?'🏆':'💬'}</div>
            <div>
              <div class="notif-text">${n.message}</div>
              <div class="notif-time">${timeAgo(n.created_at)}</div>

          </div>`).join('') : `<div class="empty-state">No notifications yet!</div>`}
      </div>

      <button class="btn-change-diff" style="margin-top:12px;" onclick="showHome()">← Home</button>
    </div>`;
}

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff/60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

    renderPicker();
    window._pendingIcon = icon;
  };
  window.selectAvatarColor = (color) => {
    selectedColor = color;
    renderPicker();
    window._pendingColor = color;
  };
  window.saveAvatar = async () => {
    currentAvatarIcon = window._pendingIcon !== undefined ? window._pendingIcon : selectedIcon;
    currentAvatarColor = window._pendingColor || selectedColor;
    try {
      const headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` };
      await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}`, {

      });

      overlay.remove();
      renderProfile();

  };

  renderPicker();
  document.body.appendChild(overlay);
}

function computeBadges(stats, streak, scores) {
  const earned = new Set();
  const s = streak || {};
  const current = s.current_streak || 0;
  const longest = s.longest_streak || 0;
  const totalGames = stats?.games || 0;

  // Streak badges
  if(longest >= 3)   earned.add('streak_3');
  if(longest >= 7)   earned.add('streak_7');
  if(longest >= 14)  earned.add('streak_14');
  if(longest >= 30)  earned.add('streak_30');
  if(longest >= 100) earned.add('streak_100');
  if(longest >= 365) earned.add('streak_365');

  // Performance badges
  if(parseInt(localStorage.getItem('ss_perfect_hard')||0) >= 1) earned.add('perfect_1');
  if(parseInt(localStorage.getItem('ss_perfect_hard')||0) >= 10) earned.add('perfect_10');
  if(parseInt(localStorage.getItem('ss_perfect_hard')||0) >= 3) earned.add('hard_3');
  if(localStorage.getItem('ss_perfect_hard')) earned.add('endless');
  if((stats?.best||0) >= 10000) earned.add('score_10k');

  // Exploration badges
  const playedGames = new Set(scores.map(s => s.game || 'scout'));
  if(playedGames.size >= 4 || totalGames >= 4) earned.add('all_games');
  if(localStorage.getItem('ss_story_started')) earned.add('story_start');
  if(parseInt(localStorage.getItem('ss_daily_done_count')||0) >= 7) earned.add('daily_7');

  return earned;
}

async function editUsername() {
  const newName = prompt('Enter new username:', currentUsername || '');
  if(!newName || newName === currentUsername) return;
  if(newName.length < 3) { showStreakToast('Username must be at least 3 characters!'); return; }
  if(newName.length > 20) { showStreakToast('Username must be 20 characters or less!'); return; }

  try {
    const headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=minimal' };
    // Check if username taken
    const existing = await sbFetch(`profiles?username=eq.${encodeURIComponent(newName)}&select=id`);
    if(existing.length && existing[0].id !== currentUser.id) { showStreakToast('Username already taken!'); return; }
    // Update
    await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}`, { method:'PATCH', headers, body: JSON.stringify({ username: newName }) });
    currentUsername = newName;
    playerName = newName;
    localStorage.setItem('ss_username', newName);
    showStreakToast('Username updated! ✅');
    renderProfile();
  } catch(e) { showStreakToast('Could not update username.'); }
}

async function sendFriendRequest(friendId, friendUsername) {

    await fetch(`${SUPABASE_URL}/rest/v1/friends`, {

      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ user_id: currentUser.id, friend_id: friendId, status: 'pending' })

    await createNotification(friendId, 'friend_request', `${currentUsername} sent you a friend request! Tap to accept.`, { from_id: currentUser.id, from_username: currentUsername });

  const total = DIFF_COUNTS[TRANSLATION][difficulty];
  const offset = Math.floor(Math.random() * total);
  const rows = await sbFetch(`verses?translation=eq.${TRANSLATION}&difficulty=eq.${difficulty}&select=*&limit=1&offset=${offset}`);
  if(!rows.length) { showStreakToast('Could not load verse. Try again!'); return; }
  const verse = rows[0];

  // Store pending challenge info
  window._pendingChallenge = { friendId, friendUsername, game, difficulty, verse };

  // Launch the game
  showBackBtn(true);
  const root = document.getElementById('root');
  root.innerHTML = `
    <div style="text-align:center;padding:20px 16px 8px;">
      <div style="font-size:0.78rem;font-weight:700;color:#F4B942;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;">⚔️ Challenge Mode</div>
      <div style="font-size:0.85rem;color:var(--text-muted);">Play your best — ${friendUsername} will try to beat you!</div>
    </div>`;

  if(game === 'scout') await startChallengeScout(verse, difficulty);
  else if(game === 'mia') await startChallengeMIA(verse, difficulty);
  else if(game === 'track') await startChallengeTrack(verse, difficulty);
  else if(game === 'memory') await startChallengeMemory(verse);
}

async function openDirectMessage(friendId, friendUsername) {
  showBackBtn(true);
  // Check if DM conversation exists
  const myConvs = await sbFetch(`conversation_members?user_id=eq.${currentUser.id}&select=conversation_id`);
  const friendConvs = await sbFetch(`conversation_members?user_id=eq.${friendId}&select=conversation_id`);
  const myIds = myConvs.map(c => c.conversation_id);
  const friendIds = friendConvs.map(c => c.conversation_id);
  const shared = myIds.find(id => friendIds.includes(id));

  if(shared) {
    openConversation(shared, friendUsername, 'direct');
    return;
  }

  // Create new DM conversation
  const res = await fetch(`${SUPABASE_URL}/rest/v1/conversations`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=representation' },
    body: JSON.stringify({ name: friendUsername, type: 'direct', created_by: currentUser.id })
  });
  const convData = await res.json();
  const convId = convData[0]?.id;
  if(!convId) return;

  // Add both members
  await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/conversation_members`, { method:'POST', headers:{ 'apikey':SUPABASE_KEY,'Content-Type':'application/json','Authorization':`Bearer ${authToken}`,'Prefer':'return=minimal' }, body: JSON.stringify({ conversation_id: convId, user_id: currentUser.id, username: currentUsername }) }),
    fetch(`${SUPABASE_URL}/rest/v1/conversation_members`, { method:'POST', headers:{ 'apikey':SUPABASE_KEY,'Content-Type':'application/json','Authorization':`Bearer ${authToken}`,'Prefer':'return=minimal' }, body: JSON.stringify({ conversation_id: convId, user_id: friendId, username: friendUsername }) })
  ]);

  openConversation(convId, friendUsername, 'direct');
}

async function openConversation(convId, convName, convType) {

    const reactionsByMsg = {};

    root.innerHTML = `

            const rxnGroups = {};
            rxns.forEach(r => { rxnGroups[r.emoji] = (rxnGroups[r.emoji]||0)+1; });
            let bubbleClass = isMine ? 'mine' : 'theirs';
            if(m.type==='score') bubbleClass += ' score-share';

let currentStreak = null; // loaded from Supabase

async function loadStreak() {
  if(!currentUser) return null;
  try {
    const rows = await sbFetch(`streaks?user_id=eq.${currentUser.id}&select=*&limit=1`);
    if(rows.length) {
      currentStreak = rows[0];
    } else {
      // Create new streak record
      const headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=representation' };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/streaks`, { method:'POST', headers, body: JSON.stringify({ user_id: currentUser.id, current_streak:0, longest_streak:0, freeze_tokens:0, total_days_played:0 }) });
      const data = await res.json();
      currentStreak = Array.isArray(data) ? data[0] : data;
    }
    return currentStreak;
  } catch(e) { console.error('Load streak failed:', e); return null; }
}

async function updateStreak(bonusDay=false) {
  if(!currentUser) return;
  const streak = await loadStreak();
  if(!streak) return;

  const today = getDailyKey();
  const lastPlayed = streak.last_played_date;

  // Already played today
  if(lastPlayed === today) {
    // If bonus day (completed all daily challenges) add extra
    if(bonusDay && !streak._bonusAwardedToday) {
      await patchStreak({ current_streak: streak.current_streak + 1, longest_streak: Math.max(streak.longest_streak, streak.current_streak + 1), _bonusAwardedToday: true });
    }
    return;
  }

  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  const twoDaysAgo = new Date(Date.now() - 2*86400000).toISOString().split('T')[0];

  let newStreak = streak.current_streak;
  let newTokens = streak.freeze_tokens;
  let usedFreeze = false;

  if(lastPlayed === yesterday) {
    // Consecutive day
    newStreak++;
  } else if(lastPlayed === twoDaysAgo && streak.freeze_tokens > 0) {
    // Missed one day but has freeze token
    newStreak++;
    newTokens = Math.max(0, newTokens - 1);
    usedFreeze = true;
  } else if(!lastPlayed) {
    // First time
    newStreak = 1;
  } else {
    // Streak broken
    newStreak = 1;
    newTokens = 0;
  }

  // Award freeze token every 7 days
  if(newStreak % 7 === 0 && newStreak > 0) {
    newTokens = Math.min(3, newTokens + 1);
  }

  const newLongest = Math.max(streak.longest_streak, newStreak);
  const newTotal = (streak.total_days_played || 0) + 1;

  await patchStreak({
    current_streak: newStreak,
    longest_streak: newLongest,
    last_played_date: today,
    freeze_tokens: newTokens,
    total_days_played: newTotal,
    updated_at: new Date().toISOString()
  });

  // Show milestone notifications
  if(usedFreeze) showStreakToast(`❄️ Freeze token used! Streak protected.`);
  else if(newStreak % 7 === 0 && newTokens > streak.freeze_tokens) showStreakToast(`🎉 ${newStreak} day streak! ❄️ Freeze token earned!`);
  else if([3,7,14,30,50,100].includes(newStreak)) showStreakToast(`🔥 ${newStreak} day streak! Keep it up!`);
}

async function patchStreak(updates) {
  if(!currentUser || !currentStreak) return;
  try {
    const headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'Prefer': 'return=representation' };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/streaks?user_id=eq.${currentUser.id}`, { method:'PATCH', headers, body: JSON.stringify(updates) });
    const data = await res.json();
    if(Array.isArray(data) && data[0]) currentStreak = data[0];
    else Object.assign(currentStreak, updates);
  } catch(e) { console.error('Patch streak failed:', e); }
}

function getDailyKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isDailyCompleted(game) {
  return localStorage.getItem(`ss_dailychallenge_${game}_${getDailyKey()}`) !== null;
}

function markDailyCompleted(game, score) {
  localStorage.setItem(`ss_dailychallenge_${game}_${getDailyKey()}`, score);
}

function getDailyScore(game) {
  return parseInt(localStorage.getItem(`ss_dailychallenge_${game}_${getDailyKey()}`) || '0');
}

// Seed a number from today's date
function getDailySeed(extra='') {
  const key = getDailyKey() + extra;
  let hash = 0;
  for(let i = 0; i < key.length; i++) {
    hash = ((hash << 5) - hash) + key.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

// Cache today's topic and verse pool
let _dailyTopicCache = null;
let _dailyVersePool = null;

async function getDailyTopicAndVerses() {
  if(_dailyTopicCache && _dailyVersePool) return { topic: _dailyTopicCache, verses: _dailyVersePool };

  // Check localStorage cache first
  const cacheKey = `ss_daily_topic_${getDailyKey()}`;
  const cached = localStorage.getItem(cacheKey);
  if(cached) {
    try {
      const { topic, verses } = JSON.parse(cached);
      _dailyTopicCache = topic;
      _dailyVersePool = verses;
      return { topic, verses };
    } catch(e) {}
  }

  // Pick today's topic from curated list using day-of-year
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  const topic = DAILY_TOPICS[dayOfYear % DAILY_TOPICS.length];
  _dailyTopicCache = topic;

  // Fetch top verse references for this topic
  const topicVerses = await sbFetch(`verse_topics?topic=eq.${encodeURIComponent(topic)}&order=quality_score.desc&limit=20&select=book,chapter,verse`);

  // Fetch all matching verses in PARALLEL instead of sequential
  const versePromises = topicVerses.slice(0, 8).map(tv =>
    sbFetch(`verses?translation=eq.${TRANSLATION}&book=eq.${encodeURIComponent(tv.book)}&chapter=eq.${tv.chapter}&verse=eq.${tv.verse}&select=*&limit=1`)
      .then(rows => rows[0] || null)
      .catch(() => null)
  );
  const results = await Promise.all(versePromises);
  const pool = results.filter(Boolean).slice(0, 4);

  // Fallback if not enough verses found
  if(pool.length < 4) {
    const dow = now.getDay();
    const diff = [0,6].includes(dow) ? 'hard' : [2,4].includes(dow) ? 'medium' : 'easy';
    const total = DIFF_COUNTS[TRANSLATION][diff];
    const offset = getDailySeed('fallback') % total;
    const rows = await sbFetch(`verses?translation=eq.${TRANSLATION}&difficulty=eq.${diff}&select=*&limit=${4-pool.length}&offset=${offset}`);
    pool.push(...rows);
  }

  _dailyVersePool = pool;

  // Cache in localStorage for instant loads today
  try { localStorage.setItem(cacheKey, JSON.stringify({ topic, verses: pool })); } catch(e) {}

  return { topic, verses: pool };
}

// Pre-fetch daily verses on app load so they're ready instantly
function prefetchDailyChallenge() {
  setTimeout(() => getDailyTopicAndVerses().catch(()=>{}), 3000);
}

async function fetchDailyVerse(game) {
  const { topic, verses } = await getDailyTopicAndVerses();
  const gameIndex = ['scout','memory','mia','track'].indexOf(game);
  return verses[Math.min(gameIndex, verses.length-1)] || null;
}

async function submitDailyScore(game, score) {
  const name = currentUsername || (currentUser?.email?.split('@')[0]) || playerName || 'Scout';
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/leaderboard_daily`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Authorization': authToken ? `Bearer ${authToken}` : `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ name, score, game, user_id: currentUser?.id || null })
    });
  } catch(e) { console.error('Daily score submit failed:', e); }
}

async function fetchDailyLeaderboard(game) {
  const today = getDailyKey();
  const since = new Date(today).toISOString();
  const tomorrow = new Date(new Date(today).getTime() + 86400000).toISOString();
  // Sort by score desc, then created_at asc — first to get the score wins tiebreaker
  return sbFetch(`leaderboard_daily?game=eq.${game}&created_at=gte.${since}&created_at=lt.${tomorrow}&order=score.desc,created_at.asc&limit=10&select=*`);
}

async function startDailyGame(game) {
  const root = document.getElementById('root');
  root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading today's verse…</div></div>`;

  const verse = await fetchDailyVerse(game);
  if(!verse) { root.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-muted);">Could not load today's challenge. Try again!</div>`; return; }

  if(game === 'scout') {
    dailyChallengeMode = { active: true, game };
    renderDailyScout(verse);
  } else if(game === 'memory') {
    dailyChallengeMode = { active: true, game };
    renderDailyMemory(verse);
  } else if(game === 'mia') {
    dailyChallengeMode = { active: true, game };
    renderDailyMIA(verse);
  } else if(game === 'track') {
    dailyChallengeMode = { active: true, game };
    renderDailyTrack(verse);
  }
}

async function renderDailyScout(verse) {
  const root = document.getElementById('root');
  const correctTestament = verse.testament;
  const correctBook = verse.book;
  const correctChapter = parseInt(verse.chapter);
  let phase = 1; // 1=testament, 2=book, 3=chapter
  let score = 0;
  let correct = 0;

  function renderPhase() {
    root.innerHTML = `
      <div style="text-align:center;margin-bottom:12px;">
        <div style="font-size:0.78rem;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:0.1em;">⚡ Daily Challenge — Scripture Scout</div>
      </div>
      <div class="card" style="max-width:560px;width:100%;">
        <div class="verse-text" style="margin-bottom:16px;">"${verse.text}"</div>
        <hr class="divider"/>
        <div id="scoutPhaseArea"></div>
        <div class="feedback" id="scoutFeedback"></div>
      </div>`;

    const area = document.getElementById('scoutPhaseArea');
    const fb = document.getElementById('scoutFeedback');

    if(phase === 1) {
      area.innerHTML = `
        <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;">Which Testament?</div>
        <div style="display:flex;gap:10px;">
          <button class="ref-option" style="flex:1;" data-ans="OT">📜 Old Testament</button>
          <button class="ref-option" style="flex:1;" data-ans="NT">✝️ New Testament</button>
        </div>`;
      area.querySelectorAll('.ref-option').forEach(btn => {
        btn.onclick = () => {
          area.querySelectorAll('.ref-option').forEach(b=>b.disabled=true);
          const isCorrect = btn.dataset.ans === correctTestament;
          btn.classList.add(isCorrect?'correct':'wrong');
          if(!isCorrect) area.querySelector(`[data-ans="${correctTestament}"]`).classList.add('correct');
          if(isCorrect) { score+=300; correct++; fb.className='feedback correct'; fb.textContent='✓ Correct! +300'; }
          else { fb.className='feedback wrong'; fb.textContent=`✗ It was ${correctTestament==='OT'?'Old':'New'} Testament`; }
          setTimeout(()=>{ phase=2; renderPhase(); }, 1200);
        };
      });
    } else if(phase === 2) {
      const books = correctTestament === 'OT' ? OT_BOOKS : NT_BOOKS;
      const wrongBooks = books.filter(b=>b[0]!==correctBook).sort(()=>Math.random()-0.5).slice(0,3).map(b=>b[0]);
      const choices = shuffle([correctBook,...wrongBooks]);
      area.innerHTML = `
        <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;">Which Book?</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${choices.map(c=>`<button class="ref-option" data-ans="${c}">${c}</button>`).join('')}
        </div>`;
      area.querySelectorAll('.ref-option').forEach(btn => {
        btn.onclick = () => {
          area.querySelectorAll('.ref-option').forEach(b=>b.disabled=true);
          const isCorrect = btn.dataset.ans === correctBook;
          btn.classList.add(isCorrect?'correct':'wrong');
          if(!isCorrect) area.querySelector(`[data-ans="${correctBook}"]`).classList.add('correct');
          if(isCorrect) { score+=500; correct++; fb.className='feedback correct'; fb.textContent='✓ Correct! +500'; }
          else { fb.className='feedback wrong'; fb.textContent=`✗ It was ${correctBook}`; }
          setTimeout(()=>{ phase=3; renderPhase(); }, 1200);
        };
      });
    } else {
      const wrongChapters = [];
      for(let i=0;i<3;i++) {
        let c;
        do { c=Math.max(1,correctChapter+Math.floor(Math.random()*6)-3); } while(c===correctChapter||wrongChapters.includes(c));
        wrongChapters.push(c);
      }
      const choices = shuffle([correctChapter,...wrongChapters]);
      area.innerHTML = `
        <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;">Which Chapter?</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${choices.map(c=>`<button class="ref-option" data-ans="${c}">Chapter ${c}</button>`).join('')}
        </div>`;
      area.querySelectorAll('.ref-option').forEach(btn => {
        btn.onclick = async () => {
          area.querySelectorAll('.ref-option').forEach(b=>b.disabled=true);
          const isCorrect = parseInt(btn.dataset.ans) === correctChapter;
          btn.classList.add(isCorrect?'correct':'wrong');
          if(!isCorrect) area.querySelector(`[data-ans="${correctChapter}"]`).classList.add('correct');
          if(isCorrect) { score+=700; correct++; fb.className='feedback correct'; fb.textContent='✓ Correct! +700'; }
          else { fb.className='feedback wrong'; fb.textContent=`✗ It was Chapter ${correctChapter}`; }
          if(window._pendingChallenge) {
            const pc = window._pendingChallenge;
            window._pendingChallenge = null;
            await sendChallenge(pc.friendId, pc.friendUsername, pc.game, pc.difficulty, score, pc.verse);
            showDailyResult('scout', score);
          } else {
            markDailyCompleted('scout', score);
            await submitDailyScore('scout', score);
            setTimeout(()=>showDailyResult('scout', score), 1200);
          }
        };
      });
    }
  }
  renderPhase();
}

async function renderDailyMIA(verse) {

  const blanks = getBlankWords(verse.text, 'hard');
  const options = blanks.map(b => generateOptions(b.word, verse.text.split(' ')));
  const blankHtml = buildBlankVerse(verse.text, blanks, 0, {});

  // Daily-specific state
  let dailyMIAWordBank = [];
  let dailyMIAAnswerRow = [];
  let dailyMIAScore = 0;

  const root = document.getElementById('root');
  root.innerHTML = `
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:0.78rem;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:0.1em;">⚡ Daily Challenge — Missing in Action</div>
    </div>
    <div class="card" style="max-width:560px;width:100%;">
      <div class="verse-label">✏️ Fill in the blanks</div>
      <div style="font-size:0.78rem;font-weight:700;color:#A78BFA;margin-bottom:10px;">📖 ${verse.book} ${verse.chapter}:${verse.verse}</div>
      <div class="blank-verse" id="dailyMIAVerse">${blankHtml}</div>
      <div id="dailyMIAInput"></div>
      <div class="feedback" id="dailyMIAFeedback"></div>
    </div>`;

  // Build word bank
  const wordList = [];
  blanks.forEach(b => wordList.push(b.word));
  options.forEach(opts => opts.forEach(o => { if(!blanks.map(b=>b.word).includes(o)) wordList.push(o); }));
  dailyMIAWordBank = shuffle(wordList).map((w,i) => ({ word:w, used:false, chipIndex:i }));

  const area = document.getElementById('dailyMIAInput');
  area.innerHTML = `
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--teal);font-weight:600;margin-bottom:6px;">Your answer:</div>
    <div id="dailyMIAAnswerRow" class="answer-row">
      <span class="answer-placeholder">Tap words below…</span>
    </div>
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:600;margin:10px 0 6px;">Word bank:</div>
    <div id="dailyMIAWordBank" class="word-bank">
      ${dailyMIAWordBank.map(w => `<button class="word-chip" data-index="${w.chipIndex}" data-word="${w.word}">${w.word}</button>`).join('')}
    </div>
    <div id="dailyMIACheckArea">
      <button class="btn-next" id="dailyMIACheckBtn" style="background:linear-gradient(135deg,#4A7C59,#3BBFA0);margin-top:8px;" disabled>Check Answers (0/${blanks.length})</button>
    </div>`;

  function refreshDailyMIAAnswerRow() {
    const row = document.getElementById('dailyMIAAnswerRow');
    if(!row) return;
    if(dailyMIAAnswerRow.length === 0) { row.innerHTML = '<span class="answer-placeholder">Tap words below…</span>'; return; }
    row.innerHTML = dailyMIAAnswerRow.map((a,pos) =>
      `<button class="answer-chip" onclick="removeDailyMIAWord(${pos})">${a.word}</button>`
    ).join('');
  }

  window.removeDailyMIAWord = (pos) => {
    const removed = dailyMIAAnswerRow[pos];
    if(!removed) return;
    dailyMIAAnswerRow.splice(pos, 1);
    const chip = document.querySelector(`#dailyMIAWordBank .word-chip[data-index="${removed.chipIndex}"]`);
    if(chip) chip.classList.remove('used');
    refreshDailyMIAAnswerRow();
    updateDailyMIACheckBtn();
  };

  function updateDailyMIACheckBtn() {
    const btn = document.getElementById('dailyMIACheckBtn');
    if(!btn) return;
    const filled = dailyMIAAnswerRow.length;
    btn.disabled = filled < blanks.length;
    btn.textContent = filled >= blanks.length ? 'Check Answers ✓' : `Check Answers (${filled}/${blanks.length})`;
    if(filled >= blanks.length) btn.onclick = checkDailyMIA;
  }

  function checkDailyMIA() {
    let correct = 0;
    blanks.forEach((blank, i) => {
      const given = dailyMIAAnswerRow[i];
      const isCorrect = given && given.word.toLowerCase() === blank.word.toLowerCase();
      if(isCorrect) correct++;
    });
    dailyMIAScore = correct * 200;
    document.querySelectorAll('#dailyMIAWordBank .word-chip').forEach(b => b.disabled=true);
    // Show correct answers
    const row = document.getElementById('dailyMIAAnswerRow');
    if(row) {
      row.innerHTML = blanks.map((blank,i) => {
        const given = dailyMIAAnswerRow[i];
        const isCorrect = given && given.word.toLowerCase() === blank.word.toLowerCase();
        return `<span class="answer-chip" style="border-color:${isCorrect?'var(--teal)':'var(--earth)'};background:${isCorrect?'var(--teal-dim)':'var(--earth-dim)'};color:${isCorrect?'var(--teal)':'var(--earth)'};">${isCorrect?given.word:blank.word}</span>`;
      }).join('');
    }
    const checkArea = document.getElementById('dailyMIACheckArea');
    if(checkArea) checkArea.innerHTML = `<button class="btn-next" id="dailyMIADoneBtn" style="margin-top:8px;">See Results →</button>`;
    document.getElementById('dailyMIADoneBtn').onclick = async () => {
      markDailyCompleted('mia', dailyMIAScore);
      await submitDailyScore('mia', dailyMIAScore);
      showDailyResult('mia', dailyMIAScore);
    };
  }

  function refreshDailyMIAVerse() {
    const verseEl = document.getElementById('dailyMIAVerse');
    if(!verseEl) return;
    const filled = {};
    dailyMIAAnswerRow.forEach((a, i) => { filled[blanks[i]?.index] = a.word; });
    verseEl.innerHTML = buildBlankVerse(verse.text, blanks, dailyMIAAnswerRow.length, filled);
  }

  document.querySelectorAll('#dailyMIAWordBank .word-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.classList.contains('used')) return;
      if(dailyMIAAnswerRow.length >= blanks.length) return;
      dailyMIAAnswerRow.push({ word: btn.dataset.word, chipIndex: parseInt(btn.dataset.index) });
      btn.classList.add('used');
      refreshDailyMIAAnswerRow();
      refreshDailyMIAVerse();
      updateDailyMIACheckBtn();
    });
  });

  // Also update verse when a word is removed
  window.removeDailyMIAWord = (pos) => {
    const removed = dailyMIAAnswerRow[pos];
    if(!removed) return;
    dailyMIAAnswerRow.splice(pos, 1);
    const chip = document.querySelector(`#dailyMIAWordBank .word-chip[data-index="${removed.chipIndex}"]`);
    if(chip) chip.classList.remove('used');
    refreshDailyMIAAnswerRow();
    refreshDailyMIAVerse();
    updateDailyMIACheckBtn();
  };
}

async function renderDailyTrack(verse) {
  const options = await generateRefOptions(verse, 'hard');
  const letters = ['A','B','C','D'];
  const correctRef = `${verse.book} ${verse.chapter}`;

  const root = document.getElementById('root');
  root.innerHTML = `
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:0.78rem;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:0.1em;">⚡ Daily Challenge — Track It Down</div>
    </div>
    <div class="card" style="max-width:560px;width:100%;">
      <div class="verse-label">🎯 Where is this verse from?</div>
      <div class="verse-text" style="margin-bottom:16px;">"${verse.text}"</div>
      <hr class="divider"/>
      <div id="dailyTrackOptions">
        ${options.map((opt,i)=>`
          <button class="ref-option" data-ref="${opt}">
            <span class="ref-option-letter">${letters[i]}</span>${opt}
          </button>`).join('')}
      </div>
      <div class="feedback" id="dailyTrackFeedback"></div>
    </div>`;

  document.querySelectorAll('.ref-option').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.ref-option').forEach(b => b.disabled=true);
      const isCorrect = btn.dataset.ref === correctRef;
      document.querySelectorAll('.ref-option').forEach(b => {
        if(b.dataset.ref===correctRef) b.classList.add('correct');
        if(b===btn && !isCorrect) b.classList.add('wrong');
      });
      const score = isCorrect ? 500 : 0;
      const fb = document.getElementById('dailyTrackFeedback');
      if(fb) { fb.className=`feedback ${isCorrect?'correct':'wrong'}`; fb.textContent=isCorrect?'✓ Correct!':'✗ Not quite!'; }
      markDailyCompleted('track', score);
      await submitDailyScore('track', score);
      setTimeout(()=>showDailyResult('track', score), 1200);
    });
  });
}

  const root = document.getElementById('root');

  const myRank = rows.findIndex(r => r.score === score) + 1;
  const gameNames = { scout:'Scripture Scout', memory:'Memory Trail', mia:'Missing in Action', track:'Track It Down' };
  const gameIcons = { scout:'📖', memory:'🃏', mia:'✏️', track:'🎯' };

  root.innerHTML = `
    <div class="card" style="max-width:560px;width:100%;text-align:center;padding:28px 24px;">
      <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:#A78BFA;font-weight:600;margin-bottom:8px;">⚡ Daily Challenge Complete!</div>
      <div style="font-size:2rem;margin-bottom:8px;">${gameIcons[game]}</div>
      <div style="font-size:2.5rem;font-weight:700;color:var(--teal);margin-bottom:4px;">${score.toLocaleString()}</div>
      <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:${myRank?'8px':'20px'};">points scored</div>
      ${myRank ? `<div style="font-size:0.9rem;color:#A78BFA;font-weight:600;margin-bottom:20px;">You ranked #${myRank} today! ${myRank===1?'🏆':myRank<=3?'🎉':''}</div>` : ''}

      <div style="text-align:left;margin-bottom:16px;">
        <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:600;margin-bottom:8px;">Today's Leaderboard</div>

            </div>`).join('') : `<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.85rem;">You're the first to play today!</div>`}
        </div>
      </div>

      <button class="btn-next" onclick="renderDailyChallenge()">← Back to Daily Challenges</button>
      <button class="btn-change-diff" style="margin-top:8px;" onclick="showHome()">← Home</button>
    </div>`;

async function renderFullDailyLeaderboard() {
  showBackBtn(true);
  const root = document.getElementById('root');
  root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading daily leaderboard…</div></div>`;

  const games = [
    { id: 'scout', icon: '📖', name: 'Scripture Scout' },
    { id: 'memory', icon: '🃏', name: 'Memory Trail' },
    { id: 'mia', icon: '✏️', name: 'Missing in Action' },
    { id: 'track', icon: '🎯', name: 'Track It Down' }
  ];

  // Fetch all 4 leaderboards in parallel
  const results = await Promise.all(games.map(g => fetchDailyLeaderboard(g.id)));

  // Get today's topic
  const { topic } = await getDailyTopicAndVerses().catch(() => ({ topic: '' }));

  // Calculate time until midnight
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24,0,0,0);
  const msLeft = midnight - now;
  const hLeft = Math.floor(msLeft/3600000);
  const mLeft = Math.floor((msLeft%3600000)/60000);

  function renderSection(game, rows) {
    return `
      <div style="margin-bottom:16px;">
        <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;">
          <span>${game.icon} ${game.name}</span>
          <div style="flex:1;height:1px;background:var(--border);"></div>
        </div>
        <div class="card" style="padding:0;overflow:hidden;">
          ${rows.length ? rows.map((r,i) => `
            <div class="daily-lb-row">
              <span style="font-size:1rem;width:28px;text-align:center;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
              <span style="flex:1;font-size:0.88rem;font-weight:600;color:var(--text);">${r.name}</span>
              <span style="font-size:0.88rem;font-weight:700;color:var(--teal);">${r.score.toLocaleString()}</span>
            </div>`).join('') : `<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:0.85rem;">No scores yet today — be the first!</div>`}
        </div>
      </div>`;
  }

  root.innerHTML = `
    <div class="game-lb">
      <div class="verse-label">⚡ Daily Challenge Leaderboard</div>
      ${topic ? `<div style="text-align:center;font-size:1.1rem;font-weight:700;color:#A78BFA;margin-bottom:4px;text-transform:capitalize;">${topic}</div>` : ''}
      <div style="text-align:center;font-size:0.78rem;color:var(--text-muted);margin-bottom:16px;">Resets in ${hLeft}h ${mLeft}m</div>
      ${games.map((g, i) => renderSection(g, results[i])).join('')}
      <button class="btn-change-diff" style="margin-top:8px;" onclick="renderLeaderboardHub()">← Leaderboards</button>
    </div>`;
}

async function showDailyLeaderboard(game) {
  showBackBtn(true);
  const root = document.getElementById('root');
  root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading leaderboard…</div></div>`;
  const score = getDailyScore(game);
  await showDailyResult(game, score);
}

async function checkMonthlyChampion() {
  const now = new Date();
  const monthKey = `ss_champion_${now.getFullYear()}_${now.getMonth()}`;
  if(localStorage.getItem(monthKey)) return; // Already shown this month

  // Only show on the 1st-3rd of the month
  if(now.getDate() > 3) return;

  // Get last month's date range
  const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const thisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const from = lastMonth.toISOString();
  const to = thisMonth.toISOString();
  const monthName = lastMonth.toLocaleString('default', { month: 'long', year: 'numeric' });

  try {
    // Fetch top 3 from each leaderboard
    const [scout, memory, mia, track] = await Promise.all([
      sbFetch(`leaderboard?difficulty=eq.easy&order=score.desc&limit=3&created_at=gte.${from}&created_at=lt.${to}&select=name,score`),
      sbFetch(`leaderboard_memory?order=score.desc&limit=3&created_at=gte.${from}&created_at=lt.${to}&select=name,score,difficulty`),
      sbFetch(`leaderboard_mia?order=score.desc&limit=3&created_at=gte.${from}&created_at=lt.${to}&select=name,score,difficulty`),
      sbFetch(`leaderboard_track?order=score.desc&limit=3&created_at=gte.${from}&created_at=lt.${to}&select=name,score,difficulty`)
    ]);

    // Only show if there are scores
    if(!scout.length && !memory.length && !mia.length && !track.length) return;

    showChampionModal(monthName, scout, memory, mia, track);
    localStorage.setItem(monthKey, '1');
  } catch(e) { console.log('Champion check failed:', e); }
}

function showChampionModal(month, scout, memory, mia, track) {
  const rankIcon = i => i===0?'🥇':i===1?'🥈':'🥉';

  function section(title, rows) {
    if(!rows.length) return '';
    return `
      <div class="champion-section">
        <div class="champion-section-title">${title}</div>
        ${rows.map((r,i) => `
          <div class="champion-row">
            <span class="champion-rank">${rankIcon(i)}</span>
            <span class="champion-name">${r.name}</span>
            <span class="champion-score">${r.score.toLocaleString()}</span>
          </div>`).join('')}
      </div>`;
  }

  const modal = document.createElement('div');
  modal.className = 'champion-modal';
  modal.id = 'championModal';
  modal.innerHTML = `
    <div class="champion-card">
      <div class="champion-header">
        <div class="champion-icon">🏆</div>
        <div class="champion-title">${month} Champions!</div>
        <div class="champion-subtitle">Congratulations to last month's top Scripture Scouts!</div>
      </div>
      ${section('📖 Scripture Scout', scout)}
      ${section('🃏 Memory Trail', memory)}
      ${section('✏️ Missing in Action', mia)}
      ${section('🎯 Track It Down', track)}
      <button class="btn-champion-close" onclick="document.getElementById('championModal').remove()">
        🎉 Let's Play!
      </button>
    </div>`;

  document.body.appendChild(modal);
}

// Initialize Supabase client with fallback if library not loaded
const supabaseClient = (typeof supabase !== 'undefined')
  ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  : null;

(async () => {
  // Let Supabase JS handle OAuth callback automatically
  if(supabaseClient) {
    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        authToken   = session.access_token;
        currentUser = session.user;
        localStorage.setItem('ss_token', session.access_token);
        localStorage.setItem('ss_user', JSON.stringify(session.user));

        try {
          const profiles = await sbFetch(`profiles?id=eq.${currentUser.id}&select=username,avatar_icon,avatar_color`);
          if(profiles.length) {
            currentUsername = profiles[0].username;
            playerName = currentUsername;
            localStorage.setItem('ss_username', currentUsername);
            currentAvatarIcon = profiles[0].avatar_icon || null;
            currentAvatarColor = profiles[0].avatar_color || 'purple';
          } else {
            playerName = currentUser.email ? currentUser.email.split('@')[0] : 'Scout';
          }
        } catch(e) {}

        if(window.location.hash || window.location.search.includes('code=')) {
          window.history.replaceState({}, document.title, window.location.pathname);
        }

        showApp();
        if(!currentUsername) setTimeout(showUsernamePrompt, 600);
        return;
      }
    } catch(e) { console.log('Supabase session check failed:', e.message); }
  }

  // Fallback — try manual token restore
  const hasSession = await restoreSession();
  if (hasSession) {
    showApp();
  } else {
    renderAuthScreen();
  }
  initTheme();
})();
</script>
