<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scripture Scout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:ital@0;1&display=swap');

  :root {
    --bg:         #0E1410;
    --surface:    #151D17;
    --surface-2:  #1C2820;
    --border:     #2A3D2F;
    --border-hi:  #3D5C44;
    --text:       #DFF0E3;
    --text-muted: #6E8F74;
    --moss:       #4A7C59;
    --fern:       #6BAF7A;
    --fern-glow:  rgba(107,175,122,0.2);
    --teal:       #3BBFA0;
    --teal-dim:   rgba(59,191,160,0.12);
    --earth:      #C8873A;
    --earth-dim:  rgba(200,135,58,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(74,124,89,0.15) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 85% 95%, rgba(59,191,160,0.08) 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 56px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  .masthead { text-align: center; margin-bottom: 24px; width: 100%; max-width: 560px; }
  .masthead h1 {
    font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 700;
    background: linear-gradient(135deg, #8FD9A8 0%, #3BBFA0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -0.03em; line-height: 1.1;
  }
  .masthead p { color: var(--text-muted); font-size: 0.78rem; margin-top: 5px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }

  /* Nav tabs */
  .nav-tabs {
    display: flex; gap: 0; width: 100%; max-width: 560px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 20px;
  }
  .nav-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 0.82rem;
    font-weight: 600; color: var(--text-muted); cursor: pointer;
    border: none; background: transparent; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; border-right: 1px solid var(--border);
  }
  .nav-tab:last-child { border-right: none; }
  .nav-tab.active { background: var(--surface-2); color: var(--teal); }
  .nav-tab:active { background: var(--surface-2); }

  /* Diff screen */
  .diff-screen { width: 100%; max-width: 560px; }
  .diff-intro { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; line-height: 1.6; }
  .diff-cards { display: flex; flex-direction: column; gap: 12px; }
  .diff-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px 22px; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; gap: 16px; text-align: left; }
  .diff-card:active { border-color: var(--fern); background: rgba(107,175,122,0.07); }
  .diff-icon { font-size: 2rem; flex-shrink: 0; }
  .diff-info { flex: 1; }
  .diff-name { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .diff-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
  .diff-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
  .badge-easy   { background: rgba(59,191,160,0.15);  color: var(--teal);  border: 1px solid var(--teal); }
  .badge-medium { background: rgba(107,175,122,0.15); color: var(--fern);  border: 1px solid var(--fern); }
  .badge-hard   { background: rgba(200,135,58,0.15);  color: var(--earth); border: 1px solid var(--earth); }

  /* HUD */
  .hud { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 18px; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; overflow: hidden; width: 100%; max-width: 560px; }
  .hud strong { color: var(--text); font-size: 1.15rem; font-weight: 700; display: block; letter-spacing: -0.01em; }
  .hud-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 9px 0; border-right: 1px solid var(--border); }
  .hud-item:last-child { border-right: none; }
  .hud-diff { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 0 0 1px rgba(74,124,89,0.06), 0 20px 40px rgba(0,0,0,0.5); width: 100%; max-width: 560px; padding: 28px 24px 22px; }

  .verse-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .verse-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .verse-text { font-family: 'DM Mono', monospace; font-size: clamp(0.9rem, 2.4vw, 1.05rem); line-height: 1.8; color: var(--text); font-style: italic; margin-bottom: 8px; min-height: 88px; }

  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 32px 0; min-height: 88px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--fern); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.82rem; color: var(--text-muted); }
  .error-box { background: var(--earth-dim); border: 1px solid var(--earth); border-radius: 10px; padding: 16px; font-size: 0.84rem; color: var(--earth); line-height: 1.5; margin-bottom: 12px; }

  .phase-bar { display:flex; gap:5px; margin-bottom:16px; }
  .phase-dot { flex:1; height:3px; border-radius:2px; background:var(--border); transition:background 0.3s; }
  .phase-dot.active { background:var(--fern); box-shadow:0 0 6px var(--fern); }
  .phase-dot.done   { background:var(--teal); }
  .phase-label { font-size:0.76rem; color:var(--text-muted); margin-bottom:12px; font-weight:600; letter-spacing:0.02em; }
  .pts-hint { color: var(--fern); font-size: 0.72rem; margin-left: 4px; }

  .btn-group { display:flex; flex-wrap:wrap; gap:9px; margin-bottom:8px; }
  .btn { flex:1; min-width:120px; padding:13px 14px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600; color:var(--text); cursor:pointer; transition:all 0.15s; text-align:center; }
  .btn:active { border-color:var(--fern); background:rgba(107,175,122,0.1); }
  .btn.correct { border-color:var(--teal);  background:var(--teal-dim);  color:var(--teal); }
  .btn.wrong   { border-color:var(--earth); background:var(--earth-dim); color:var(--earth); }
  .btn.reveal  { border-color:var(--moss);  background:rgba(74,124,89,0.12); color:#8FD9A8; }
  .btn:disabled { cursor:default; }

  .book-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:5px; margin-bottom:8px; max-height:250px; overflow-y:auto; padding-right:3px; }
  .book-grid::-webkit-scrollbar { width:3px; }
  .book-grid::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:2px; }
  .book-btn { padding:10px 5px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:8px; font-size:0.74rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.15s; text-align:center; font-family:'DM Sans',sans-serif; }
  .book-btn:active { border-color:var(--fern); color:var(--text); background:rgba(107,175,122,0.1); }
  .book-btn.correct { border-color:var(--teal);  background:var(--teal-dim);  color:var(--teal); }
  .book-btn.wrong   { border-color:var(--earth); background:var(--earth-dim); color:var(--earth); }
  .book-btn.reveal  { border-color:var(--moss);  background:rgba(74,124,89,0.12); color:#8FD9A8; }
  .book-btn:disabled { cursor:default; }

  .chapter-grid { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; max-height:190px; overflow-y:auto; }
  .chapter-btn { width:48px; height:42px; border:1.5px solid var(--border); background:var(--surface-2); border-radius:8px; font-size:0.8rem; font-weight:700; color:var(--text-muted); cursor:pointer; transition:all 0.15s; font-family:'DM Sans',sans-serif; }
  .chapter-btn:active { border-color:var(--fern); color:var(--text); background:rgba(107,175,122,0.1); }
  .chapter-btn.correct { border-color:var(--teal);  background:var(--teal-dim);  color:var(--teal); }
  .chapter-btn.wrong   { border-color:var(--earth); background:var(--earth-dim); color:var(--earth); }
  .chapter-btn.reveal  { border-color:var(--moss);  background:rgba(74,124,89,0.12); color:#8FD9A8; }
  .chapter-btn:disabled { cursor:default; }

  /* Difficulty feature styles */
  .hint-box { background:var(--teal-dim); border:1px solid var(--teal); border-radius:8px; padding:9px 14px; font-size:0.82rem; color:var(--teal); margin-top:10px; margin-bottom:4px; }
  .hint-box strong { font-weight:700; }
  .phase-note { font-size:0.78rem; color:var(--text-muted); font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.06em; }
  .hint-btn-wrap { display:flex; justify-content:flex-end; margin-bottom:8px; }
  .hint-btn { padding:6px 14px; background:transparent; border:1.5px solid var(--border-hi); border-radius:20px; font-family:'DM Sans',sans-serif; font-size:0.74rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
  .hint-btn:hover { border-color:var(--teal); color:var(--teal); }
  .hint-btn:disabled { opacity:0.4; cursor:default; }
  .hint-cost { font-size:0.68rem; color:var(--earth); font-weight:700; }

  .feedback { min-height:26px; font-size:0.83rem; font-weight:600; margin-top:8px; letter-spacing:0.02em; }
  .feedback.correct { color:var(--teal); }
  .feedback.wrong   { color:var(--earth); }
  .points-pop { display:inline-block; background:var(--moss); color:#DFF0E3; font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:6px; animation:pop 0.4s ease; }
  @keyframes pop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }

  .divider { border:none; border-top:1px solid var(--border); margin:18px 0 14px; }
  .btn-next { width:100%; padding:14px; background:linear-gradient(135deg, #4A7C59 0%, #3BBFA0 100%); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:700; color:white; cursor:pointer; display:block; margin-bottom:8px; }
  .btn-next:active { opacity:0.85; }
  .btn-change-diff { width:100%; padding:10px; background:transparent; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; color:var(--text-muted); cursor:pointer; display:block; }

  /* Game over */
  .game-over { text-align:center; padding:16px 0 6px; }
  .game-over h2 { font-size:1.5rem; font-weight:700; color:var(--text); margin-bottom:4px; }
  .game-over .final-score { font-size:3.2rem; font-weight:700; line-height:1; margin:12px 0 2px; background:linear-gradient(135deg,#8FD9A8 0%,#3BBFA0 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .game-over .rank { font-size:0.88rem; color:var(--text-muted); margin-bottom:20px; }

  /* Name entry */
  .name-entry { margin-bottom:16px; }
  .name-entry label { display:block; font-size:0.78rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  .name-input { width:100%; padding:12px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600; color:var(--text); outline:none; }
  .name-input:focus { border-color:var(--fern); }
  .name-input::placeholder { color:var(--text-muted); font-weight:400; }

  .ref-box { font-size:0.8rem; color:var(--text-muted); margin-bottom:12px; line-height:1.5; }
  .ref-box strong { color:#8FD9A8; }

  /* Leaderboard */
  .leaderboard-screen { width:100%; max-width:560px; }
  .lb-diff-tabs { display:flex; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:12px; }
  .lb-diff-tab { flex:1; padding:11px 8px; text-align:center; font-size:0.82rem; font-weight:600; color:var(--text-muted); cursor:pointer; border:none; background:transparent; font-family:'DM Sans',sans-serif; transition:all 0.15s; border-right:1px solid var(--border); }
  .lb-diff-tab:last-child { border-right:none; }
  .lb-diff-tab.active { background:var(--surface-2); color:var(--teal); }
  .lb-diff-desc { font-size:0.78rem; color:var(--text-muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .lb-diff-pill { font-size:0.7rem; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.06em; }

  .lb-table { width:100%; border-collapse:collapse; }
  .lb-table th { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); padding:8px 12px; text-align:left; border-bottom:1px solid var(--border); }
  .lb-table th:last-child { text-align:right; }
  .lb-row { border-bottom:1px solid var(--border); transition:background 0.15s; }
  .lb-row:last-child { border-bottom:none; }
  .lb-row td { padding:12px 12px; font-size:0.88rem; color:var(--text); }
  .lb-row td:last-child { text-align:right; font-weight:700; color:var(--teal); }
  .lb-rank { font-weight:700; color:var(--text-muted); font-size:0.82rem; }
  .lb-rank.gold   { color:#F4B942; }
  .lb-rank.silver { color:#A8B8C8; }
  .lb-rank.bronze { color:#C8873A; }
  .lb-name { font-weight:600; }
  .lb-diff { font-size:0.7rem; padding:2px 6px; border-radius:10px; margin-left:6px; }
  .lb-empty { text-align:center; color:var(--text-muted); font-size:0.88rem; padding:32px 0; }

  .submitting { text-align:center; color:var(--text-muted); font-size:0.85rem; padding:8px 0; }

  /* Auth */
  .auth-screen { width:100%; max-width:560px; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px 28px; }
  .auth-tabs { display:flex; gap:0; background:var(--surface-2); border-radius:10px; overflow:hidden; margin-bottom:24px; }
  .auth-tab { flex:1; padding:10px; text-align:center; font-size:0.85rem; font-weight:600; color:var(--text-muted); cursor:pointer; border:none; background:transparent; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .auth-tab.active { background:var(--surface); color:var(--teal); border-radius:10px; }
  .auth-field { margin-bottom:16px; }
  .auth-field label { display:block; font-size:0.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
  .auth-input { width:100%; padding:12px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--text); outline:none; transition:border-color 0.15s; }
  .auth-input:focus { border-color:var(--fern); }
  .auth-input::placeholder { color:var(--text-muted); }
  .auth-error { background:var(--earth-dim); border:1px solid var(--earth); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--earth); margin-bottom:14px; display:none; }
  .auth-success { background:var(--teal-dim); border:1px solid var(--teal); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--teal); margin-bottom:14px; display:none; }
  .auth-footer { text-align:center; margin-top:14px; font-size:0.8rem; color:var(--text-muted); }
  .auth-link { color:var(--teal); cursor:pointer; text-decoration:underline; background:none; border:none; font-family:'DM Sans',sans-serif; font-size:0.8rem; }

  /* User profile bar */
  .user-bar { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 16px; margin-bottom:16px; width:100%; max-width:560px; }
  .user-bar-email { font-size:0.8rem; color:var(--text-muted); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
  .user-bar-right { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .btn-signout { padding:5px 12px; background:transparent; border:1.5px solid var(--border); border-radius:20px; font-family:'DM Sans',sans-serif; font-size:0.74rem; font-weight:600; color:var(--text-muted); cursor:pointer; }
  .btn-signout:hover { border-color:var(--earth); color:var(--earth); }

  /* Stats screen */
  .stats-screen { width:100%; max-width:560px; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
  .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 12px; text-align:center; }
  .stat-val { font-size:1.6rem; font-weight:700; color:var(--teal); line-height:1; margin-bottom:4px; }
  .stat-label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
  .history-list { display:flex; flex-direction:column; gap:8px; }
  .history-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
  .history-left { display:flex; flex-direction:column; gap:2px; }
  .history-score { font-size:1.1rem; font-weight:700; color:var(--text); }
  .history-meta { font-size:0.76rem; color:var(--text-muted); }
  .history-right { text-align:right; }
  .history-date { font-size:0.74rem; color:var(--text-muted); }

  /* Endless mode */
  .endless-locked { text-align:center; padding:24px; }
  .endless-locked .lock-icon { font-size:3rem; margin-bottom:12px; }
  .endless-locked h3 { font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:8px; }
  .endless-locked p { font-size:0.85rem; color:var(--text-muted); line-height:1.6; margin-bottom:16px; }
  .endless-progress { background:var(--surface-2); border-radius:20px; height:8px; overflow:hidden; margin:12px 0 6px; }
  .endless-progress-fill { height:100%; border-radius:20px; background:linear-gradient(90deg,#4A7C59,#3BBFA0); transition:width 0.5s ease; }
  .endless-progress-label { font-size:0.74rem; color:var(--text-muted); text-align:center; }
  .endless-hud { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:18px; overflow:hidden; width:100%; max-width:560px; }
  .endless-hud-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; padding:9px 0; border-right:1px solid var(--border); font-size:0.75rem; color:var(--text-muted); letter-spacing:0.06em; text-transform:uppercase; }
  .endless-hud-item:last-child { border-right:none; }
  .endless-hud-item strong { color:var(--text); font-size:1.15rem; font-weight:700; display:block; letter-spacing:-0.01em; }
  .endless-hud-item .multiplier { color:#F4B942; font-size:1rem; font-weight:700; }
  .endless-badge { background:linear-gradient(135deg,#4A7C59,#3BBFA0); color:white; font-size:0.7rem; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.06em; }
  .endless-verse-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.12em; color:#F4B942; margin-bottom:12px; display:flex; align-items:center; gap:8px; font-weight:600; }
  .endless-verse-label::after { content:''; flex:1; height:1px; background:#F4B94230; }
  .bank-bar { display:flex; gap:8px; margin-bottom:8px; }
  .btn-bank { flex:1; padding:10px; background:rgba(244,185,66,0.1); border:1.5px solid #F4B942; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:700; color:#F4B942; cursor:pointer; }
  .btn-bank:active { background:rgba(244,185,66,0.2); }
  .game-over-endless { text-align:center; padding:16px 0 6px; }
  .endless-final { font-size:3.2rem; font-weight:700; line-height:1; margin:12px 0 2px; background:linear-gradient(135deg,#F4B942,#3BBFA0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .endless-streak-display { font-size:1.1rem; color:var(--text-muted); margin-bottom:16px; }

  /* Social login */
  .social-divider { display:flex; align-items:center; gap:10px; margin:14px 0; }
  .social-divider span { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; }
  .social-divider::before, .social-divider::after { content:''; flex:1; height:1px; background:var(--border); }

// SUPABASE HELPERS
// ═══════════════════════════════════════
async function sbFetch(path, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// ═══════════════════════════════════════

async function authFetch(endpoint, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Auth error');
  return data;
}

async function signUp(email, password) {
  const data = await authFetch('signup', { email, password });
  return data;
}

async function signIn(email, password) {
  const data = await authFetch('token?grant_type=password', { email, password });
  currentUser = data.user;
  authToken = data.access_token;
  localStorage.setItem('ss_token', authToken);
  localStorage.setItem('ss_user', JSON.stringify(currentUser));
  // Fetch username from profiles
  try {
    const profiles = await sbFetch(`profiles?id=eq.${currentUser.id}&select=username`);
    if(profiles.length) {
      currentUsername = profiles[0].username;
      playerName = currentUsername;
      localStorage.setItem('ss_username', currentUsername);
    } else {
      playerName = email.split('@')[0];
    }
  } catch(e) {
    playerName = email.split('@')[0];
  }
  return data;
}

async function signOut() {

    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}` }

  currentUser = null;
  authToken = null;
  currentUsername = '';

async function restoreSession() {
  const token = localStorage.getItem('ss_token');
  const user  = localStorage.getItem('ss_user');
  if (token && user) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        authToken = token;
        currentUser = JSON.parse(user);
        // Restore username from local storage or fetch from profiles
        const savedUsername = localStorage.getItem('ss_username');
        if(savedUsername) {
          currentUsername = savedUsername;
          playerName = currentUsername;
        } else {
          try {
            const profiles = await sbFetch(`profiles?id=eq.${currentUser.id}&select=username`);
            if(profiles.length) {
              currentUsername = profiles[0].username;
              playerName = currentUsername;
              localStorage.setItem('ss_username', currentUsername);
            } else {
              playerName = currentUser.email.split('@')[0];

          } catch(e) {

        return true;

    } catch(e) {}
    localStorage.removeItem('ss_token');
    localStorage.removeItem('ss_user');

}

async function createProfile(userId, username) {

      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'

    body: JSON.stringify({ id: userId, username })
  });
  if(!res.ok) {
    const err = await res.json();
    if(err.code === '23505') throw new Error('That username is already taken — try another!');
    throw new Error('Could not save username');
  }
}

async function handleAuth(mode) {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  const sucEl = document.getElementById('authSuccess');
  const btn = document.getElementById('authSubmitBtn');

  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = mode==='login' ? 'Signing in…' : 'Creating account…';
  btn.disabled = true;

  try {
    if (mode === 'signup') {
      const usernameEl = document.getElementById('authUsername');
      const username = usernameEl ? usernameEl.value.trim() : '';
      if(!username) {
        errEl.textContent = 'Please choose a username.';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }
      if(username.length < 3) {
        errEl.textContent = 'Username must be at least 3 characters.';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }
      // Check username availability first
      const existing = await sbFetch(`profiles?username=eq.${encodeURIComponent(username)}&select=id`);
      if(existing.length) {
        errEl.textContent = '⚠️ That username is already taken — try another!';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }
      // Store username temporarily to use after email confirmation
      localStorage.setItem('ss_pending_username', username);
      const data = await signUp(email, password);
      // If auto-confirmed, create profile immediately
      if(data.user && data.access_token) {
        authToken = data.access_token;
        currentUser = data.user;
        await createProfile(data.user.id, username);
        currentUsername = username;
        playerName = username;
        localStorage.setItem('ss_username', username);
        localStorage.removeItem('ss_pending_username');
      }
      sucEl.textContent = '✓ Account created! Check your email to confirm, then sign in.';
      sucEl.style.display = 'block';
      btn.textContent = 'Create Account →';
      btn.disabled = false;
      setTimeout(()=>renderAuthScreen('login'), 3000);
    } else {
      await signIn(email, password);
      // If no profile yet but pending username exists, create it now
      const pendingUsername = localStorage.getItem('ss_pending_username');
      if(pendingUsername && currentUser && !currentUsername) {
        try {
          await createProfile(currentUser.id, pendingUsername);
          currentUsername = pendingUsername;
          playerName = pendingUsername;
          localStorage.setItem('ss_username', pendingUsername);
          localStorage.removeItem('ss_pending_username');
        } catch(e) { /* profile may already exist */ }
      }
      showApp();
    }
  } catch(e) {
    errEl.textContent = `⚠️ ${e.message}`;
    errEl.style.display = 'block';
    btn.textContent = mode==='login'?'Sign In →':'Create Account →';
    btn.disabled = false;
  }
}

async function sendPasswordReset() {
  const email = document.getElementById('resetEmail').value.trim();
  const errEl = document.getElementById('resetError');
  const sucEl = document.getElementById('resetSuccess');
  const btn   = document.getElementById('resetBtn');

  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if(!email) {
    errEl.textContent = 'Please enter your email address.';
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    // Supabase always returns 200 for security (doesn't reveal if email exists)
    sucEl.textContent = "✓ Check your inbox! If that email is registered you'll get a reset link shortly.";
    sucEl.style.display = 'block';
    btn.textContent = 'Sent!';
    btn.disabled = true;
    setTimeout(()=>renderAuthScreen('login'), 4000);
  } catch(e) {
    errEl.textContent = `⚠️ Something went wrong — please try again.`;
    errEl.style.display = 'block';
    btn.textContent = 'Send Reset Link →';
    btn.disabled = false;
  }
}

    <div class="username-prompt-success" id="usernamePromptSuccess"></div>`;
  // Insert after userBar
  const userBar = document.getElementById('userBar');

async function saveUsername() {
  const input = document.getElementById('usernamePromptInput');
  const errEl = document.getElementById('usernamePromptError');
  const sucEl = document.getElementById('usernamePromptSuccess');
  const btn   = document.getElementById('usernamePromptBtn');
  if(!input) return;

  const username = input.value.trim();
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if(!username) { errEl.textContent = 'Please enter a username.'; errEl.style.display = 'block'; return; }
  if(username.length < 3) { errEl.textContent = 'Must be at least 3 characters.'; errEl.style.display = 'block'; return; }

  btn.textContent = 'Saving…';
  btn.disabled = true;

  try {
    // Check availability
    const existing = await sbFetch(`profiles?username=eq.${encodeURIComponent(username)}&select=id`);
    if(existing.length) {
      errEl.textContent = '⚠️ That username is taken — try another!';
      errEl.style.display = 'block';
      btn.textContent = 'Save';
      btn.disabled = false;
      return;
    }
    await createProfile(currentUser.id, username);
    currentUsername = username;
    playerName = username;
    localStorage.setItem('ss_username', username);

    // Update user bar display name
    const userBarEmail = document.querySelector('.user-bar-email');
    if(userBarEmail) userBarEmail.textContent = `👤 ${username}`;

    sucEl.textContent = `✓ Username set to "${username}"!`;
    sucEl.style.display = 'block';
    btn.textContent = 'Saved!';

    // Remove prompt after 2 seconds
    setTimeout(() => {
      const prompt = document.getElementById('usernamePrompt');
      if(prompt) prompt.remove();
    }, 2000);

  } catch(e) {
    errEl.textContent = `⚠️ ${e.message}`;
    errEl.style.display = 'block';
    btn.textContent = 'Save';
    btn.disabled = false;
  }
}

async function fetchEndlessVerse() {
  // Pick from all difficulties mixed
  const diffs = ['easy','medium','hard'];
  const diff = diffs[Math.floor(Math.random()*diffs.length)];
  const total = DIFF_COUNTS[TRANSLATION][diff];
  const offset = Math.floor(Math.random()*total);
  const rows = await sbFetch(`verses?translation=eq.${TRANSLATION}&difficulty=eq.${diff}&select=*&limit=1&offset=${offset}`);
  if(!rows.length) throw new Error('Could not fetch verse');
  const row = rows[0];
  return {t:row.testament, book:row.book, ch:row.chapter, v:row.verse, text:row.text};
}

async function fetchVerse() {
  // Pick a random offset within this difficulty's verse pool
  const total = DIFF_COUNTS[TRANSLATION][difficulty];
  let attempts = 0;
  while (attempts < 5) {
    attempts++;
    const offset = Math.floor(Math.random() * total);
    const rows = await sbFetch(
      `verses?translation=eq.${TRANSLATION}&difficulty=eq.${difficulty}&select=*&limit=1&offset=${offset}`
    );
    if (!rows.length) continue;
    const row = rows[0];
    // Avoid repeating same book too soon
    if (usedIds.has(row.book) && usedIds.size < total * 0.8) continue;
    usedIds.add(row.book);
    if (usedIds.size > 20) usedIds.clear();
    return {t:row.testament, book:row.book, ch:row.chapter, v:row.verse, text:row.text};
  }
  throw new Error('Could not fetch a verse — please try again.');
}

async function submitScore(name, scoreVal, diff) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${authToken || SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };

  // Submit to leaderboard
  const lbBody = { name, score: scoreVal, difficulty: diff };
  if (currentUser) lbBody.user_id = currentUser.id;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
    method: 'POST', headers, body: JSON.stringify(lbBody)
  });
  if (!res.ok) throw new Error(`Submit failed: ${res.status}`);

  // Save to personal history if logged in
  if (currentUser) {
    const total = TOTAL_ROUNDS * maxPhases();
    await fetch(`${SUPABASE_URL}/rest/v1/user_scores`, {
      method: 'POST', headers,
      body: JSON.stringify({
        user_id: currentUser.id,
        score: scoreVal,
        difficulty: diff,
        correct: correctCount,
        total: total
      })
    });
  }
}

async function fetchLeaderboard(diff) {
  if(diff === 'endless') return sbFetch(`leaderboard?select=*&difficulty=eq.endless&order=score.desc&limit=20`);
  return sbFetch(`leaderboard?select=*&difficulty=eq.${diff}&order=score.desc&limit=20`);
}

function renderEndlessPhase() {
  const area = document.getElementById('choicesArea');
  if(!area) return;

  if(phase === 0) {
    area.innerHTML = `<div class="btn-group"><button class="btn" id="otBtn">📜 Old Testament</button><button class="btn" id="ntBtn">✝️ New Testament</button></div>`;
    document.getElementById('otBtn').onclick = () => endlessGuess('testament', 'OT');
    document.getElementById('ntBtn').onclick = () => endlessGuess('testament', 'NT');
  } else if(phase === 1) {
    const books = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).map(b=>b[0]);
    area.innerHTML = `<div class="book-grid">${books.map(b=>`<button class="book-btn" data-book="${b}">${b}</button>`).join('')}</div>`;
    area.querySelectorAll('.book-btn').forEach(btn=>btn.addEventListener('click',()=>endlessGuess('book', btn.dataset.book)));
  } else if(phase === 2) {
    const entry = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).find(b=>b[0]===currentVerse.book);
    const n = entry?entry[1]:30;
    area.innerHTML = `<div class="chapter-grid">${Array.from({length:n},(_,i)=>i+1).map(c=>`<button class="chapter-btn" data-ch="${c}">${c}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>endlessGuess('chapter', parseInt(btn.dataset.ch))));
  } else if(phase === 3) {
    const correct = currentVerse.v;
    const lo = Math.max(1, correct-5);
    const hi = lo+9;
    const verses = Array.from({length:hi-lo+1},(_,i)=>lo+i);
    area.innerHTML = `<div class="phase-note">Guess the verse number:</div><div class="chapter-grid">${verses.map(v=>`<button class="chapter-btn" data-v="${v}">${v}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>endlessGuess('verse', parseInt(btn.dataset.v))));
  }
}

function endlessGuess(type, choice) {
  const pts = Math.round(ENDLESS_BASE_POINTS * endlessMultiplier);
  let correct = false;
  let reveal = null;

  if(type==='testament') {
    correct = choice === currentVerse.t;
    reveal = correct ? null : (currentVerse.t==='OT'?'Old Testament':'New Testament');
    document.querySelectorAll('.btn').forEach(btn=>{
      btn.disabled=true;
      const val=btn.textContent.includes('Old')?'OT':'NT';
      if(val===currentVerse.t) btn.classList.add(correct&&val===choice?'correct':'reveal');
      if(val===choice&&!correct) btn.classList.add('wrong');
    });
  } else if(type==='book') {
    correct = choice === currentVerse.book;
    reveal = correct ? null : currentVerse.book;
    document.querySelectorAll('.book-btn').forEach(btn=>{
      btn.disabled=true;
      const name=btn.textContent.trim();
      if(name===currentVerse.book) btn.classList.add(correct&&name===choice?'correct':'reveal');
      if(name===choice&&!correct) btn.classList.add('wrong');
    });
  } else if(type==='chapter') {
    correct = choice === currentVerse.ch;
    reveal = correct ? null : `Chapter ${currentVerse.ch}`;
    document.querySelectorAll('.chapter-btn').forEach(btn=>{
      btn.disabled=true;
      const n=parseInt(btn.textContent);
      if(n===currentVerse.ch) btn.classList.add(correct&&n===choice?'correct':'reveal');
      if(n===choice&&!correct) btn.classList.add('wrong');
    });
  } else if(type==='verse') {
    correct = choice === currentVerse.v;
    reveal = correct ? null : `Verse ${currentVerse.v}`;
    document.querySelectorAll('.chapter-btn').forEach(btn=>{
      btn.disabled=true;
      const n=parseInt(btn.textContent);
      if(n===currentVerse.v) btn.classList.add(correct&&n===choice?'correct':'reveal');
      if(n===choice&&!correct) btn.classList.add('wrong');
    });
  }

  const fb = document.getElementById('feedback');
  if(correct) {
    endlessScore += pts;
    updateEndlessHUD();
    if(fb){ fb.className='feedback correct'; fb.innerHTML=`✓ Correct! <span class="points-pop">+${pts}</span>`; }
    phase++;
    setTimeout(()=>{
      if(phase < 4) {
        const label = document.getElementById('phaseLabel');
        if(label){ const p=Math.round(ENDLESS_BASE_POINTS*endlessMultiplier); label.innerHTML=`${getStepLabel(phase)} <span class="pts-hint">(+${p} pts)</span>`; }
        document.querySelectorAll('.phase-dot').forEach((d,i)=>{d.className=`phase-dot${i<phase?' done':i===phase?' active':''}`;});
        renderEndlessPhase();
      } else {
        // Completed all 4 phases — next verse!
        endlessStreak++;
        endlessMultiplier = parseFloat((1 + endlessStreak * 0.2).toFixed(1));
        updateEndlessHUD();
        phase = 0;
        const area = document.getElementById('choicesArea');
        if(area) area.innerHTML = `
          <div class="ref-box">📖 <strong>${currentVerse.book} ${currentVerse.ch}:${currentVerse.v}</strong></div>
          <div class="bank-bar">
            <button class="btn-next" id="continueBtn">Keep Going →</button>
            <button class="btn-bank" id="bankBtn">🏦 Bank Score</button>
          </div>`;
        document.getElementById('continueBtn')?.addEventListener('click', async()=>{
          const card=document.getElementById('card');
          showSpinner(card);
          try{ currentVerse=await fetchEndlessVerse(); renderEndlessCard(); }
          catch(e){ showError(card,e.message); }
        });
        document.getElementById('bankBtn')?.addEventListener('click', ()=>endlessGameOver(false));
      }
    }, 1100);
  } else {
    // WRONG — game over, lose everything
    if(fb){ fb.className='feedback wrong'; fb.innerHTML=`✗ Wrong${reveal?` — it was <strong>${reveal}</strong>`:''}. Run ended! 💀`; }
    setTimeout(()=>endlessGameOver(true), 1800);
  }
}

    </div>`;

  document.getElementById('submitEndlessBtn').onclick = async() => {

    localStorage.setItem('ss_player_name', name);
    document.getElementById('submitEndlessBtn').textContent = 'Submitting…';
    document.getElementById('submitEndlessBtn').disabled = true;
    try {
      await submitScore(name, endlessScore, 'endless');

function diffLabel()      { return difficulty==='easy'?'🌱 Easy':difficulty==='medium'?'🌿 Medium':'🪨 Hard'; }
function diffBadgeClass() { return `badge-${difficulty}`; }
function rankLabel(s) {
  if(difficulty==='hard'){if(s>=14000)return'Theologian of the Ages 📜';if(s>=10000)return'Deep Waters Scholar 🌊';if(s>=6000)return'Diligent Student 📚';return'Keep digging! ⛏️';}
  if(s>=12000)return'Scribe of the Ages 📜';if(s>=9000)return'Prophet-in-Training 🔥';if(s>=6000)return'Faithful Disciple ✝️';if(s>=3000)return'Earnest Seeker 🙏';return'Keep studying! 📖';
}

function showSpinner(card) {
  card.innerHTML=`<div class="verse-label">Loading…</div><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Fetching from Scripture…</div></div>`;
}
function showError(card,msg) {
  card.innerHTML=`<div class="error-box">⚠️ ${msg}</div><button class="btn-next" id="retryBtn">Retry</button><button class="btn-change-diff" id="backBtn">← Back</button>`;
  document.getElementById('retryBtn').onclick=()=>startGame(difficulty);
  document.getElementById('backBtn').onclick=renderDiffScreen;
}

async function startGame(diff) {
  difficulty=diff; score=0; streak=0; round=1; phase=0; hintUsed=false; correctCount=0; usedIds.clear();
  document.getElementById('root').innerHTML=`
    <div class="hud">
      <div class="hud-item"><strong id="scoreDisplay">0</strong> pts</div>
      <div class="hud-item"><strong id="streakDisplay">0</strong> streak</div>
      <div class="hud-item"><strong id="roundDisplay">1</strong> / ${TOTAL_ROUNDS}</div>
      <div class="hud-item"><span class="hud-diff ${diffBadgeClass()}">${diffLabel()}</span></div>
      <div class="hud-item" style="font-size:0.7rem;"><strong style="font-size:0.85rem;">${TRANSLATION}</strong> trans</div>
    </div>
    <div class="card" id="card"></div>`;
  const card=document.getElementById('card');
  showSpinner(card);
  try{currentVerse=await fetchVerse();renderCard();}
  catch(e){showError(card,e.message);}
}

function updateHUD() {
  const s=document.getElementById('scoreDisplay');
  const st=document.getElementById('streakDisplay');
  const r=document.getElementById('roundDisplay');
  if(s)s.textContent=score.toLocaleString();
  if(st)st.textContent=streak;
  if(r)r.textContent=round;
}

function hintCost(pts) {
  if(difficulty==='easy')   return Math.floor(pts * 0.5);
  if(difficulty==='medium') return Math.floor(pts * 0.667);
  return pts; // hard — full cost
}

function hintLabel() {
  const pts = POINTS[getPhaseKey(Math.min(phase, maxPhases()-1))];
  const cost = hintCost(pts);
  return `💡 Hint <span class="hint-cost">-${cost}pts</span>`;
}

function applyHint() {
  if(hintUsed) return;
  hintUsed = true;
  const pts = POINTS[getPhaseKey(Math.min(phase, maxPhases()-1))];
  const cost = hintCost(pts);
  score = Math.max(0, score - cost);
  updateHUD();

  // Disable hint button
  const btn = document.getElementById('hintBtn');
  if(btn) { btn.disabled=true; btn.innerHTML='💡 Hint used'; }

  // Show relevant hint
  showHintBox();
}

function showHintBox() {
  // Remove existing hint
  const existing = document.getElementById('easyHint');
  if(existing) existing.remove();

  let hintText = '';

  if(phase === 0) {
    // Testament hint — reveal first letter of the book
    hintText = `The book starts with the letter <strong>${currentVerse.book[0]}</strong>`;
  } else if(phase === 1) {
    // Book hint — eliminate half the wrong books
    const books = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).map(b=>b[0]);
    const wrong = books.filter(b=>b!==currentVerse.book);
    // Shuffle and keep half as "eliminated"
    const shuffled = wrong.sort(()=>Math.random()-0.5);
    const eliminate = shuffled.slice(0, Math.floor(wrong.length/2));
    // Grey out eliminated books in the grid
    document.querySelectorAll('.book-btn').forEach(btn=>{
      if(eliminate.includes(btn.textContent.trim())) {
        btn.style.opacity='0.25';
        btn.disabled=true;
      }
    });
    hintText = `Eliminated <strong>${eliminate.length}</strong> wrong books`;
  } else if(phase === 2) {
    // Chapter hint — show range of 3 centered on correct
    const correct = currentVerse.ch;
    const entry = (currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).find(b=>b[0]===currentVerse.book);
    const total = entry?entry[1]:30;
    const lo = Math.max(1, correct-1);
    const hi = Math.min(total, correct+1);
    hintText = `The chapter is between <strong>${lo}</strong> and <strong>${hi}</strong>`;
  } else if(phase === 3) {
    // Verse hint — narrow to 3 verse numbers
    const correct = currentVerse.v;
    const lo = Math.max(1, correct-1);
    const hi = correct+1;
    hintText = `The verse number is between <strong>${lo}</strong> and <strong>${hi}</strong>`;
  }

  if(!hintText) return;
  const hintEl = document.createElement('div');
  hintEl.id = 'easyHint';
  hintEl.className = 'hint-box';
  hintEl.innerHTML = `💡 ${hintText}`;
  const choicesArea = document.getElementById('choicesArea');
  if(choicesArea) choicesArea.insertAdjacentElement('beforebegin', hintEl);
}

function getStepLabel(p) {
  const labels = ['Step 1 — Old or New Testament?','Step 2 — Which book?','Step 3 — Which chapter?','Step 4 — Which verse number?'];
  return labels[p] || '';
}
function getPhaseKey(p) {
  return ['testament','book','chapter','verse'][p] || 'testament';
}

function renderCard() {
  const card=document.getElementById('card');
  if(!card)return;
  if(round>TOTAL_ROUNDS){renderGameOver(card);return;}
  hintUsed=false;
  const mp=maxPhases();
  const dots=Array.from({length:mp},(_,i)=>`<div class="phase-dot ${i<phase?'done':i===phase?'active':''}"></div>`).join('');
  const pts=POINTS[getPhaseKey(Math.min(phase,mp-1))];
  const stepLabel=getStepLabel(phase);

  card.innerHTML=`
    <div class="verse-label">Verse ${round} of ${TOTAL_ROUNDS}</div>
    <div class="verse-text">"${currentVerse.text}"</div>
    <hr class="divider"/>
    <div class="phase-bar">${dots}</div>
    <div class="phase-label" id="phaseLabel">${stepLabel} <span class="pts-hint">(+${pts} pts)</span></div>
    <div id="choicesArea"></div>
    <div class="feedback" id="feedback"></div>`;
  renderPhase();
}

function renderPhase() {
  const area=document.getElementById('choicesArea');
  if(!area)return;
  const mp=maxPhases();

  // Remove any existing hint button and hint box before adding new ones
  const oldHintWrap = document.querySelector('.hint-btn-wrap');
  if(oldHintWrap) oldHintWrap.remove();
  const oldHintBox = document.getElementById('easyHint');
  if(oldHintBox) oldHintBox.remove();

  // Add fresh hint button before choices
  const hintWrap = document.createElement('div');
  hintWrap.className = 'hint-btn-wrap';
  hintWrap.innerHTML = `<button class="hint-btn" id="hintBtn" ${hintUsed?'disabled':''} onclick="applyHint()">${hintUsed?'💡 Hint used':hintLabel()}</button>`;
  area.parentElement.insertBefore(hintWrap, area);

  if(phase===0){
    // Testament guess — same for all difficulties
    area.innerHTML=`<div class="btn-group"><button class="btn" id="otBtn">📜 Old Testament</button><button class="btn" id="ntBtn">✝️ New Testament</button></div>`;
    document.getElementById('otBtn').onclick=()=>guessTestament('OT');
    document.getElementById('ntBtn').onclick=()=>guessTestament('NT');

  } else if(phase===1){
    // Book guess — same for all difficulties (easy already has hint above)
    const books=(currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).map(b=>b[0]);
    area.innerHTML=`<div class="book-grid">${books.map(b=>`<button class="book-btn" data-book="${b}">${b}</button>`).join('')}</div>`;
    area.querySelectorAll('.book-btn').forEach(btn=>btn.addEventListener('click',()=>guessBook(btn.dataset.book)));

  } else if(phase===2){
    // Chapter guess
    const entry=(currentVerse.t==='OT'?OT_BOOKS:NT_BOOKS).find(b=>b[0]===currentVerse.book);
    const totalChapters=entry?entry[1]:30;

    let chapters;
    if(difficulty==='easy') {
      // Easy: show only 6 nearby chapters centered around correct answer
      const correct=currentVerse.ch;
      const half=3;
      let start=Math.max(1,correct-half);
      let end=Math.min(totalChapters,start+5);
      start=Math.max(1,end-5);
      chapters=Array.from({length:end-start+1},(_,i)=>start+i);
    } else {
      // Medium/Hard: show all chapters
      chapters=Array.from({length:totalChapters},(_,i)=>i+1);
    }

    area.innerHTML=`<div class="chapter-grid">${chapters.map(c=>`<button class="chapter-btn" data-ch="${c}">${c}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>guessChapter(parseInt(btn.dataset.ch))));

  } else if(phase===3 && difficulty==='hard'){
    // Verse number guess — Hard mode only
    // Show a range of 10 verse numbers centered around the correct one
    const correct=currentVerse.v;
    const half=5;
    let start=Math.max(1,correct-half);
    let end=start+9;
    const verses=Array.from({length:end-start+1},(_,i)=>start+i);
    area.innerHTML=`
      <div class="phase-note">Guess the verse number:</div>
      <div class="chapter-grid">${verses.map(v=>`<button class="chapter-btn" data-v="${v}">${v}</button>`).join('')}</div>`;
    area.querySelectorAll('.chapter-btn').forEach(btn=>btn.addEventListener('click',()=>guessVerse(parseInt(btn.dataset.v))));

  } else {
    renderNextButton();
  }
}

function guessTestament(choice){
  const correct=choice===currentVerse.t;
  document.querySelectorAll('.btn').forEach(btn=>{
    btn.disabled=true;
    const val=btn.textContent.includes('Old')?'OT':'NT';
    if(val===currentVerse.t)btn.classList.add(correct&&val===choice?'correct':'reveal');
    if(val===choice&&!correct)btn.classList.add('wrong');
  });
  awardAndAdvance(correct,POINTS.testament,correct?null:(currentVerse.t==='OT'?'Old Testament':'New Testament'),1);
}

function guessBook(choice){
  const correct=choice===currentVerse.book;
  document.querySelectorAll('.book-btn').forEach(btn=>{
    btn.disabled=true;
    const name=btn.textContent.trim();
    if(name===currentVerse.book)btn.classList.add(correct&&name===choice?'correct':'reveal');
    if(name===choice&&!correct)btn.classList.add('wrong');
  });
  awardAndAdvance(correct,POINTS.book,correct?null:currentVerse.book,2);
}

function guessChapter(choice){
  const correct=choice===currentVerse.ch;
  document.querySelectorAll('.chapter-btn').forEach(btn=>{
    btn.disabled=true;
    const n=parseInt(btn.textContent);
    if(n===currentVerse.ch)btn.classList.add(correct&&n===choice?'correct':'reveal');
    if(n===choice&&!correct)btn.classList.add('wrong');
  });
  const nextPhase = difficulty==='hard' ? 3 : maxPhases();
  awardAndAdvance(correct,POINTS.chapter,correct?null:`Chapter ${currentVerse.ch}`,nextPhase);
}

function guessVerse(choice){
  const correct=choice===currentVerse.v;
  document.querySelectorAll('.chapter-btn').forEach(btn=>{
    btn.disabled=true;
    const n=parseInt(btn.textContent);
    if(n===currentVerse.v)btn.classList.add(correct&&n===choice?'correct':'reveal');
    if(n===choice&&!correct)btn.classList.add('wrong');
  });
  awardAndAdvance(correct,POINTS.verse,correct?null:`Verse ${currentVerse.v}`,maxPhases());
}

function awardAndAdvance(correct,pts,reveal,nextPhase){
  if(correct){score+=pts*(1+Math.floor(streak*0.1));streak++;correctCount++;}else{streak=0;}
  updateHUD();
  const fb=document.getElementById('feedback');
  if(fb){
    if(correct){fb.className='feedback correct';fb.innerHTML=`✓ Correct! <span class="points-pop">+${pts}</span>${streak>1?` 🔥 ×${streak} streak`:''}` ;}
    else{fb.className='feedback wrong';fb.innerHTML=`✗ Not quite${reveal?` — it's <strong>${reveal}</strong>`:''}`;}
  }
  phase=nextPhase;
  hintUsed=false;
  const mp=maxPhases();
  setTimeout(()=>{
    const label=document.getElementById('phaseLabel');
    if(label){
      const sl = phase < mp ? getStepLabel(phase) : '✓ Complete';
      const p  = phase < mp ? POINTS[getPhaseKey(phase)] : 0;
      label.innerHTML=`${sl}${phase<mp?` <span class="pts-hint">(+${p} pts)</span>`:''}`;
    }
    document.querySelectorAll('.phase-dot').forEach((d,i)=>{d.className=`phase-dot${i<phase?' done':i===phase?' active':''}`;});

    if(phase<mp)renderPhase();else renderNextButton();
  },1100);
}

function renderNextButton(){
  const area=document.getElementById('choicesArea');
  if(!area)return;
  area.innerHTML=`
    <div class="ref-box">📖 <strong>${currentVerse.book} ${currentVerse.ch}:${currentVerse.v}</strong> — ${currentVerse.t==='OT'?'Old':'New'} Testament</div>
    <button class="btn-next" id="nextBtn">${round<TOTAL_ROUNDS?'Next Verse →':'See Final Score'}</button>
    <button class="btn-change-diff" id="changeDiffBtn">← Change difficulty</button>`;
  document.getElementById('nextBtn').onclick=nextRound;
  document.getElementById('changeDiffBtn').onclick=renderDiffScreen;
}

async function nextRound(){
  round++;
  if(round>TOTAL_ROUNDS){updateHUD();renderGameOver(document.getElementById('card'));return;}
  phase=0;updateHUD();
  const card=document.getElementById('card');
  showSpinner(card);
  try{currentVerse=await fetchVerse();renderCard();}
  catch(e){showError(card,e.message);}
}

function renderGameOver(card){
  card.innerHTML=`
    <div class="game-over">
      <div class="verse-label">Game Complete — ${diffLabel()}</div>
      <h2>Well done, Scout!</h2>
      <div class="final-score">${score.toLocaleString()}</div>
      <div class="rank">${rankLabel(score)}</div>
      ${currentUser ? `
        <div class="name-entry">
          <label>Submitting as</label>
          <input class="name-input" id="nameInput" type="text" maxlength="24"
            value="${currentUsername || currentUser.email.split('@')[0]}"
            readonly style="opacity:0.7;cursor:default;"/>
        </div>
        <button class="btn-next" id="submitBtn">Submit Score 🏆</button>
      ` : `
        <div class="guest-submit-box">
          <div class="guest-submit-icon">🏆</div>
          <p class="guest-submit-title">Want to save your score?</p>
          <p class="guest-submit-desc">Create a free account to get on the leaderboard, track your progress, and compete with others.</p>
          <button class="btn-next" id="signUpToSubmitBtn">Create Free Account →</button>
          <div class="guest-submit-or">or</div>
          <div class="name-entry" style="margin-bottom:8px;">
            <label>Submit as guest</label>
            <input class="name-input" id="nameInput" type="text" maxlength="24" placeholder="Enter a name…" value="${playerName}"/>
          </div>
          <button class="btn-next" id="submitBtn" style="background:var(--surface-2);color:var(--text);border:1.5px solid var(--border);">Submit as Guest</button>
        </div>
      `}
      <button class="btn-next" id="playAgainBtn" style="background:var(--surface-2);color:var(--text);border:1.5px solid var(--border);">Play Again</button>
      <button class="btn-share" id="shareBtn" style="margin-top:8px;" onclick="shareScore(${score})">📨 Challenge a Friend</button>
      <button class="btn-change-diff" id="chooseDiffBtn">← Choose difficulty</button>
    </div>`;

  document.getElementById('submitBtn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { document.getElementById('nameInput').focus(); return; }
    playerName = name;
    localStorage.setItem('ss_player_name', name);
    document.getElementById('submitBtn').textContent = 'Submitting…';
    document.getElementById('submitBtn').disabled = true;
    try {
      await submitScore(name, score, difficulty);
      document.getElementById('submitBtn').textContent = '✓ Score Submitted!';
      setTimeout(()=>switchTab(currentUser ? 'stats' : 'leaderboard'), 1200);
    } catch(e) {
      document.getElementById('submitBtn').textContent = '⚠️ Failed — try again';
      document.getElementById('submitBtn').disabled = false;
    }
  };
  document.getElementById('playAgainBtn').onclick = ()=>startGame(difficulty);
  document.getElementById('chooseDiffBtn').onclick = renderDiffScreen;
}

function shareScore(finalScore) {
  const message = `🏆 I just scored ${finalScore.toLocaleString()} pts on Scripture Scout — the Bible verse guessing game that will either prove you know your Bible... or expose you completely.

Think you can beat me? The gauntlet has been thrown. 👇 https://scripturescout.netlify.app`;

  if (navigator.share) {
    navigator.share({ title: 'Scripture Scout', text: message }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(message)
      .then(()=>showToast('✓ Message copied — go paste it!'))
      .catch(()=>showToast('Share: https://scripturescout.netlify.app'));
  }
}

(async () => {
  // Handle OAuth callback — check both hash and query params
  const hash   = window.location.hash;
  const search = window.location.search;

  // Supabase can return token in hash (#access_token=...) or query (?code=...)
  let token = null;

  // Check hash fragment first (implicit flow)
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    token = params.get('access_token');
  }

  // Check for error in hash
  if (hash && hash.includes('error=')) {
    const params = new URLSearchParams(hash.substring(1));
    const error = params.get('error_description') || params.get('error');
    console.error('OAuth error:', error);
    window.history.replaceState({}, document.title, window.location.pathname);
    renderAuthScreen();
    return;
  }

  if (token) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const user = await res.json();
        authToken = token;
        currentUser = user;
        localStorage.setItem('ss_token', token);
        localStorage.setItem('ss_user', JSON.stringify(user));
        // Fetch username from profiles
        try {
          const profiles = await sbFetch(`profiles?id=eq.${user.id}&select=username`);
          if(profiles.length) {
            currentUsername = profiles[0].username;
            playerName = currentUsername;
            localStorage.setItem('ss_username', currentUsername);
          }
        } catch(e) {}
        // Clean up URL
        window.history.replaceState({}, document.title, window.location.pathname);
        showApp();
        if(!currentUsername) setTimeout(showUsernamePrompt, 600);
        return;
      }
    } catch(e) { console.error('OAuth callback error:', e); }
  }

  // Check for PKCE code flow (query param)
  if (search && search.includes('code=')) {
    const params = new URLSearchParams(search.substring(1));
    const code = params.get('code');
    if (code) {
      try {
        // Exchange code for session
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=pkce`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ auth_code: code })
        });
        if (res.ok) {
          const data = await res.json();
          authToken = data.access_token;
          currentUser = data.user;
          localStorage.setItem('ss_token', authToken);
          localStorage.setItem('ss_user', JSON.stringify(currentUser));
          try {
            const profiles = await sbFetch(`profiles?id=eq.${currentUser.id}&select=username`);
            if(profiles.length) {
              currentUsername = profiles[0].username;
              playerName = currentUsername;
              localStorage.setItem('ss_username', currentUsername);
            }
          } catch(e) {}
          window.history.replaceState({}, document.title, window.location.pathname);
          showApp();
          if(!currentUsername) setTimeout(showUsernamePrompt, 600);
          return;
        }
      } catch(e) { console.error('PKCE exchange error:', e); }
    }
  }

  const hasSession = await restoreSession();
  if (hasSession) {
    showApp();
  } else {
    renderAuthScreen();
  }
})();
</script>
</body>
</html>
